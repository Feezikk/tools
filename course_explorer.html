    function escapeRegExp(string) { return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    function escapeHtml(text) { if (!text) return ""; return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
    
    window.openPageModal = async function(item, query, isHtmlMode, isWholeWord, isCaseSensitive) {
        let displayQuery = isHtmlMode ? escapeHtml(query) : query;
        let fullText = "";
        let isCodeView = isHtmlMode;

        try {
            // 1. Fetch the original file from the global fileMap
            const file = fileMap.get(item.filename);
            if (file) {
                const rawText = await readFileAsText(file);
                // Parse and re-stringify with 2 spaces for pretty formatting
                fullText = JSON.stringify(JSON.parse(rawText), null, 2);
                isCodeView = true; 
            } else {
                fullText = isHtmlMode ? item.rawContent : item.cleanContent;
            }
        } catch (e) {
            console.warn("Could not parse original file for modal, falling back to indexed content.", e);
            fullText = isHtmlMode ? item.rawContent : item.cleanContent;
        }

        // 2. Escape HTML tags
        fullText = escapeHtml(fullText);
        if (!isHtmlMode) {
            displayQuery = escapeHtml(displayQuery); 
        }

        // 3. Apply highlighting (Added 'search-match' class for navigation)
        if (query && query.trim().length > 0) {
            let pattern = escapeRegExp(displayQuery);
            if (isWholeWord) pattern = `(?<=^|\\W)${pattern}(?=\\W|$)`;
            
            const flags = isCaseSensitive ? 'g' : 'gi';
            const regex = new RegExp(`(${pattern})`, flags);
            fullText = fullText.replace(regex, '<span class="highlight search-match">$1</span>');
        }

        // 4. Inject into the modal header
        document.getElementById('modal-header-content').innerHTML = `
            <h3 style="margin:0 0 5px 0; font-size:1.25rem; display: flex; align-items: center; gap: 8px; color: var(--primary);">${SVGS.fileText} ${item.filename}</h3>
            <div style="font-size:0.85rem; color:var(--text-light);">
                <span class="id-number"># ${item.locationId}</span> &nbsp;|&nbsp; 
                <span>${item.breadcrumb}</span>
            </div>
            <div id="modal-match-controls"></div>
        `;

        // 5. Inject body content
        if (isCodeView) {
            document.getElementById('modal-body-content').innerHTML = `
                <div style="margin-bottom: 15px;">
                    <strong style="color: var(--text-light);">🧑‍💻 Code View (Formatted JSON)</strong>
                </div>
                <pre style="font-family: var(--code-font); font-size: 0.85rem; color: #24292e; background: #f6f8fa; border-left: 3px solid #0366d6; padding: 15px; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; margin:0;">${fullText}</pre>
            `;
        } else {
            document.getElementById('modal-body-content').innerHTML = `
                <div style="font-size: 0.95rem; line-height: 1.6; color: var(--text); font-family: Georgia, serif; white-space: pre-wrap; padding-left: 10px; border-left: 3px solid var(--border);">
                    ${fullText}
                </div>
            `;
        }

        // 6. Show modal
        document.getElementById('media-modal').classList.add('active');
        document.body.style.overflow = 'hidden'; 

        // 7. Match Navigation Logic
        const matches = document.querySelectorAll('#modal-body-content .search-match');
        if (matches.length > 0) {
            let currentMatch = 0;
            
            // Inject the Prev/Next buttons
            const controlsContainer = document.getElementById('modal-match-controls');
            controlsContainer.innerHTML = `
                <div style="display:flex; gap: 8px; align-items: center; margin-top: 10px; font-size: 0.85rem;">
                    <button id="prev-match-btn" class="nav-btn" style="padding: 4px 8px;" disabled>${SVGS.arrowUp} Prev</button>
                    <span id="match-counter" style="font-weight: 600;">1 of ${matches.length}</span>
                    <button id="next-match-btn" class="nav-btn" style="padding: 4px 8px;" ${matches.length === 1 ? 'disabled' : ''}>Next ${SVGS.arrowDown}</button>
                </div>
            `;

            // Function to handle scrolling and UI updates
            const updateMatchNav = () => {
                matches.forEach(m => {
                    m.style.outline = 'none';
                    m.style.boxShadow = 'none';
                });
                
                const activeMatch = matches[currentMatch];
                activeMatch.style.outline = '2px solid var(--primary)';
                activeMatch.style.boxShadow = '0 0 8px rgba(28, 53, 94, 0.4)';
                
                activeMatch.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                document.getElementById('match-counter').innerText = `${currentMatch + 1} of ${matches.length}`;
                document.getElementById('prev-match-btn').disabled = currentMatch === 0;
                document.getElementById('next-match-btn').disabled = currentMatch === matches.length - 1;
            };

            // Bind click events
            document.getElementById('prev-match-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentMatch > 0) { currentMatch--; updateMatchNav(); }
            });
            
            document.getElementById('next-match-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentMatch < matches.length - 1) { currentMatch++; updateMatchNav(); }
            });

            setTimeout(() => updateMatchNav(), 50);

        } else {
            // Fallback if no matches found
            document.getElementById('modal-body-content').scrollTop = 0;
        }
    };

    function runSearch(query) {
        try {
            const q = query.trim();
            elements.results.innerHTML = '';
            
            currentSearchResults = [];
            currentSearchQuery = q;
            currentSearchIsHtmlMode = elements.htmlToggle.checked;
            searchRenderCount = 0; // Reset pagination

            if (q.length < 1) {
                elements.exportSearchBtn.style.display = 'none';
                return;
            } 
            
            const isHtmlMode = elements.htmlToggle.checked;
            const isWholeWord = elements.wholeWordToggle.checked; 
            const isCaseSensitive = elements.caseSensitiveToggle.checked;
            
            let matchCount = 0;
            let searchStr = isHtmlMode ? escapeHtml(q) : q;
            let pattern = escapeRegExp(searchStr);
            
            if (isWholeWord) {
                pattern = `(?<=^|\\W)${pattern}(?=\\W|$)`;
            }
            
            const flags = isCaseSensitive ? 'g' : 'gi';
            const fileRegex = new RegExp(pattern, flags);
            
            const queryForId = isCaseSensitive ? q : q.toLowerCase();
            const MAX_MATCH_COUNT = 500; 
            
            // Current Filter Selections
            const selectedModule = elements.searchModuleFilter.value;
            const selectedContext = elements.searchContextFilter.value;
            
            courseIndex.forEach(item => {
                // APPLY FILTERS
                if (!item.locationId) return;
                
                if (selectedModule !== 'all') {
                    const itemModNum = item.locationId.split('.')[0];
                    if (itemModNum !== selectedModule) return; 
                }

                if (selectedContext !== 'all') {
                    const isInteractive = item.locationId.includes('.INT-');
                    if (selectedContext === 'pages' && isInteractive) return; 
                    if (selectedContext === 'interactives' && !isInteractive) return;
                }

                // PROCEED WITH SEARCH
                const textToSearch = isHtmlMode ? item.rawContent : item.cleanContent;
                if (!textToSearch) return; 
                
                let contentMatches = [];
                let match;
                
                fileRegex.lastIndex = 0; 
                
                while ((match = fileRegex.exec(textToSearch)) !== null) {
                    contentMatches.push(match.index);
                    if (contentMatches.length >= MAX_MATCH_COUNT) break; 
                }
                
                const locId = item.locationId ? (isCaseSensitive ? item.locationId : item.locationId.toLowerCase()) : "";
                const isIdMatch = locId.includes(queryForId);
                
                if (contentMatches.length > 0 || isIdMatch) {
                    // STORE FOR EXPORT & PAGINATION
                    currentSearchResults.push({
                        locationId: item.locationId,
                        breadcrumb: item.breadcrumb,
                        filename: item.filename,
                        textToSearch: textToSearch,
                        matchIndices: contentMatches,
                        isIdMatch: isIdMatch,
                        originalItem: item
                    });
                    matchCount++;
                }
            });
            
            if (matchCount === 0) {
                elements.results.innerHTML = `
                    <div style="text-align:center; padding:40px; color:#999;">
                        <div style="margin-bottom:10px; opacity:0.3; display: flex; justify-content: center;">
                            <svg class="svg-icon" style="width: 48px; height: 48px;" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        </div>
                        <p>No matches found</p>
                    </div>`;
                elements.exportSearchBtn.style.display = 'none';
            } else {
                renderSearchBatch();
                elements.exportSearchBtn.style.display = 'inline-flex';
            }
            
            window.scrollTo({ top: 0, behavior: 'auto' }); 
            
        } catch (err) {
            console.error("Search failed:", err);
            elements.results.innerHTML = `<div style="color:#dc3545; padding: 20px; border: 1px solid #dc3545; border-radius: 8px; background: #fff;">Search encountered an error. Please try a different query.</div>`;
            elements.exportSearchBtn.style.display = 'none';
        }
    }

    // New Function to handle DOM chunking
    function renderSearchBatch() {
        const fragment = document.createDocumentFragment();
        const start = searchRenderCount;
        const end = Math.min(start + SEARCH_BATCH_SIZE, currentSearchResults.length);
        const MAX_MATCH_COUNT = 500;
        
        for (let i = start; i < end; i++) {
            const res = currentSearchResults[i];
            const card = createResultCard(res.originalItem, res.matchIndices, currentSearchQuery, res.isIdMatch, currentSearchIsHtmlMode, elements.wholeWordToggle.checked, elements.caseSensitiveToggle.checked, MAX_MATCH_COUNT);
            fragment.appendChild(card);
        }
        
        const oldBtn = document.getElementById('load-more-search-btn');
        if (oldBtn) oldBtn.remove();
        
        elements.results.appendChild(fragment);
        searchRenderCount = end;
        
        if (searchRenderCount < currentSearchResults.length) {
            const btn = document.createElement('button');
            btn.id = 'load-more-search-btn';
            btn.className = 'action-btn';
            btn.style.margin = '20px auto';
            btn.style.display = 'flex';
            btn.innerHTML = `Load Next ${Math.min(SEARCH_BATCH_SIZE, currentSearchResults.length - searchRenderCount)} Results (Showing ${searchRenderCount} of ${currentSearchResults.length})`;
            btn.onclick = renderSearchBatch;
            elements.results.appendChild(btn);
        }
    }

    function createResultCard(item, matchIndices, query, isIdMatch, isHtmlMode, isWholeWord, isCaseSensitive, maxCap) {
        const card = document.createElement('div');
        card.className = 'result-card';
        
        // Add the click event to open the full page modal
        card.onclick = () => openPageModal(item, query, isHtmlMode, isWholeWord, isCaseSensitive);

        let snippetsHtml = '';
        const sourceText = isHtmlMode ? item.rawContent : item.cleanContent;
        
        if (isIdMatch && matchIndices.length === 0) {
            snippetsHtml = `<div class="snippet-item ${isHtmlMode ? 'code-view' : ''}">${getSnippet(sourceText, 0, 0, query, isHtmlMode, isWholeWord, isCaseSensitive)}</div>`;
        } else {
            const maxDisplay = 10;
            const displayIndices = matchIndices.slice(0, maxDisplay);
            
            displayIndices.forEach((index, i) => {
                const snip = getSnippet(sourceText, index, query.length, query, isHtmlMode, isWholeWord, isCaseSensitive);
                snippetsHtml += `<div class="snippet-item ${isHtmlMode ? 'code-view' : ''}">${snip}</div>`;
                if (i < displayIndices.length - 1) snippetsHtml += `<div class="separator"></div>`;
            });
            
            if (matchIndices.length > maxDisplay) {
                const plusMore = matchIndices.length === maxCap ? "+" : "";
                snippetsHtml += `<div style="font-size:0.8rem; color:#999; padding-left:12px; margin-top:5px;">...and ${matchIndices.length - maxDisplay}${plusMore} more matches.</div>`;
            }
        }
        
        let matchText = `ID Match`;
        if (matchIndices.length > 0) {
            matchText = matchIndices.length === maxCap ? `Found ${maxCap}+` : `Found ${matchIndices.length}`;
        }
        
        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:10px;">
                <div>
                    <div class="breadcrumb">${item.breadcrumb}</div>
                    <div style="font-size:0.8rem; margin-top:5px; display: flex; align-items: center; gap: 10px;">
                        <span class="id-number"># ${item.locationId}</span>
                        <span style="color:var(--primary); display:flex; align-items:center; gap: 4px;">${SVGS.fileText} ${item.filename}</span>
                    </div>
                </div>
                <div style="font-size:0.75rem; background:var(--primary); color:white; padding:4px 10px; border-radius:12px; height:fit-content; font-weight:600;">${matchText}</div>
            </div>
            <div class="snippets-container">${snippetsHtml}</div>`;
            
        return card;
    }

    function getSnippet(fullText, index, length, query, isHtmlMode, isWholeWord, isCaseSensitive) {
        let displayQuery = isHtmlMode ? escapeHtml(query) : query;
        let matchLength = displayQuery.length; 
        
        const padding = isHtmlMode ? 80 : 60; 
        const start = Math.max(0, index - padding);
        const end = Math.min(fullText.length, index + matchLength + padding);
        let textPart = fullText.substring(start, end);
        
        if (isHtmlMode) textPart = escapeHtml(textPart);
        
        if (matchLength > 0 && query) {
            let pattern = escapeRegExp(displayQuery);
            if (isWholeWord) pattern = `(?<=^|\\W)${pattern}(?=\\W|$)`;
            
            const flags = isCaseSensitive ? 'g' : 'gi';
            const regex = new RegExp(`(${pattern})`, flags);
            textPart = textPart.replace(regex, '<span class="highlight">$1</span>');
        }
        return (start > 0 ? "..." : "") + textPart + (end < fullText.length ? "..." : "");
    }

    // --- NEW: SEARCH RESULTS EXPORT LOGIC WITH SUMMARY, MODULE TABS, AND FORMATTED LESSON DIVIDERS ---
    window.exportSearchResults = function() {
        if (!currentSearchResults || currentSearchResults.length === 0) {
            showToast("No results to export.", "error");
            return;
        }

        if (typeof XLSX === 'undefined') {
            showToast("Excel library failed to load.", "error");
            return;
        }

        try {
            const wb = XLSX.utils.book_new();

            // --- Define Styles ---
            const borderStyle = {
                top: { style: "thin", color: { rgb: "BFBFBF" } },
                bottom: { style: "thin", color: { rgb: "BFBFBF" } },
                left: { style: "thin", color: { rgb: "BFBFBF" } },
                right: { style: "thin", color: { rgb: "BFBFBF" } }
            };

            const sHeader = { 
                font: { bold: true, color: { rgb: "FFFFFF" }, sz: 12 }, 
                fill: { fgColor: { rgb: "1C355E" } }, 
                alignment: { horizontal: "center", vertical: "center" },
                border: borderStyle
            }; 
            const sHeaderLeft = { 
                font: { bold: true, color: { rgb: "FFFFFF" }, sz: 12 }, 
                fill: { fgColor: { rgb: "1C355E" } }, 
                alignment: { horizontal: "left", vertical: "center" },
                border: borderStyle
            }; 
            const sTitle = { 
                font: { bold: true, color: { rgb: "1C355E" }, sz: 14 }, 
                alignment: { horizontal: "left", vertical: "center" } 
            };
            const sText = { alignment: { wrapText: true, vertical: "top" }, border: borderStyle };
            const sNumber = { alignment: { horizontal: "center", vertical: "top" }, border: borderStyle };
            const sLocation = { alignment: { horizontal: "center", vertical: "top" }, border: borderStyle };
            
            // Style for Lesson Dividers
            const sLessonDivider = { 
                font: { bold: true, color: { rgb: "1C355E" }, sz: 12 }, 
                fill: { fgColor: { rgb: "E7E6E6" } }, 
                alignment: { horizontal: "left", vertical: "center" },
                border: borderStyle
            };

            // --- 1. Calculate Summary Data & Group by Module ---
            let totalHits = 0;
            let totalPages = currentSearchResults.length;
            let moduleBreakdown = {}; 
            let lessonBreakdown = {}; 
            let resultsByModule = {}; 

            currentSearchResults.forEach(res => {
                let hitsInFile = (res.isIdMatch && res.matchIndices.length === 0) ? 1 : res.matchIndices.length;
                totalHits += hitsInFile;

                // Safely parse location IDs
                let locParts = res.locationId ? res.locationId.split('.') : [];
                let modId = locParts[0] || "Unknown";
                let lesId = locParts.length >= 2 ? `${locParts[0]}.${locParts[1]}` : "Unknown";

                // Extract friendly titles from breadcrumbs and prepend IDs
                let breadcrumbParts = res.breadcrumb ? res.breadcrumb.split(' > ') : [];
                let rawModTitle = breadcrumbParts[0] || `Module ${modId}`;
                let rawLesTitle = breadcrumbParts[1] || `Lesson ${lesId}`;
                
                let modTitle = rawModTitle.includes(modId) ? rawModTitle : `${modId} ${rawModTitle}`;
                let lesTitle = rawLesTitle.includes(lesId) ? rawLesTitle : `${lesId} ${rawLesTitle}`;

                // Aggregate Module Data
                if (!moduleBreakdown[modId]) moduleBreakdown[modId] = { hits: 0, pages: 0, title: modTitle };
                moduleBreakdown[modId].hits += hitsInFile;
                moduleBreakdown[modId].pages += 1;

                // Aggregate Lesson Data
                if (!lessonBreakdown[lesId]) lessonBreakdown[lesId] = { hits: 0, pages: 0, title: lesTitle };
                lessonBreakdown[lesId].hits += hitsInFile;
                lessonBreakdown[lesId].pages += 1;

                // Group actual results for the Module Tabs
                if (!resultsByModule[modId]) resultsByModule[modId] = [];
                resultsByModule[modId].push(res);
            });

            // --- 2. Build Summary Sheet ---
            let sumRows = [];
            
            // Search Overview Section
            sumRows.push([{v: "Search Overview", s: sTitle}]);
            sumRows.push([
                {v: "Search Query", s: sHeaderLeft}, {v: currentSearchQuery, s: sText}
            ]);
            sumRows.push([
                {v: "Total Hits (Matches)", s: sHeaderLeft}, {v: totalHits, s: sNumber}
            ]);
            sumRows.push([
                {v: "Total Files Affected", s: sHeaderLeft}, {v: totalPages, s: sNumber}
            ]);
            sumRows.push([
                {v: "HTML View Mode", s: sHeaderLeft}, {v: currentSearchIsHtmlMode ? "Enabled" : "Disabled", s: sText}
            ]);
            sumRows.push([
                {v: "Export Date", s: sHeaderLeft}, {v: new Date().toLocaleString(), s: sText}
            ]);
            sumRows.push([]); // Spacer

            // Module Breakdown Section
            sumRows.push([{v: "Breakdown by Module", s: sTitle}]);
            sumRows.push([
                {v: "Module ID", s: sHeader}, {v: "Module Name", s: sHeader}, 
                {v: "Total Hits", s: sHeader}, {v: "Files Affected", s: sHeader}
            ]);
            Object.keys(moduleBreakdown).sort((a,b) => a.localeCompare(b, undefined, {numeric: true})).forEach(modId => {
                let m = moduleBreakdown[modId];
                sumRows.push([
                    {v: modId, s: sLocation}, {v: m.title, s: sText}, 
                    {v: m.hits, s: sNumber}, {v: m.pages, s: sNumber}
                ]);
            });
            sumRows.push([]); // Spacer

            // Lesson Breakdown Section
            sumRows.push([{v: "Breakdown by Lesson", s: sTitle}]);
            sumRows.push([
                {v: "Lesson ID", s: sHeader}, {v: "Lesson Name", s: sHeader}, 
                {v: "Total Hits", s: sHeader}, {v: "Files Affected", s: sHeader}
            ]);
            Object.keys(lessonBreakdown).sort((a,b) => a.localeCompare(b, undefined, {numeric: true})).forEach(lesId => {
                let l = lessonBreakdown[lesId];
                sumRows.push([
                    {v: lesId, s: sLocation}, {v: l.title, s: sText}, 
                    {v: l.hits, s: sNumber}, {v: l.pages, s: sNumber}
                ]);
            });

            const wsSummary = XLSX.utils.aoa_to_sheet(sumRows);
            wsSummary['!cols'] = [{wch: 25}, {wch: 45}, {wch: 15}, {wch: 15}]; 
            wsSummary['!views'] = [{showGridLines: false}];
            
            // Merge cells for titles to span across columns nicely
            wsSummary['!merges'] = [
                {s:{r:0, c:0}, e:{r:0, c:3}}, 
                {s:{r:7, c:0}, e:{r:7, c:3}}, 
                {s:{r:10 + Object.keys(moduleBreakdown).length, c:0}, e:{r:10 + Object.keys(moduleBreakdown).length, c:3}} 
            ];

            XLSX.utils.book_append_sheet(wb, wsSummary, getSafeSheetName(wb, "Search Summary"));

            // --- 3. Build Detailed Results Sheets (One per Module) ---
            const resultHeaders = [
                {v: "Location ID", s: sHeader}, 
                {v: "Breadcrumb", s: sHeader}, 
                {v: "Filename", s: sHeader}, 
                {v: "Search Snippet", s: sHeader}
            ];

            Object.keys(resultsByModule).sort((a,b) => a.localeCompare(b, undefined, {numeric: true})).forEach(modId => {
                let rows = [resultHeaders]; 
                let merges = []; // Track merged cells for this specific sheet
                let currentLessonId = null;

                // Sort results within the module chronologically by location ID
                let sortedResults = resultsByModule[modId].sort((a, b) => {
                    let locA = a.locationId || "";
                    let locB = b.locationId || "";
                    return locA.localeCompare(locB, undefined, {numeric: true});
                });

                sortedResults.forEach(res => {
                    // Extract Lesson ID & Title for dividing
                    let locParts = res.locationId ? res.locationId.split('.') : [];
                    let lesId = locParts.length >= 2 ? `${locParts[0]}.${locParts[1]}` : "Unknown";
                    
                    let breadcrumbParts = res.breadcrumb ? res.breadcrumb.split(' > ') : [];
                    let rawLesTitle = breadcrumbParts[1] || `Lesson ${lesId}`;
                    let lesTitle = rawLesTitle.includes(lesId) ? rawLesTitle : `${lesId} ${rawLesTitle}`;

                    // Insert Lesson Divider row if the Lesson ID has changed
                    if (lesId !== currentLessonId) {
                        currentLessonId = lesId;
                        rows.push([
                            {v: lesTitle, s: sLessonDivider}, 
                            {v: "", s: sLessonDivider}, 
                            {v: "", s: sLessonDivider}, 
                            {v: "", s: sLessonDivider}
                        ]);
                        // Merge the 4 columns of the divider row
                        merges.push({ s: { r: rows.length - 1, c: 0 }, e: { r: rows.length - 1, c: 3 } });
                    }

                    // Insert the actual result rows
                    if (res.isIdMatch && res.matchIndices.length === 0) {
                        rows.push([
                            {v: res.locationId, s: sLocation},
                            {v: res.breadcrumb, s: sText},
                            {v: res.filename, s: sText},
                            {v: "[Matched by Location ID only]", s: sText}
                        ]);
                    } else {
                        res.matchIndices.forEach(idx => {
                            const padding = currentSearchIsHtmlMode ? 80 : 60;
                            const matchLength = currentSearchQuery.length; 
                            
                            const start = Math.max(0, idx - padding);
                            const end = Math.min(res.textToSearch.length, idx + matchLength + padding);
                            
                            let prefix = res.textToSearch.substring(start, idx);
                            let exactMatch = res.textToSearch.substring(idx, idx + matchLength);
                            let suffix = res.textToSearch.substring(idx + matchLength, end);
                            
                            let cleanSnippet = (start > 0 ? "..." : "") + prefix + " 【 " + exactMatch.toUpperCase() + " 】 " + suffix + (end < res.textToSearch.length ? "..." : "");
                            
                            rows.push([
                                {v: res.locationId, s: sLocation},
                                {v: res.breadcrumb, s: sText},
                                {v: res.filename, s: sText},
                                {v: cleanSnippet, s: sText}
                            ]);
                        });
                    }
                });

                const ws = XLSX.utils.aoa_to_sheet(rows);
                
                ws['!cols'] = [{wch: 15}, {wch: 45}, {wch: 30}, {wch: 100}]; 
                ws['!views'] = [{showGridLines: false}];
                ws['!merges'] = merges; // Apply the row merges for the dividers
                
                let sheetName = modId === "Unknown" ? "Unknown Module" : `Module ${modId}`;
                XLSX.utils.book_append_sheet(wb, ws, getSafeSheetName(wb, sheetName));
            });

            // --- 4. Export File ---
            let safeQuery = currentSearchQuery.replace(/[^a-z0-9\-_]/gi, '_').substring(0, 30);
            if (!safeQuery) safeQuery = "Search";
            let filename = `${safeQuery}_Search_Results.xlsx`;

            const wbout = XLSX.write(wb, {bookType:'xlsx', type:'array'});
            const blob = new Blob([wbout], {type:"application/octet-stream"});
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement("a");
            document.body.appendChild(a);
            a.href = url;
            a.download = filename;
            a.click();
            
            setTimeout(() => {
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            }, 0);

        } catch (e) {
            console.error(e);
            showToast("Export error: " + e.message, "error");
        }
    };

// --- MULTI-SELECT GLOSSARY FILTER LOGIC ---

            renderGlossaryList(document.getElementById('glossary-search') ? document.getElementById('glossary-search').value : '');
        } else {

   // --- RENDER GLOSSARY TAB CONTENT ---
    window.renderGlossaryList = function(query = '') {
        const container = document.getElementById('glossary-list-container');
        const azBar = document.getElementById('glossary-az-bar');
        if (!container || !azBar) return;

        if (query.trim() !== '') {
            activeGlossaryLetters.clear();
        }

        const filteredGlossary = courseGlossary.filter(g => {
            const inModule = g.locations.some(loc => activeMediaModules.has(loc.split('.')[0]));
            if (!inModule) return false;
            
            if (showOnlyDuplicates && g.locations.length <= 1) return false;
            
            if (query) {
                const q = query.toLowerCase();
                return g.title.toLowerCase().includes(q) || g.definition.toLowerCase().includes(q);
            }
            return true;
        });

        const hasDuplicates = courseGlossary.some(g => {
            const inModule = g.locations.some(loc => activeMediaModules.has(loc.split('.')[0]));
            return inModule && g.locations.length > 1;
        });

        let azHtml = `<button id="btn-az-All" class="az-btn ${activeGlossaryLetters.size === 0 && !showOnlyDuplicates ? 'active' : ''}" onclick="toggleGlossaryLetter('All')">All</button>`;
        
        if (hasDuplicates || showOnlyDuplicates) {
            let dupActive = showOnlyDuplicates ? 'active' : '';
            azHtml += `<button class="az-btn duplicate-btn ${dupActive}" onclick="toggleDuplicateFilter()">Duplicates</button>`;
        }
        
        azHtml += `<div style="width: 1px; background: var(--border); margin: 0 4px;"></div>`;

        if (filteredGlossary.length === 0) {
            container.innerHTML = `<div style="column-span: all; text-align:center; padding:40px; color:#999;">No matching glossary terms found.</div>`;
            azBar.innerHTML = azHtml; 
            return;
        }

        const groups = {};
        filteredGlossary.forEach(g => {
            let letter = g.title.charAt(0).toUpperCase();
            if (!/[A-Z]/.test(letter)) letter = '#';
            if (!groups[letter]) groups[letter] = [];
            groups[letter].push(g);
        });

        const sortedLetters = Object.keys(groups).sort((a,b) => {
            if (a === '#') return 1;
            if (b === '#') return -1;
            return a.localeCompare(b);
        });

        sortedLetters.forEach(letter => {
            let isActive = activeGlossaryLetters.has(letter) ? 'active' : '';
            azHtml += `<button class="az-btn az-btn-letter ${isActive}" data-letter="${letter}" onclick="toggleGlossaryLetter('${letter}')">${letter}</button>`;
        });
        azBar.innerHTML = azHtml;

        let listHtml = '';
        sortedLetters.forEach(letter => {
            listHtml += `<div class="glossary-group" id="letter-${letter}" data-letter="${letter}">
                            <div class="glossary-letter">${letter}</div>`;
            groups[letter].forEach(g => {
                const locs = g.locations.map(loc => `<span class="glossary-loc-badge" title="Location Usage">${loc}</span>`).join('');
                const escTitle = escapeHtml(g.title);
                
                const isDup = g.locations.length > 1;
                const dupClass = isDup ? 'duplicate-term' : '';
                
                listHtml += `<div class="glossary-item ${dupClass}" onclick="openMediaModalFromObj(courseGlossary.find(x => x.id === '${g.id}'), 'glossary')">
                                <div class="glossary-term">${escTitle}</div>
                                <div class="glossary-locs">${locs}</div>
                             </div>`;
            });
            listHtml += `</div>`;
        });
        container.innerHTML = listHtml;
        
        applyGlossaryFilters();
    };

    // --- NEW: EXPORT MEDIA REPORT (Includes Fix 1 & 4) ---
    window.exportMediaReport = function() {
        // Filter arrays using the active UI states before generating Excel
        const isMissingId = (id) => !id || id === "Unknown" || id.trim() === "";

        const expVideos = courseVideos.filter(m => {
            if (!m.locationId || !activeMediaModules.has(m.locationId.split('.')[0])) return false;
            if (activeMediaFilterMissingId && !isMissingId(m.entryId)) return false;
            if (activeMediaFilterTypes.size > 0 && !activeMediaFilterTypes.has(m.kalturaType)) return false;
            return true;
        });

        const expAudio = courseAudio.filter(m => {
            if (!m.locationId || !activeMediaModules.has(m.locationId.split('.')[0])) return false;
            if (activeMediaFilterMissingId && !isMissingId(m.entryId)) return false;
            if (activeMediaFilterTypes.size > 0 && !activeMediaFilterTypes.has(m.kalturaType)) return false;
            return true;
        });

        const expInteractives = courseInteractives.filter(m => m.locationId && activeMediaModules.has(m.locationId.split('.')[0]));

        const glossaryQuery = document.getElementById('glossary-search') ? document.getElementById('glossary-search').value.toLowerCase() : '';
        const expGlossary = courseGlossary.filter(g => {
            const inModule = g.locations.some(loc => activeMediaModules.has(loc.split('.')[0]));
            if (!inModule) return false;
            if (showOnlyDuplicates && g.locations.length <= 1) return false;
            if (glossaryQuery && !g.title.toLowerCase().includes(glossaryQuery) && !g.definition.toLowerCase().includes(glossaryQuery)) return false;
            if (activeGlossaryLetters.size > 0) {
                let letter = g.title.charAt(0).toUpperCase();
                if (!/[A-Z]/.test(letter)) letter = '#';
                if (!activeGlossaryLetters.has(letter)) return false;
            }
            return true;
        });

        if (expVideos.length === 0 && expAudio.length === 0 && expInteractives.length === 0 && expGlossary.length === 0) {
            showToast("No active media found to export.", "error");
            return;
        }

        if (typeof XLSX === 'undefined') {
            showToast("Excel library failed to load.", "error");
            return;
        }

        try {
            const wb = XLSX.utils.book_new();

            const borderStyle = {
                top: { style: "thin", color: { rgb: "BFBFBF" } },
                bottom: { style: "thin", color: { rgb: "BFBFBF" } },
                left: { style: "thin", color: { rgb: "BFBFBF" } },
                right: { style: "thin", color: { rgb: "BFBFBF" } }
            };

            const sHeader = { font: { bold: true, color: { rgb: "FFFFFF" }, sz: 12 }, fill: { fgColor: { rgb: "1C355E" } }, alignment: { horizontal: "center", vertical: "center" }, border: borderStyle }; 
            const sText = { alignment: { wrapText: true, vertical: "top" }, border: borderStyle };
            const sLocation = { alignment: { horizontal: "center", vertical: "top" }, border: borderStyle };
            const sID = { font: { name: "Consolas" }, alignment: { horizontal: "center", vertical: "top" }, border: borderStyle };

            const sLocationWrap = { alignment: { horizontal: "center", vertical: "top", wrapText: true }, border: borderStyle };
            const sHighlightLoc = { fill: { fgColor: { rgb: "FFFF99" } }, alignment: { horizontal: "center", vertical: "top", wrapText: true }, border: borderStyle };
            const sHighlightText = { fill: { fgColor: { rgb: "FFFF99" } }, alignment: { wrapText: true, vertical: "top" }, border: borderStyle };

            if (expVideos.length > 0) {
                let vRows = [[ {v: "Location", s: sHeader}, {v: "Kaltura ID", s: sHeader}, {v: "Title", s: sHeader}, {v: "Type", s: sHeader} ]];
                expVideos.forEach(m => {
                    vRows.push([{v: m.locationId || "", s: sLocation}, {v: m.entryId || "Unknown", s: sID}, {v: m.title || "", s: sText}, {v: m.kalturaType || "", s: sText}]);
                });
                const wsV = XLSX.utils.aoa_to_sheet(vRows);
                wsV['!cols'] = [{wch: 15}, {wch: 15}, {wch: 60}, {wch: 15}];
                wsV['!views'] = [{showGridLines: false}];
                XLSX.utils.book_append_sheet(wb, wsV, getSafeSheetName(wb, "Videos"));
            }

            if (expAudio.length > 0) {
                let aRows = [[ {v: "Location", s: sHeader}, {v: "Kaltura ID", s: sHeader}, {v: "Title", s: sHeader}, {v: "Type", s: sHeader} ]];
                expAudio.forEach(m => {
                    aRows.push([{v: m.locationId || "", s: sLocation}, {v: m.entryId || "Unknown", s: sID}, {v: m.title || "", s: sText}, {v: m.kalturaType || "", s: sText}]);
                });
                const wsA = XLSX.utils.aoa_to_sheet(aRows);
                wsA['!cols'] = [{wch: 15}, {wch: 15}, {wch: 60}, {wch: 15}];
                wsA['!views'] = [{showGridLines: false}];
                XLSX.utils.book_append_sheet(wb, wsA, getSafeSheetName(wb, "Audio"));
            }

            if (expInteractives.length > 0) {
                let iRows = [[ {v: "Location", s: sHeader}, {v: "Title", s: sHeader}, {v: "Folder Name", s: sHeader} ]];
                expInteractives.forEach(m => {
                    let cleanLoc = m.locationId ? m.locationId.replace(/\.INT-\d+/i, '') : "";
                    iRows.push([{v: cleanLoc, s: sLocation}, {v: m.title || "", s: sText}, {v: m.folder || "", s: sText}]);
                });
                const wsI = XLSX.utils.aoa_to_sheet(iRows);
                wsI['!cols'] = [{wch: 15}, {wch: 60}, {wch: 30}];
                wsI['!views'] = [{showGridLines: false}];
                XLSX.utils.book_append_sheet(wb, wsI, getSafeSheetName(wb, "Interactives"));
            }

            if (expGlossary.length > 0) {
                let gRows = [[ {v: "Location", s: sHeader}, {v: "Term", s: sHeader}, {v: "Definition", s: sHeader} ]];
                expGlossary.forEach(g => {
                    const isDup = g.locations && g.locations.length > 1;
                    const locStyle = isDup ? sHighlightLoc : sLocationWrap;
                    const termStyle = isDup ? sHighlightText : sText;
                    const locsJoined = g.locations ? g.locations.join('\n') : "";
                    const cleanDef = g.definition ? stripHtml(g.definition) : "";
                    gRows.push([{v: locsJoined, s: locStyle}, {v: g.title || "", s: termStyle}, {v: cleanDef, s: sText}]);
                });
                const wsG = XLSX.utils.aoa_to_sheet(gRows);
                wsG['!cols'] = [{wch: 15}, {wch: 30}, {wch: 80}]; 
                wsG['!views'] = [{showGridLines: false}];
                XLSX.utils.book_append_sheet(wb, wsG, getSafeSheetName(wb, "Glossary"));
            }

            let filename = "Course_Media_Report.xlsx";
            if (typeof customCourseName !== 'undefined' && customCourseName) {
                filename = `${customCourseName.replace(/[^a-z0-9]/gi, '_')}_Media_Report.xlsx`;
            }

            const wbout = XLSX.write(wb, {bookType:'xlsx', type:'array'});
            const blob = new Blob([wbout], {type:"application/octet-stream"});
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement("a");
            document.body.appendChild(a);
            a.href = url;
            a.download = filename;
            a.click();
            
            setTimeout(() => {
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            }, 0);

        } catch (e) {
            console.error(e);
            showToast("Export error: " + e.message, "error");
        }
    };

    // --- CLIPBOARD LOGIC ---
    window.copyTextToClipboard = function(event, text, btnElement) {
        event.stopPropagation(); 
        navigator.clipboard.writeText(text).then(() => {
            const originalIcon = btnElement.innerHTML;
            btnElement.innerHTML = SVGS.check;
            setTimeout(() => { btnElement.innerHTML = originalIcon; }, 1500);
        }).catch(err => {
            console.error('Failed to copy text: ', err);
            btnElement.innerHTML = SVGS.x;
        });
    };

    // --- DASHBOARD / HUB LOGIC ---
    function buildValidModuleList() {
        validModules = [];
        activeMediaModules.clear(); 
        if (!courseTree.modules) return;
        courseTree.modules.forEach(mod => {
            const modTitle = String(mod.title || "").toLowerCase();
            const modID = String(mod.mID || "").toLowerCase();
            const isIgnoredTitle = IGNORE_TITLES.some(k => modTitle.includes(k));
            const isIgnoredID = IGNORE_IDS.includes(modID);
            if (!isIgnoredTitle && !isIgnoredID) {
                validModules.push(mod);
                activeMediaModules.add(padNum(mod.num));
            }
        });
    }

    function renderDashboardGrid() {
        elements.dashboardGrid.innerHTML = '';
        if(validModules.length === 0) {
             elements.dashboardGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#999; padding:40px;">No modules found.</div>';
             return;
        }
        
        const fragment = document.createDocumentFragment();

        validModules.forEach((mod, index) => {
            const modNum = padNum(mod.num);
            let lessonCount = mod.lessons ? mod.lessons.length : 0;
            let pageCount = 0;
            
            let moduleHasIssues = false;

            if (mod.lessons) {
                for (const lesson of mod.lessons) {
                    if(lesson.pages) pageCount += lesson.pages.length;

                    const reqContent = lesson._reqContent !== false; 
                    const hasTopic = !!lesson._topic;
                    const hasObj = lesson._parsedObjectives && lesson._parsedObjectives.length > 0;
                    
                    if (reqContent && (!hasTopic || !hasObj)) {
                        moduleHasIssues = true;
                    }

                    const reqStd = lesson._reqStd !== false;
                    if (reqStd && lesson.pages) {
                        for (const p of lesson.pages) {
                            if (!p._parsedStandards || p._parsedStandards.length === 0) {
                                moduleHasIssues = true;
                            }
                        }
                    }
                }
            }

            const statusColor = moduleHasIssues ? "#dc3545" : "#28a745"; 
            const statusIcon = moduleHasIssues ? `${SVGS.alert} Needs Attention` : `${SVGS.check} All Good`;
            const statusBg = moduleHasIssues ? "#fff5f5" : "#e6f9e9";
            const statusBorder = moduleHasIssues ? "#ffaeb5" : "#c3e6cb";

            const card = document.createElement('div');
            card.className = 'module-card';
            card.onclick = () => openModuleDetail(index);
            card.style.borderLeftColor = statusColor;
            
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <div class="mc-header">Module ${modNum}</div>
                        <div class="mc-title">${mod.title}</div>
                    </div>
                    <div style="font-size:0.75rem; font-weight:bold; color:${statusColor}; background:${statusBg}; border:1px solid ${statusBorder}; padding:4px 8px; border-radius:12px; white-space:nowrap; display:flex; align-items:center; gap: 4px;">
                        ${statusIcon}
                    </div>
                </div>
                <div class="mc-stats">
                    <div class="mc-stat-item"><span style="color:var(--primary);">${SVGS.folder}</span> ${lessonCount} Lessons</div>
                    <div class="mc-stat-item"><span style="color:var(--primary);">${SVGS.fileText}</span> ${pageCount} Pages</div>
                </div>
            `;
            fragment.appendChild(card);
        });

        elements.dashboardGrid.appendChild(fragment);
    }

    window.openModuleDetail = function(index) {
        currentModuleIndex = index;
        elements.dashboardGrid.style.display = 'none';
        elements.auditTopBar.style.display = 'none'; // Hide the dashboard specific top bar
        elements.auditDetailArea.style.display = 'block';
        renderModuleDetail();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        saveAppState(); 
    }

    window.navModule = function(direction) {
        if (validModules.length === 0) return;
        let newIndex = currentModuleIndex + direction;
        if (newIndex < 0) newIndex = validModules.length - 1; 
        else if (newIndex >= validModules.length) newIndex = 0;
        currentModuleIndex = newIndex;
        renderModuleDetail();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        saveAppState(); 
    }

    function renderModuleDetail(autoExpand = true) {
        const container = elements.auditDetailContent;
        container.innerHTML = '';
        
        const fragment = document.createDocumentFragment();

        if(autoExpand) {
            isAllExpanded = false;
            if(elements.gapToggle.checked) isAllExpanded = true;
        }
        updateToggleButton();
        const mod = validModules[currentModuleIndex];
        const modNum = padNum(mod.num);
        const titleDiv = document.createElement('div');
        titleDiv.className = 'module-detail-title';
        titleDiv.innerHTML = `Module ${modNum}: ${mod.title}`;
        fragment.appendChild(titleDiv);
        if (mod.lessons) {
            mod.lessons.forEach(lesson => {
                fragment.appendChild(renderLessonBlock(lesson, modNum));
            });
        }
        
        container.appendChild(fragment);

        if(autoExpand) applyExpansionState(isAllExpanded);
    }

    function renderLessonBlock(lesson, modNum) {
        const details = document.createElement('details');
        
        const hasTopic = !!lesson._topic;
        const hasObj = lesson._parsedObjectives && lesson._parsedObjectives.length > 0;
        const contentPass = !lesson._reqContent || (hasTopic && hasObj); 
        
        let standardsPass = true;
        if (lesson._reqStd) {
            if (lesson.pages && lesson.pages.length > 0) {
                lesson.pages.forEach(p => {
                    if (!p._parsedStandards || p._parsedStandards.length === 0) standardsPass = false;
                });
            } else {
                standardsPass = false;
            }
        }
        
        const isLessonGapFree = contentPass && standardsPass;
        
        let cssClass = 'audit-lesson';
        if (isLessonGapFree) cssClass += ' lesson-complete'; 
        else cssClass += ' lesson-has-gaps'; 
        details.className = cssClass;
        
        const lesNum = padNum(lesson.num);
        const fullLesID = `${modNum}.${lesNum}`;
        details.id = `lesson-${fullLesID}`;
        details.addEventListener('toggle', () => saveAppState());
        
        let healthBadges = `<div style="margin-left: auto; display: flex; gap: 6px;">`;
        if (!lesson._reqContent && !lesson._reqStd) {
            healthBadges += `<span class="status-badge neutral" style="margin-left:0;">NOT REQUIRED</span>`;
        } else {
            if (lesson._reqContent) {
                healthBadges += hasTopic 
                    ? `<span class="status-badge present" style="margin-left:0;">TOPIC</span>` 
                    : `<span class="status-badge missing" style="margin-left:0;">NO TOPIC</span>`;
                healthBadges += hasObj 
                    ? `<span class="status-badge present" style="margin-left:0;">OBJS</span>` 
                    : `<span class="status-badge missing" style="margin-left:0;">NO OBJS</span>`;
            }
            if (lesson._reqStd) {
                healthBadges += standardsPass 
                    ? `<span class="status-badge present" style="margin-left:0;">STDS</span>` 
                    : `<span class="status-badge missing" style="margin-left:0;">NO STDS</span>`;
            }
        }
        healthBadges += `</div>`;

        const summary = document.createElement('summary');
        summary.className = 'lesson-summary';
        summary.innerHTML = `<span class="id-number">${fullLesID}</span>
                             <span>${lesson.title}</span>
                             ${healthBadges}`;
                             
        const contentDiv = document.createElement('div');
        contentDiv.className = 'audit-lesson-content';
        
        const topicBox = document.createElement('div');
        if (lesson._topic) {
             topicBox.className = 'topic-box present status-good'; 
             topicBox.innerHTML = `<div class="topic-title">Lesson Topic</div><div class="topic-content">${lesson._topic}</div>`;
        } else if (!lesson._reqContent) {
             topicBox.className = 'topic-box neutral status-neutral'; 
             topicBox.innerHTML = `<div class="topic-title">Lesson Topic</div><div class="topic-content topic-neutral">Not required for this lesson.</div>`;
        } else {
             topicBox.className = 'topic-box missing';
             topicBox.innerHTML = `<div class="topic-title">Lesson Topic</div><div class="topic-content topic-missing">No topic listed.</div>`;
        }
        contentDiv.appendChild(topicBox);
        
        if (hasObj) {
            const objBox = document.createElement('div');
            objBox.className = 'objectives-box status-good';
            objBox.innerHTML = `<div class="obj-title">Learning Objectives</div>
                                <ul class="obj-list">
                                    ${lesson._parsedObjectives.map(o => `<li>${o}</li>`).join('')}
                                </ul>`;
            contentDiv.appendChild(objBox);
        } else if (!lesson._reqContent) {
            // Do nothing
        } else {
            const emptyBox = document.createElement('div');
            emptyBox.className = 'objectives-box'; 
            emptyBox.style.color = "#dc3545";
            emptyBox.innerHTML = "<em>No objectives listed in sitemap</em>";
            contentDiv.appendChild(emptyBox);
        } 
        
        const allSame = checkIdenticalStandards(lesson.pages);
        if(allSame) {
            const stdBox = document.createElement('div');
            stdBox.className = 'standards-box status-good'; 
            const firstPageStds = lesson.pages && lesson.pages.length > 0 ? lesson.pages[0]._parsedStandards : null;
            let stdHTML = `<div class="std-title">Standards applied to all pages of this lesson</div>`;
            if(firstPageStds && firstPageStds.length > 0) {
                stdHTML += `<table class="standards-table">
                            ${firstPageStds.map(s => `
                                <tr>
                                    <td class="std-group">${s.group}</td>
                                    <td class="std-code-cell"><span class="std-code">${s.code}</span></td>
                                    <td class="std-desc">${s.statement}</td>
                                    <td class="std-grade">${s.grade}</td>
                                </tr>
                            `).join('')}
                         </table>`;
            } else if (!lesson._reqStd) {
                 stdHTML += `<div style="color:#666; font-style:italic;">Standards not required for this lesson.</div>`;
            } else {
                 stdHTML += `<div style="color:#dc3545; font-weight:bold;">No standards found on any page.</div>`;
            }
            stdBox.innerHTML = stdHTML;
            contentDiv.appendChild(stdBox);
        } else {
            if (lesson.pages) {
                lesson.pages.forEach(page => {
                    contentDiv.appendChild(renderPageBlock(page, fullLesID, lesson._reqStd));
                });
            }
        }
        details.appendChild(summary);
        details.appendChild(contentDiv);
        return details;
    }

    function renderPageBlock(page, parentID, reqStd) {
        const div = document.createElement('div');
        const standards = page._parsedStandards;
        const hasStandards = standards && standards.length > 0;
        const isGood = hasStandards || !reqStd;
        div.className = isGood ? 'audit-page page-complete' : 'audit-page page-incomplete';
        const pgNum = padNum(Number(page.num) + 1); 
        const fullPgID = `${parentID}.${pgNum}`;
        let stdBadge = '';
        if(!reqStd) stdBadge = `<span class="status-badge neutral">Not Required</span>`;
        else if (hasStandards) stdBadge = `<span class="status-badge present">${standards.length} Standards</span>`;
        else stdBadge = `<span class="status-badge missing">No Standards</span>`;
        let html = `<div class="page-header">
                        <span class="id-number">${fullPgID}</span>
                        ${page.title} 
                        ${stdBadge}
                    </div>`;
        if (hasStandards) {
            html += `<table class="standards-table status-good">
                        ${standards.map(s => `
                            <tr>
                                <td class="std-group">${s.group}</td>
                                <td class="std-code-cell"><span class="std-code">${s.code}</span></td>
                                <td class="std-desc">${s.statement}</td>
                                <td class="std-grade">${s.grade}</td>
                            </tr>
                        `).join('')}
                     </table>`;
        } 
        div.innerHTML = html;
        return div;
    }

    function checkIdenticalStandards(pages) {
        if (!pages || pages.length === 0) return false;
        const getCodes = (p) => {
            if(!p._parsedStandards || p._parsedStandards.length === 0) return "NONE";
            return p._parsedStandards.map(s => s.code).sort().join('|');
        };
        const firstCodes = getCodes(pages[0]);
        if(firstCodes === "NONE") return false; 
        for (let i = 1; i < pages.length; i++) {
            if (getCodes(pages[i]) !== firstCodes) return false;
        }
        return true;
    }

    // --- ROBUST GENERATOR WITH ERROR HANDLING ---
    function generateSpreadsheet() {
        if (typeof XLSX === 'undefined') {
            showToast("Excel library failed to load.", "error");
            return;
        }

        if (!validModules || validModules.length === 0) {
            showToast("No modules found to export.", "error");
            return;
        }

        try {
            const wb = XLSX.utils.book_new();

            const sHeader = { font: { bold: true, color: { rgb: "FFFFFF" }, sz: 12 }, fill: { fgColor: { rgb: "1C355E" } }, alignment: { horizontal: "center", vertical: "center" } }; 
            const sModRow = { font: { bold: true, color: { rgb: "1C355E" }, sz: 12 }, fill: { fgColor: { rgb: "F6BF41" } } }; 
            const sLesBar = { font: { bold: true }, fill: { fgColor: { rgb: "E7E6E6" } }, border: { top: { style: "thin" }, bottom: { style: "thin" } }, alignment: { vertical: "center" } };
            const sGap = { font: { color: { rgb: "9C0006" } }, fill: { fgColor: { rgb: "FFC7CE" } }, alignment: { horizontal: "center", vertical: "center" } }; 
            const sGood = { font: { color: { rgb: "006100" } }, fill: { fgColor: { rgb: "C6EFCE" } }, alignment: { horizontal: "center", vertical: "center" } }; 
            const sNeutral = { font: { color: { rgb: "44546A" } }, fill: { fgColor: { rgb: "E7E6E6" } }, alignment: { horizontal: "center", vertical: "center" } }; 
            const sText = { alignment: { wrapText: true, vertical: "top" } };
            const sTextBold = { font: { bold: true }, alignment: { wrapText: true, vertical: "top" } };
            const sCode = { font: { name: "Consolas", sz: 10 }, alignment: { wrapText: true, vertical: "top" } };

            let objRows = [
                [
                    {v: "Module", s: sHeader}, 
                    {v: "ID", s: sHeader}, 
                    {v: "Lesson Title", s: sHeader}, 
                    {v: "Status", s: sHeader},
                    {v: "Topic", s: sHeader},
                    {v: "Objectives", s: sHeader}
                ]
            ];
            
            let objRowMeta = [{level: 0}]; 

            validModules.forEach(mod => {
                const modNum = padNum(mod.num);
                objRows.push([
                    {v: `MODULE ${modNum}: ${mod.title}`, s: sModRow},
                    {v: "", s: sModRow}, {v: "", s: sModRow}, {v: "", s: sModRow}, {v: "", s: sModRow}, {v: "", s: sModRow}
                ]);
                objRowMeta.push({level: 0}); 

                if (mod.lessons) {
                    mod.lessons.forEach(lesson => {
                        const fullLesID = `${modNum}.${padNum(lesson.num)}`;
                        const reqContent = lesson._reqContent; 
        
                        let statusCell = {v: "✅ OK", s: sGood};
                        
                        if (!reqContent) {
                            statusCell = {v: "Not Required", s: sNeutral}; 
                        } 
                        else {
                            let isMissingTopic = !lesson._topic;
                            let isMissingObjs = !lesson._parsedObjectives || lesson._parsedObjectives.length === 0;
                            if (isMissingTopic || isMissingObjs) {
                                let issues = [];
                                if(isMissingTopic) issues.push("Topic");
                                if(isMissingObjs) issues.push("Objs");
                                statusCell = {v: "MISSING: " + issues.join(" & "), s: sGap};
                            }
                        }

                        const topicText = lesson._topic || (!reqContent ? "(Not Required)" : "MISSING");
                        const objText = (lesson._parsedObjectives && lesson._parsedObjectives.length > 0) 
                            ? lesson._parsedObjectives.map(o => "• " + o).join("\r\n") 
                            : (!reqContent ? "(Not Required)" : "MISSING");

                        objRows.push([
                            {v: "Lesson", s: sText},
                            {v: fullLesID, s: sText},
                            {v: lesson.title, s: sTextBold},
                            statusCell,
                            {v: topicText, s: sText},
                            {v: objText, s: sText}
                        ]);
                        objRowMeta.push({level: 1, hidden: false}); 
                    });
                }
            });

            const wsObj = XLSX.utils.aoa_to_sheet(objRows);
            wsObj['!cols'] = [{wch:10}, {wch:12}, {wch:40}, {wch:20}, {wch:40}, {wch:60}];
            wsObj['!rows'] = objRowMeta; 
            
            if(!wsObj['!merges']) wsObj['!merges'] = [];
            objRows.forEach((row, idx) => {
                if(row[0].v.toString().startsWith("MODULE")) {
                    wsObj['!merges'].push({s:{r:idx, c:0}, e:{r:idx, c:5}});
                }
            });
            XLSX.utils.book_append_sheet(wb, wsObj, "Content Map");

            let stdRows = [
                [
                    {v: "Module", s: sHeader}, 
                    {v: "ID", s: sHeader}, 
                    {v: "Context (Lesson/Page)", s: sHeader}, 
                    {v: "Check", s: sHeader},
                    {v: "Standards Codes", s: sHeader}
                ]
            ];

            let stdRowMeta = [{level: 0}];

            validModules.forEach(mod => {
                const modNum = padNum(mod.num);
                stdRows.push([
                    {v: `MODULE ${modNum}: ${mod.title}`, s: sModRow},
                    {v: "", s: sModRow}, {v: "", s: sModRow}, {v: "", s: sModRow}, {v: "", s: sModRow}
                ]);
                stdRowMeta.push({level: 0}); 

                if (mod.lessons) {
                    mod.lessons.forEach(lesson => {
                        const fullLesID = `${modNum}.${padNum(lesson.num)}`;
                        const reqStd = lesson._reqStd; 
                        const isGrouped = checkIdenticalStandards(lesson.pages);

                        if (isGrouped) {
                            const standards = lesson.pages[0]._parsedStandards || [];
                            const codes = standards.map(s => s.code).join(", ");
                            let status = {v: "✅ OK", s: sGood};
                            if (!reqStd) status = {v: "Not Required", s: sNeutral};
                            else if (standards.length === 0) status = {v: "❌ EMPTY", s: sGap};

                            stdRows.push([
                                {v: "Lesson", s: sLesBar},    
                                {v: fullLesID, s: sLesBar},   
                                {v: lesson.title, s: sLesBar},
                                status,
                                {v: codes || "None", s: sCode}
                            ]);
                            stdRowMeta.push({level: 1}); 

                        } else {
                            stdRows.push([
                                {v: "Lesson", s: sLesBar},                     
                                {v: fullLesID, s: sLesBar},                    
                                {v: lesson.title + " (Mixed)", s: sLesBar},    
                                {v: "⬇", s: sNeutral},
                                {v: "See pages below", s: sNeutral}
                            ]);
                            stdRowMeta.push({level: 1}); 

                            if(lesson.pages) {
                                lesson.pages.forEach(page => {
                                    const pgNum = padNum(Number(page.num) + 1);
                                    const fullPgID = `${fullLesID}.${pgNum}`;
                                    
                                    const stds = page._parsedStandards || [];
                                    const pgCodes = stds.map(s => s.code).join(", ");
                                    
                                    let pgStatus = {v: "OK", s: sGood};
                                    if(!reqStd) pgStatus = {v: "Not Required", s: sNeutral};
                                    else if(stds.length === 0) pgStatus = {v: "EMPTY", s: sGap};

                                    stdRows.push([
                                        {v: "Page", s: sText},
                                        {v: fullPgID, s: sText},
                                        {v: page.title, s: sText},
                                        pgStatus,
                                        {v: pgCodes || "-", s: sCode}
                                    ]);
                                    stdRowMeta.push({level: 1}); 
                                });
                            }
                        }
                    });
                }
            });

            const wsStd = XLSX.utils.aoa_to_sheet(stdRows);
            wsStd['!cols'] = [{wch:15}, {wch:12}, {wch:50}, {wch:15}, {wch:60}]; 
            wsStd['!rows'] = stdRowMeta; 
            
            if(!wsStd['!merges']) wsStd['!merges'] = [];
            stdRows.forEach((row, idx) => {
                if(row[0].v.toString().startsWith("MODULE")) {
                    wsStd['!merges'].push({s:{r:idx, c:0}, e:{r:idx, c:4}});
                }
            });

            let filename = "Course_Audit_Maps.xlsx";
            if(typeof customCourseName !== 'undefined' && customCourseName) {
                const safeName = customCourseName.replace(/[^a-z0-9]/gi, '_');
                filename = `${safeName}_Audit_Maps.xlsx`;
            }

            XLSX.utils.book_append_sheet(wb, wsStd, "Standards Map");

            const wbout = XLSX.write(wb, {bookType:'xlsx', type:'array'});
            const blob = new Blob([wbout], {type:"application/octet-stream"});
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement("a");
            document.body.appendChild(a);
            a.href = url;
            a.download = filename;
            a.click();
            
            setTimeout(() => {
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            }, 0);

        } catch (e) {
            console.error(e);
            showToast("Export error: " + e.message, "error");
        }
    }
</script>
