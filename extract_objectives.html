<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objectives Extractor & Auditor</title>
    
    <script src="https://unpkg.com/docx@7.3.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --success-hover: #059669;
            --warning: #f59e0b;       
            --warning-bg: #fffbeb;    
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            max-height: 90vh;
            overflow: hidden;
            position: relative;
        }

        /* --- Header --- */
        .header-section {
            padding: 2rem 2.5rem 1rem 2.5rem;
            text-align: center;
            position: relative;
            flex-shrink: 0;
        }

        h1 { margin: 0; font-size: 1.5rem; color: var(--text-main); font-weight: 700; letter-spacing: -0.025em; }
        p.subtitle { margin-top: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }

        .reset-link {
            position: absolute;
            top: 20px;
            right: 25px;
            color: #ef4444;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 6px;
            background: #fef2f2;
            transition: all 0.2s;
            display: none;
        }
        .reset-link:hover { background: #fee2e2; }

        /* --- Click Zone --- */
        .drop-wrapper { padding: 0 2.5rem 2.5rem 2.5rem; }
        .click-zone {
            border: 2px dashed #cbd5e1;
            background-color: #f8fafc;
            border-radius: 12px;
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }
        .click-zone:hover {
            border-color: var(--primary);
            background-color: #eff6ff;
            transform: scale(1.005);
        }
        .click-zone input[type=file] {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }
        .icon { font-size: 2.5rem; display: block; margin-bottom: 15px; filter: grayscale(100%); }
        .click-zone:hover .icon { filter: none; }

        /* --- Selection Area --- */
        #selectionArea { display: none; flex-direction: column; height: 100%; overflow: hidden; }
        
        .controls-wrapper {
            padding: 0 2rem;
            flex-shrink: 0;
            background: var(--surface);
            z-index: 10;
        }

        .course-name-group { margin-bottom: 15px; }
        .course-name-group input {
            width: 100%;
            padding: 10px 0;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            border: none;
            border-bottom: 2px solid var(--border);
            outline: none;
            transition: border-color 0.2s;
            background: transparent;
        }
        .course-name-group input:focus { border-bottom-color: var(--primary); }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-muted);
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .text-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            padding: 0;
            font-size: 0.85rem;
        }
        .text-btn:hover { text-decoration: underline; }

        /* --- Scrollable List --- */
        .list-wrapper {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1.5rem 2rem;
            background: #fafafa;
        }

        .module-item {
            background: white;
            border: 1px solid var(--border);
            margin-bottom: 10px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        
        .module-header {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background 0.1s;
            background: white;
        }
        .module-header:hover { background-color: #f8fafc; }

        .arrow-icon {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            color: #94a3b8;
            transition: transform 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .arrow-icon.rotated { transform: rotate(90deg); }
        .arrow-icon.hidden { visibility: hidden; }

        .module-label {
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.95rem;
            flex: 1;
        }

        .module-warning {
            color: var(--warning);
            margin-left: 10px;
            display: flex;
            align-items: center;
            font-size: 1.2rem;
        }

        .no-obj-badge {
            font-size: 0.7rem;
            background-color: #f1f5f9;
            color: #94a3b8;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #cbd5e1;
            margin-left: 8px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .lesson-list {
            background: #f8fafc;
            border-top: 1px solid var(--border);
            display: none; 
            padding: 0; 
        }
        .lesson-list.show { display: block; }

        .lesson-item {
            display: flex;
            flex-direction: column; 
            padding: 8px 15px 8px 52px;
            border-bottom: 1px solid #f9f9f9;
            transition: background 0.2s;
        }
        .lesson-item:not(.empty):hover { background: #f1f5f9; }

        .lesson-row-main {
            display: flex;
            align-items: center;
            width: 100%;
        }

        .lesson-item.empty {
            opacity: 0.6;
            background-color: #f8fafc;
        }
        .lesson-item.empty label {
            cursor: not-allowed;
            color: #94a3b8;
        }
        
        .lesson-item.empty.included {
            opacity: 1;
        }
        .lesson-item.empty.included label {
            cursor: pointer;
            color: var(--text-main);
        }
        .lesson-item.empty.included .no-obj-badge {
            background-color: #e0f2fe; 
            color: #0284c7;
            border-color: #bae6fd;
        }

        /* Objectives Preview Styling */
        .objective-preview {
            margin-top: 6px;
            margin-left: 32px; 
            font-size: 0.85rem;
            color: #475569;
            display: none; /* Default Hidden */
        }
        .objective-preview ul {
            margin: 0;
            padding-left: 18px;
        }
        .objective-preview li {
            margin-bottom: 4px;
        }
        
        /* Global Toggle Class applied to parent list wrapper */
        .list-wrapper.show-objectives .objective-preview {
            display: block;
        }

        /* --- Footer --- */
        .footer-action {
            padding: 1.5rem 2rem;
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .generate-btn {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .generate-btn:hover { background-color: var(--success-hover); transform: translateY(-1px); }
        .generate-btn:disabled { background-color: #cbd5e1; cursor: not-allowed; transform: none; }

        input[type="checkbox"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
            border-radius: 4px;
        }

        .list-wrapper::-webkit-scrollbar { width: 8px; }
        .list-wrapper::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .list-wrapper::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        #status { margin-top: 15px; font-weight: 500; font-size: 0.9rem; min-height: 20px;}
        .error { color: #ef4444; }
    </style>
</head>
<body>

<div class="container">
    
    <div class="header-section">
        <h1>Objectives Extractor</h1>
        <p class="subtitle">Extract Objectives into Word Format</p>
        <a id="resetBtn" class="reset-link" onclick="resetApp()">Start Over</a>
    </div>

    <div class="drop-wrapper" id="dropWrapper">
        <div class="click-zone" id="clickZone">
            <span class="icon">📂</span>
            <p style="margin:0; font-weight:500; color:var(--text-main); font-size: 1.1rem;">Click to select Course Folder</p>
            <input type="file" id="fileInput" webkitdirectory directory />
        </div>
        <div id="status"></div>
    </div>

    <div id="selectionArea">
        <div class="controls-wrapper">
            <div class="course-name-group">
                <input type="text" id="courseNameInput" placeholder="Enter Course Name" aria-label="Course Name">
            </div>

            <div class="toolbar">
                <div class="toolbar-left">
                    <label style="cursor: pointer; display: flex; align-items: center;">
                        <input type="checkbox" id="includeEmptyCheck" onchange="toggleEmptyLessons()"> 
                        Include empty lessons
                    </label>
                    <label style="cursor: pointer; display: flex; align-items: center;">
                        <input type="checkbox" id="showObjectivesCheck" onchange="toggleShowObjectives()" checked> 
                        Show objectives text
                    </label>
                </div>
                <button class="text-btn" id="expandToggleBtn" onclick="toggleAllAccordions()">Expand All</button>
            </div>
        </div>

        <div class="list-wrapper show-objectives" id="checklistContainer"></div>
        
        <div class="footer-action">
            <button class="generate-btn" id="generateBtn" onclick="generateSelectedDoc()">
                <span>Generate Document</span>
            </button>
        </div>
    </div>
</div>

<script>
    let globalCourseData = null;
    let allExpanded = false;

    const chevronRight = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>`;
    const warningIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>`;

    window.onload = function() {
        if (typeof docx === 'undefined') {
            showError("⚠️ Error: Libraries failed to load. Check internet connection.");
        }
    };

    const fileInput = document.getElementById('fileInput');

    // --- Click/Browse Folder Logic ---
    fileInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        document.getElementById('status').textContent = "Scanning folder for sitemap.json...";
        document.getElementById('status').className = "";

        // Look for sitemap.json inside global/data/
        let sitemapFile = files.find(f => f.name === 'sitemap.json' && f.webkitRelativePath.includes('global/data/'));
        
        // Fallback if the user just clicked a folder already inside data
        if (!sitemapFile) {
            sitemapFile = files.find(f => f.name === 'sitemap.json');
        }

        if (sitemapFile) {
            processFile(sitemapFile);
        } else {
            showError("Could not find sitemap.json in the selected folder.");
        }
        
        // Clear input to allow re-selecting the same folder if needed
        fileInput.value = "";
    });

    // --- Processing the single file ---
    function processFile(file) {
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                let rawText = e.target.result.replace(/^\uFEFF/, '').trim();
                const jsonContent = JSON.parse(rawText);
                const rawModules = jsonContent.modules || jsonContent;

                if (!Array.isArray(rawModules)) throw new Error("Invalid JSON structure: No 'modules' list found.");

                // 1. DETERMINE COURSE NAME
                let defaultCourseName = "name_of_course";
                const gettingStartedMod = rawModules.find(m => (m.title || "").trim() === "Getting Started");
                
                if (gettingStartedMod && gettingStartedMod.lessons) {
                    const thingsToKnowLesson = gettingStartedMod.lessons.find(l => (l.title || "").trim() === "Things to Know");
                    
                    if (thingsToKnowLesson && thingsToKnowLesson.pages && thingsToKnowLesson.pages.length > 0) {
                        const firstPageTitle = (thingsToKnowLesson.pages[0].title || "").trim();
                        if (firstPageTitle && firstPageTitle !== "Things to Know") {
                            defaultCourseName = firstPageTitle;
                        }
                    }
                }

                // 2. FILTERING LOGIC
                const excludedTitles = ["Welcome", "Getting Started", "WDS Style Guide"];
                
                const filteredModules = rawModules.filter(mod => {
                    const title = (mod.title || "").trim();
                    return !excludedTitles.includes(title);
                });

                // 3. INITIALIZE STATE
                globalCourseData = filteredModules.map(mod => {
                    const lessons = mod.lessons || [];
                    
                    let hasAnyValidContent = false;
                    lessons.forEach(l => {
                        l.isSelected = true; 
                        const hasObjs = l.objectives && l.objectives.items && l.objectives.items.length > 0;
                        if(hasObjs) hasAnyValidContent = true;
                    });
                    
                    mod.isSelected = hasAnyValidContent; 
                    mod.isExpanded = false; // Track expansion state
                    return mod;
                });

                renderCheckboxes(globalCourseData);
                
                document.getElementById('courseNameInput').value = defaultCourseName;
                document.getElementById('status').textContent = "";
                document.getElementById('dropWrapper').style.display = 'none';
                document.getElementById('selectionArea').style.display = 'flex';
                document.getElementById('resetBtn').style.display = 'block';

            } catch (error) {
                showError(`Error parsing sitemap.json: ${error.message}`);
            }
        };
        reader.readAsText(file, "UTF-8");
    }

    function resetApp() {
        if(!confirm("Start over? Your current selections will be lost.")) return;
        
        globalCourseData = null;
        allExpanded = false;
        document.getElementById('expandToggleBtn').textContent = "Expand All";
        document.getElementById('fileInput').value = "";
        document.getElementById('checklistContainer').innerHTML = "";
        document.getElementById('status').textContent = "";
        document.getElementById('courseNameInput').value = "";
        document.getElementById('includeEmptyCheck').checked = false; 
        
        // Reset Objectives Toggle to Default (Checked)
        document.getElementById('showObjectivesCheck').checked = true;
        document.getElementById('checklistContainer').classList.add('show-objectives');
        
        document.getElementById('selectionArea').style.display = 'none';
        document.getElementById('resetBtn').style.display = 'none';
        document.getElementById('dropWrapper').style.display = 'block';
    }

    function showError(msg) {
        const s = document.getElementById('status');
        s.textContent = msg;
        s.className = "error";
    }

    function toggleEmptyLessons() {
        if(globalCourseData) renderCheckboxes(globalCourseData);
    }
    
    function toggleShowObjectives() {
        const container = document.getElementById('checklistContainer');
        const isChecked = document.getElementById('showObjectivesCheck').checked;
        if(isChecked) container.classList.add('show-objectives');
        else container.classList.remove('show-objectives');
    }

    function renderCheckboxes(modules) {
        const container = document.getElementById('checklistContainer');
        const includeEmpty = document.getElementById('includeEmptyCheck').checked;
        container.innerHTML = ""; 

        modules.forEach((mod, mIndex) => {
            if (!mod.mID || !mod.title) return;

            const lessons = mod.lessons || [];
            const hasLessons = lessons.length > 0;
            
            // Check for missing objs
            let missingObjectives = false;
            lessons.forEach(l => {
                const lHasObjs = l.objectives && l.objectives.items && l.objectives.items.length > 0;
                if(!lHasObjs) missingObjectives = true;
            });
            if(!hasLessons) missingObjectives = false; 

            const modDiv = document.createElement('div');
            modDiv.className = 'module-item';

            // --- Module Header ---
            const modHeader = document.createElement('div');
            modHeader.className = 'module-header';
            
            const iconSpan = document.createElement('span');
            iconSpan.className = 'arrow-icon';
            if(hasLessons) {
                iconSpan.innerHTML = chevronRight;
                if(mod.isExpanded) iconSpan.classList.add('rotated');
            } else {
                iconSpan.classList.add('hidden');
            }

            const modCheck = document.createElement('input');
            modCheck.type = 'checkbox';
            modCheck.id = `mod-${mIndex}`;
            modCheck.className = 'module-checkbox'; 
            modCheck.checked = mod.isSelected;

            modCheck.addEventListener('click', (e) => e.stopPropagation());
            modCheck.addEventListener('change', function() {
                mod.isSelected = this.checked;
                lessons.forEach(l => l.isSelected = this.checked);
                
                // Visual update only
                const childChecks = document.querySelectorAll(`.lesson-check-${mIndex}:not(:disabled)`);
                childChecks.forEach(c => c.checked = this.checked);
            });

            const modLabel = document.createElement('span');
            modLabel.className = 'module-label';
            modLabel.textContent = `Module 0${mod.mID} ${mod.title}`;

            modHeader.append(iconSpan, modCheck, modLabel);

            if (missingObjectives) {
                const warnSpan = document.createElement('span');
                warnSpan.className = 'module-warning';
                warnSpan.innerHTML = warningIcon;
                warnSpan.title = "Warning: Some lessons in this module do not have objectives.";
                modHeader.appendChild(warnSpan);
            }

            modDiv.appendChild(modHeader);

            // --- Lesson List ---
            if (hasLessons) {
                const lessonContainer = document.createElement('div');
                lessonContainer.className = 'lesson-list';
                
                // Restore state
                if (mod.isExpanded) lessonContainer.classList.add('show');
                
                // Expand/Collapse Logic (Persists State)
                modHeader.addEventListener('click', () => {
                    const isShowing = lessonContainer.classList.contains('show');
                    if (isShowing) {
                        lessonContainer.classList.remove('show');
                        iconSpan.classList.remove('rotated');
                        mod.isExpanded = false;
                    } else {
                        lessonContainer.classList.add('show');
                        iconSpan.classList.add('rotated');
                        mod.isExpanded = true;
                    }
                });

                // Render Lessons
                lessons.forEach((less, lIndex) => {
                    const lDiv = document.createElement('div');
                    lDiv.className = 'lesson-item';

                    const hasObjectives = less.objectives && less.objectives.items && less.objectives.items.length > 0;

                    // Row Content Wrapper (Checkbox + Title)
                    const rowMain = document.createElement('div');
                    rowMain.className = 'lesson-row-main';

                    const lCheck = document.createElement('input');
                    lCheck.type = 'checkbox';
                    lCheck.className = `lesson-check-${mIndex} lesson-checkbox`;
                    lCheck.id = `less-${mIndex}-${lIndex}`;
                    
                    const lLabel = document.createElement('label');
                    lLabel.htmlFor = `less-${mIndex}-${lIndex}`;
                    lLabel.textContent = `0${mod.mID}.0${less.lID} ${less.title}`;
                    lLabel.style.cursor = "pointer";
                    lLabel.style.flex = "1";

                    if (!hasObjectives) {
                        lDiv.classList.add('empty');
                        if (includeEmpty) {
                            lDiv.classList.add('included');
                            lCheck.disabled = false;
                            lCheck.checked = less.isSelected; 
                        } else {
                            lCheck.disabled = true;
                            lCheck.checked = false; 
                            lLabel.style.cursor = "not-allowed";
                        }
                        const noObjBadge = document.createElement('span');
                        noObjBadge.className = 'no-obj-badge';
                        noObjBadge.textContent = "No Objectives";
                        lLabel.appendChild(noObjBadge);
                    } else {
                        lCheck.checked = less.isSelected;
                    }

                    lCheck.addEventListener('change', function() {
                        less.isSelected = this.checked;
                    });

                    rowMain.append(lCheck, lLabel);
                    lDiv.appendChild(rowMain);

                    // Objectives Preview Area (Always generated, hidden via CSS class on container)
                    if (hasObjectives) {
                        const previewDiv = document.createElement('div');
                        previewDiv.className = 'objective-preview';

                        const ul = document.createElement('ul');
                        less.objectives.items.forEach(objText => {
                            const li = document.createElement('li');
                            li.textContent = objText;
                            ul.appendChild(li);
                        });
                        previewDiv.appendChild(ul);
                        lDiv.appendChild(previewDiv);
                    }

                    lessonContainer.appendChild(lDiv);
                });
                modDiv.appendChild(lessonContainer);
            } else {
                modHeader.style.cursor = "default";
            }

            container.appendChild(modDiv);
        });
    }

    function toggleAllAccordions() {
        const allLists = document.querySelectorAll('.lesson-list');
        const allArrows = document.querySelectorAll('.arrow-icon:not(.hidden)');
        const btn = document.getElementById('expandToggleBtn');
        const modules = globalCourseData || [];

        if (allExpanded) {
            allLists.forEach(l => l.classList.remove('show'));
            allArrows.forEach(a => a.classList.remove('rotated'));
            btn.textContent = "Expand All";
            allExpanded = false;
            modules.forEach(m => m.isExpanded = false);
        } else {
            allLists.forEach(l => l.classList.add('show'));
            allArrows.forEach(a => a.classList.add('rotated'));
            btn.textContent = "Collapse All";
            allExpanded = true;
            modules.forEach(m => m.isExpanded = true);
        }
    }

    function generateSelectedDoc() {
        if (!globalCourseData) return;
        
        const btn = document.getElementById('generateBtn');
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>⏳ Generating...</span>`;
        btn.disabled = true;

        setTimeout(() => {
            try {
                let courseName = document.getElementById('courseNameInput').value.trim();
                if (!courseName) courseName = "Course";
                const safeName = courseName.replace(/[^a-z0-9 _-]/gi, '').trim();

                const { Document, Packer, Paragraph, HeadingLevel } = docx;
                const docChildren = [];
                let hasContent = false;

                globalCourseData.forEach((mod, mIndex) => {
                    if (!mod.isSelected) return;

                    docChildren.push(
                        new Paragraph({
                            text: `Module 0${mod.mID} ${mod.title}`,
                            heading: HeadingLevel.HEADING_1,
                            spacing: { before: 400, after: 200 }
                        })
                    );
                    hasContent = true;

                    const lessons = mod.lessons || [];
                    lessons.forEach((less, lIndex) => {
                        const includeEmpty = document.getElementById('includeEmptyCheck').checked;
                        const hasObjectives = less.objectives && less.objectives.items && less.objectives.items.length > 0;
                        
                        if (!hasObjectives && !includeEmpty) return;
                        if (!less.isSelected) return;

                        const objectives = less.objectives?.items || [];
                        
                        docChildren.push(
                            new Paragraph({
                                text: `0${mod.mID}.0${less.lID} ${less.title}`,
                                heading: HeadingLevel.HEADING_2,
                                spacing: { before: 300, after: 100 }
                            })
                        );

                        if (objectives.length > 0) {
                            objectives.forEach(item => {
                                docChildren.push(new Paragraph({ text: item, bullet: { level: 0 } }));
                            });
                        } else {
                            docChildren.push(new Paragraph({ text: "No objectives for this lesson", bullet: { level: 0 } }));
                        }
                    });
                });

                if (!hasContent) {
                    alert("Please select at least one module with valid content.");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    return;
                }

                const doc = new Document({ sections: [{ children: docChildren }] });

                Packer.toBlob(doc).then(blob => {
                    saveAs(blob, `${safeName}_objectives.docx`);
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                });

            } catch (e) {
                console.error(e);
                alert("Error generating file.");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }, 100);
    }
</script>

</body>
</html>
