                        const tocPageDiv = document.createElement('div');
                        tocPageDiv.className = 'toc-page';
                        tocPageDiv.innerHTML = `${fullPgID} ${escapeHtml(page.title)}`;
                        tocPageDiv.onclick = () => {
                            lesDet.open = true; 
                            document.getElementById(pgId).scrollIntoView({behavior: 'smooth'});
                        };
                        tocLesContent.appendChild(tocPageDiv);

                        const pageEntries = courseIndex.filter(idx => idx.locationId === fullPgID || idx.locationId.startsWith(fullPgID + '.INT-'));
                        
                        // Enforce Sequential Order
                        pageEntries.sort((a, b) => a.order - b.order);

                        const pageImages = courseImages.filter(img => img.locationId === fullPgID || img.locationId.startsWith(fullPgID + '.INT-'));
                        const pageVideos = courseVideos.filter(v => v.locationId === fullPgID || v.locationId.startsWith(fullPgID + '.INT-'));
                        const pageAudio = courseAudio.filter(a => a.locationId === fullPgID || a.locationId.startsWith(fullPgID + '.INT-'));

                        const processedTracker = new Set();

                        pageEntries.forEach(pageData => {
                            if (pageData.unlockState && excludedStates.has(pageData.unlockState)) return;
                            let contentText = "";
                            if (pageData.normalClean) contentText += pageData.normalClean + "\r\n";
                            if (pageData.mlClean) contentText += pageData.mlClean + "\r\n";
                            if (pageData.noteClean) contentText += pageData.noteClean + "\r\n";
                            if (pageData.stdClean) contentText += pageData.stdClean + "\r\n";
                            contentText = contentText.trim();

                            let htmlContent = processPlaceholders(contentText, pageImages, pageVideos, pageAudio, processedTracker, options);

                            if (pageData.isInteractive) {
                                if (options.exInt) return;
                                const intMeta = courseInteractives.find(i => i.locationId === pageData.locationId);
                                let tagText = `[Interactive: ${intMeta ? intMeta.title + ' | Folder: ' + intMeta.folder + (intMeta.interactiveType ? ' | Type: ' + intMeta.interactiveType : '') : pageData.filename.split('/').pop()}`;
                                if (contentText) tagText += ` | Content:\r\n${contentText}`;
                                tagText += ']';
                                pgDiv.innerHTML += `<div class="media-tag">${escapeHtml(tagText)}</div>`;
                            } else {
                                if (htmlContent) pgDiv.innerHTML += `<div class="page-text">${htmlContent}</div>`;

                                if (!options.exDocs) {
                                    let match;
                                    const foundDocs = new Set();
                                    while ((match = docRegex.exec(pageData.normalRaw)) !== null) {
                                        const docFilename = match[1].split('/').pop();
                                        if (!foundDocs.has(docFilename)) {
                                            foundDocs.add(docFilename);
                                            pgDiv.innerHTML += `
                                                <div class="media-tag">
                                                    <strong>[Document: ${escapeHtml(docFilename)}</strong> 
                                                    <button class="nav-btn" style="margin-left:10px;" onclick="loadDocContentUI(this, '${docFilename}')">Load Text</button>
                                                    <span>]</span>
                                                </div>`;
                                        }
                                    }
                                }
                            }
                        });

                        const stragglers = getStragglers(pageImages, pageVideos, pageAudio, processedTracker, options.exImgEmpty);
                        stragglers.forEach(txt => {
                            pgDiv.innerHTML += `<div class="media-tag">${escapeHtml(txt)}</div>`;
                        });

                        lesContent.appendChild(pgDiv);
                    });
                }
                
                tocLesDetails.appendChild(tocLesContent);
                tocModContent.appendChild(tocLesDetails);
                lesDet.appendChild(lesContent);
                modDiv.appendChild(lesDet);
            });
        }
        
        tocModDetails.appendChild(tocModContent);
        tocSidebar.appendChild(tocModDetails);
        container.appendChild(modDiv);
    });
}
                
async function loadDocContentUI(btn, filename) {
    btn.innerHTML = "Extracting...";
    btn.disabled = true;
    const text = await extractDocumentText(filename);
    const textSpan = document.createElement('span');
    textSpan.innerHTML = ` | Content:\r\n<span style="font-family:sans-serif; color:var(--text); white-space:pre-wrap;">${escapeHtml(text)}</span>`;
    btn.parentElement.insertBefore(textSpan, btn.nextSibling);
    btn.remove();
}

async function extractDocumentText(filename) {
    let targetFile = null;
    const searchName = filename.split('/').pop().toLowerCase();
    for (const [key, file] of fileMap.entries()) if (key.toLowerCase().endsWith(searchName)) { targetFile = file; break; }
    if (!targetFile) return "\n[Error: Document not found in scanned folder]\n";

    try {
        const arrayBuffer = await targetFile.arrayBuffer();
        if (searchName.endsWith('.pdf')) {
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = "";
            for (let i = 1; i <= pdf.numPages; i++) fullText += (await (await pdf.getPage(i)).getTextContent()).items.map(item => item.str).join(' ') + "\n";
            return fullText.replace(/(?:\r?\n\s*)+/g, '\r\n').trim();
        } else if (searchName.endsWith('.docx')) {
            return (await mammoth.extractRawText({ arrayBuffer })).value.replace(/(?:\r?\n\s*)+/g, '\r\n').trim();
        }
        return "\n[Notice: Text extraction not supported for this file type]\n";
    } catch (e) { return `\n[Error: Failed to parse document content - ${e.message}]\n`; }
}

function executeExport() {
    const isSingle = document.querySelector('input[name="exp-type"]:checked').value === 'single';
    document.getElementById('export-modal').classList.remove('active');
    
    if (isSingle) {
        exportFullCourse();
    } else {
        const selectedIds = Array.from(document.querySelectorAll('.mod-exp-cb:checked')).map(cb => cb.value);
        if (selectedIds.length === 0) return showToast("Please select at least one module to export.", "error");
        exportSeparateModules(selectedIds);
    }
}

// ── EXPORT PROCESSORS ──────────────────────────────────────────────────────

async function buildModuleDocumentContent(mod, options) {
    let docContent = "";
    const addLine = (text = "") => { docContent += text + "\r\n"; };
    const docRegex = /href=["']([^"']+\.(pdf|docx))["']/gi;
    const excludedStates = getExcludedStates();

    if (isExcludedByGlState(mod, excludedStates)) return docContent;

    const modNum = padNum(mod.num);
    addLine(`${modNum} ${mod.title}`);

    if (!mod.lessons) return docContent;

    for (const lesson of mod.lessons) {
        if (isExcludedByGlState(lesson, excludedStates)) continue;

        const fullLesID = `${modNum}.${padNum(lesson.num)}`;
        addLine(`${fullLesID} ${lesson.title}`);
        if (!lesson.pages) continue;

        for (const page of lesson.pages) {
            if (isExcludedByGlState(page, excludedStates)) continue;

            const fullPgID = `${fullLesID}.${padNum(Number(page.num) + 1)}`;
            addLine(`${fullPgID} ${page.title}`);
            
            const pageEntries = courseIndex.filter(idx => idx.locationId === fullPgID || idx.locationId.startsWith(fullPgID + '.INT-'));
            
            // Enforce Sequential Order
            pageEntries.sort((a, b) => a.order - b.order);

            const pageImages = courseImages.filter(img => img.locationId === fullPgID || img.locationId.startsWith(fullPgID + '.INT-'));
            const pageVideos = courseVideos.filter(v => v.locationId === fullPgID || v.locationId.startsWith(fullPgID + '.INT-'));
            const pageAudio = courseAudio.filter(a => a.locationId === fullPgID || a.locationId.startsWith(fullPgID + '.INT-'));
            
            const processedTracker = new Set();

            for (const pageData of pageEntries) {
                if (pageData.unlockState && excludedStates.has(pageData.unlockState)) continue;
                let contentText = "";
                if (pageData.normalClean) contentText += pageData.normalClean + "\r\n";
                if (pageData.mlClean) contentText += pageData.mlClean + "\r\n";
                if (pageData.noteClean) contentText += pageData.noteClean + "\r\n";
                if (pageData.stdClean) contentText += pageData.stdClean + "\r\n";
                contentText = contentText.trim();

                let finalContent = processPlaceholders(contentText, pageImages, pageVideos, pageAudio, processedTracker, options);

                if (pageData.isInteractive) {
                    if (options.exInt) continue; 
                    const intMeta = courseInteractives.find(i => i.locationId === pageData.locationId);
                    let intTag = `[Interactive: ${intMeta ? intMeta.title + ' | Folder: ' + intMeta.folder + (intMeta.interactiveType ? ' | Type: ' + intMeta.interactiveType : '') : pageData.filename.split('/').pop()}`;
                    if (contentText) intTag += ` | Content:\r\n${contentText}`;
                    addLine(intTag + `]`);
                } else {
                    if (finalContent) addLine(finalContent);
                    
                    if (!options.exDocs) {
                        let match;
                        const foundDocs = new Set();
                        while ((match = docRegex.exec(pageData.normalRaw)) !== null) {
                            const docFilename = match[1].split('/').pop();
                            if (!foundDocs.has(docFilename)) {
                                foundDocs.add(docFilename);
                                const docText = await extractDocumentText(docFilename);
                                addLine(`[Document: ${docFilename} | ${docText}]`);
                            }
                        }
                    }
                }
            }

            const stragglers = getStragglers(pageImages, pageVideos, pageAudio, processedTracker, options.exImgEmpty);
            stragglers.forEach(txt => addLine(txt));

            addLine(); 
        }
        addLine(); 
    }
    return docContent;
}

function triggerDownload(content, filename) {
    // Convert the plain text to HTML paragraphs for the DOCX converter
    const safeText = content.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const htmlBody = safeText.split('\r\n').map(line => `<p style="margin: 0 0 8px 0; font-family: sans-serif;">${line}</p>`).join('');
    const fullHtml = `<!DOCTYPE html><html><head><meta charset="utf-8"></head><body>${htmlBody}</body></html>`;
    
    // Generate a true .docx file using the library
    const blob = htmlDocx.asBlob(fullHtml);
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    setTimeout(() => { URL.revokeObjectURL(link.href); document.body.removeChild(link); }, 100);
}

async function exportFullCourse() {
    const options = {
        exDocs: document.getElementById('ex-docs').checked,
        exInt: document.getElementById('ex-int').checked,
        exImgEmpty: document.getElementById('ex-img-empty').checked,
        exGlossary: document.getElementById('ex-glossary').checked,
        exTooltips: document.getElementById('ex-tooltips').checked,
        isHtml: false
    };

    showToast("Generating Single Document... This may take a moment to parse files.", "success");
    
    let fullContent = "";
    for (const mod of validModules) {
        fullContent += await buildModuleDocumentContent(mod, options) + "\r\n";
    }
    
    const safeName = customCourseName ? customCourseName.replace(/[^a-z0-9]/gi, '_') : "Course_Content";
    triggerDownload(fullContent, `${safeName}_Export.docx`);
}

async function exportSeparateModules(selectedIds) {
    const options = {
        exDocs: document.getElementById('ex-docs').checked,
        exInt: document.getElementById('ex-int').checked,
        exImgEmpty: document.getElementById('ex-img-empty').checked,
        exGlossary: document.getElementById('ex-glossary').checked,
        exTooltips: document.getElementById('ex-tooltips').checked,
        isHtml: false
    };

    showToast(`Generating ${selectedIds.length} document(s) into a Zip folder... Please wait.`, "success");

    const zip = new JSZip();
    const safeCourseName = customCourseName ? customCourseName.replace(/[^a-zA-Z0-9_]/g, '_') : "Course_Export";
    const folder = zip.folder(safeCourseName);

    for (const modIdx of selectedIds) {
        const mod = validModules[parseInt(modIdx, 10)];
        if (!mod) continue;

        const modContent = await buildModuleDocumentContent(mod, options);
        
        const modNum = padNum(mod.num);
        const safeTitle = mod.title.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, '');
        
        // Create the DOCX blob
        const safeText = modContent.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const htmlBody = safeText.split('\r\n').map(line => `<p style="margin: 0 0 8px 0; font-family: sans-serif;">${line}</p>`).join('');
        const fullHtml = `<!DOCTYPE html><html><head><meta charset="utf-8"></head><body>${htmlBody}</body></html>`;
        const blob = htmlDocx.asBlob(fullHtml);
        
        // Add it to our Zip folder
        folder.file(`${modNum}_${safeTitle}.docx`, blob);
    }

    // Generate the Zip and trigger a single download
    zip.generateAsync({ type: "blob" }).then(function(content) {
        const link = document.createElement("a");
        link.href = URL.createObjectURL(content);
        link.download = `${safeCourseName}_Modules.zip`;
        document.body.appendChild(link);
        link.click();
        setTimeout(() => { URL.revokeObjectURL(link.href); document.body.removeChild(link); }, 100);
    });
}
