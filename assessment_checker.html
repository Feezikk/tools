<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Educator Assessment Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css">
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f5f7;--surface:#fff;--surface2:#f0f2f5;
  --border:#dde1e9;--border2:#c8cdd8;
  --text:#1a1d26;--text-mid:#4a5068;--text-dim:#8a90a4;
  --accent:#1b4dff;--accent-light:#e8eeff;
  --error:#d93025;--error-bg:#fff0ef;--error-border:#fac5c1;
  --warn:#b45309;--warn-bg:#fffbeb;--warn-border:#fcd34d;
  --pass:#15803d;--pass-bg:#f0fdf4;--pass-border:#86efac;
  --wand:#7c3aed;--wand-bg:#f5f3ff;--wand-border:#c4b5fd;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  --r:6px;
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px}
header{height:52px;background:var(--text);color:#fff;display:flex;align-items:center;padding:0 24px;gap:14px;position:sticky;top:0;z-index:200}
.logo{font-family:var(--mono);font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.logo-badge{background:var(--accent);font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:1px}
.cdn-label{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.6)}
.cdn-prefix{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.4);background:rgba(255,255,255,.07);padding:3px 6px;border-radius:4px 0 0 4px;border:1px solid rgba(255,255,255,.18);border-right:none;white-space:nowrap;line-height:1}
.cdn-input{padding:3px 7px;border-radius:4px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;font-family:var(--mono);font-size:11px;outline:none}
.cdn-input-folder{width:140px;border-radius:0 4px 4px 0;border-left:none}
.workspace{display:flex;height:calc(100vh - 52px);overflow:hidden}
.left-panel{display:flex;flex-direction:column;background:var(--surface);overflow:hidden;min-width:240px;width:520px;flex-shrink:0;min-height:0}
.right-panel{display:flex;flex-direction:column;overflow:hidden;flex:1;min-width:240px;min-height:0}
.divider{width:5px;background:var(--border2);cursor:col-resize;flex-shrink:0;position:relative;transition:background .15s;z-index:10}
.divider:hover,.divider.dragging{background:var(--accent)}
.divider::before{content:'⋮';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--text-dim);font-size:14px;pointer-events:none}
.panel-toolbar{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--surface2)}
.panel-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim)}
.tab-group{display:flex;background:var(--border);border-radius:5px;padding:2px;gap:2px}
.tab{padding:5px 12px;border-radius:3px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-mid);font-family:var(--sans);transition:all .12s}
.tab:hover{color:var(--text)}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.input-area{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.tab-content{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.tab-content.active{display:flex}
.editor-wrap{flex:1;min-height:0;position:relative}
.CodeMirror{position:absolute;top:0;left:0;right:0;bottom:0;height:100%!important;font-family:var(--mono);font-size:12px;line-height:1.7;background:var(--surface);color:var(--text);border:none}
.CodeMirror-scroll{height:100%;overflow-y:scroll!important;overflow-x:auto!important}
.CodeMirror textarea{position:fixed!important}
.CodeMirror-lines{padding:16px 0}
.CodeMirror-line{padding:0 16px!important}
.CodeMirror-gutters{background:var(--surface2);border-right:1px solid var(--border);min-width:44px}
.CodeMirror-linenumber{padding:0 8px 0 4px;min-width:28px;color:var(--text-dim);font-size:12px;line-height:1.7}
.CodeMirror-cursor{border-left:2px solid var(--accent)}
.CodeMirror-selected{background:var(--accent-light)!important}
.cm-error-line{background:#fde8e8!important}
.cm-warn-line{background:#fff3cd!important}
.cm-fixed-line{background:#fef9c3!important}
.cm-error-gutter{background:#fde8e8;color:var(--error)!important;font-weight:600}
.cm-warn-gutter{background:#fff3cd;color:var(--warn)!important;font-weight:600}
.cm-fixed-gutter{background:#fef9c3;color:#854d0e!important;font-weight:600}
.upload-zone{flex:1;margin:20px;border:2px dashed var(--border2);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;transition:all .15s;padding:40px;text-align:center}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:var(--accent-light)}
.upload-icon{font-size:36px}
.upload-label{color:var(--text-mid);font-size:13px}
.upload-label strong{color:var(--accent)}
.upload-label small{display:block;color:var(--text-dim);margin-top:4px}
.file-pill{margin:16px;padding:10px 14px;background:var(--pass-bg);border:1px solid var(--pass-border);border-radius:var(--r);display:none;align-items:center;gap:10px;font-size:13px;font-family:var(--mono)}
.action-bar{padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--surface)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .12s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.1)}
.btn-primary:active{transform:scale(.98)}
.btn-secondary{background:var(--surface2);color:var(--text-mid);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--border2);color:var(--text)}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text-mid);font-size:12px}
.btn-ghost:hover{border-color:var(--pass-border);color:var(--pass)}
.btn-ghost.copied{background:var(--pass-bg);color:var(--pass);border-color:var(--pass-border)}
.btn-link{background:none;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;font-family:var(--sans);margin-left:auto}
.btn-link:hover{color:var(--error)}
.shortcut-hint{font-size:11px;color:var(--text-dim);font-family:var(--mono);opacity:.7}
.results-header{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:10px}
.summary-chips{display:flex;gap:6px;margin-left:auto}
.chip{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px}
.chip-error{background:var(--error-bg);color:var(--error);border:1px solid var(--error-border)}
.chip-warn{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-border)}
.chip-pass{background:var(--pass-bg);color:var(--pass);border:1px solid var(--pass-border)}
.q-strip{padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);font-size:11px;color:var(--text-dim);display:none;gap:8px;align-items:center;flex-wrap:wrap}
.q-strip.visible{display:flex}
.q-stat{display:flex;align-items:center;gap:4px;font-family:var(--mono)}
.q-stat strong{color:var(--text)}
.q-pipe{width:1px;height:12px;background:var(--border2);margin:0 4px;flex-shrink:0}
.results-body{flex:1;overflow-y:auto;padding:14px}
.results-body::-webkit-scrollbar{width:5px}
.results-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.empty-state{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;text-align:center;padding:40px;color:var(--text-dim)}
.empty-icon{font-size:40px;opacity:.5}
.empty-state p{max-width:280px;line-height:1.6;font-size:13px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.all-pass-banner{text-align:center;padding:60px 24px}
.all-pass-banner .check{font-size:52px}
.all-pass-banner h2{font-size:20px;font-weight:700;color:var(--pass);margin:12px 0 6px}
.all-pass-banner p{color:var(--text-dim);font-size:13px}
.category-section{margin-bottom:8px}
.category-header{width:100%;display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-family:var(--sans);font-size:12px;font-weight:700;color:var(--text-mid);text-align:left;transition:background .12s}
.category-header:hover{background:var(--border)}
.category-header.has-errors{background:var(--error-bg);border-color:var(--error-border);color:var(--error)}
.category-header.has-warnings{background:var(--warn-bg);border-color:var(--warn-border);color:var(--warn)}
.category-header.all-pass{background:var(--pass-bg);border-color:var(--pass-border);color:var(--pass)}
.cat-count{font-size:10px;padding:1px 6px;border-radius:99px;font-weight:700}
.cat-count-error{background:var(--error);color:#fff}
.cat-count-warn{background:var(--warn);color:#fff}
.cat-count-pass{background:var(--pass);color:#fff}
.cat-chevron{margin-right:4px;opacity:.6;transition:transform .15s;display:flex;align-items:center;flex-shrink:0}
.category-section.open .cat-chevron{transform:rotate(180deg)}
.category-items{display:none;flex-direction:column;gap:4px;margin-top:4px;padding-left:14px;border-left:2px solid var(--border2);margin-left:6px}
.category-section.open .category-items{display:flex}
.category-section.open .category-header.has-errors~.category-items{border-left-color:var(--error-border)}
.category-section.open .category-header.has-warnings~.category-items{border-left-color:var(--warn-border)}
.category-section.open .category-header.all-pass~.category-items{border-left-color:var(--pass-border)}
.result-item{border:1px solid var(--border);border-radius:var(--r);background:var(--surface);overflow:hidden}
.result-item.err{border-left:3px solid var(--error)}
.result-item.warn{border-left:3px solid var(--warn)}
.result-item.pass{border-left:3px solid var(--pass);opacity:.65}
.result-rationale{font-size:11px;color:var(--warn);margin-top:3px;line-height:1.45;font-style:italic;padding:3px 8px;background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:3px;display:inline-block;max-width:100%}
.result-item.fixed{border-left:3px solid #ca8a04;background:#fefce8}
.result-item.fixed .result-rule-name{color:#854d0e}
.result-item.fixed .sev-icon{color:#ca8a04}
.result-row{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;cursor:pointer}
.result-row:hover{background:var(--surface2)}
.result-chevron{margin-right:4px;opacity:.5;transition:transform .15s;align-self:center;display:flex;align-items:center;flex-shrink:0}
.result-item.expanded .result-chevron{transform:rotate(180deg)}
.caret-svg{width:16px;height:16px;display:block;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.sev-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.result-text{flex:1;min-width:0}
.result-rule-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.4}
.result-msg{font-size:11px;color:var(--text-mid);margin-top:2px;line-height:1.4;font-family:var(--mono)}
mark.error-highlight{background:#fecaca;color:#991b1b;padding:0 3px;border-radius:3px;font-weight:600}
.line-badge{font-size:10px;font-family:var(--mono);font-weight:600;padding:2px 6px;border-radius:3px;background:var(--surface2);color:var(--text-mid);border:1px solid var(--border);flex-shrink:0;cursor:pointer;white-space:nowrap}
.line-badge:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
.wand-btn{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;background:var(--wand-bg);border:1px solid var(--wand-border);color:var(--wand);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);flex-shrink:0;transition:all .12s}
.wand-btn:hover{background:var(--wand-border)}
.wand-btn.applied{background:#fef9c3;border-color:#ca8a04;color:#854d0e;cursor:default}
.fix-panel{display:none;border-top:1px solid var(--border);background:var(--surface2)}
.result-item.expanded .fix-panel{display:block}
.fix-applied-banner{padding:7px 12px;background:#fef9c3;border-bottom:1px solid #fcd34d;font-size:11px;color:#854d0e;font-weight:600;display:flex;align-items:center;gap:6px}
.fix-description{padding:8px 12px;font-size:12px;color:var(--text-mid);line-height:1.5;border-bottom:1px solid var(--border)}
.fix-snippet{padding:10px 12px;font-family:var(--mono);font-size:11.5px;color:var(--text);line-height:1.6;background:#f8f9fc;white-space:pre-wrap;word-break:break-word}
.status-bar{padding:7px 16px;border-top:1px solid var(--border);background:var(--surface);font-size:11px;color:var(--text-dim);display:none;align-items:center;gap:4px}
.status-bar.visible{display:flex}
/* Dashboard button */
.btn-dashboard{margin-left:12px;padding:5px 12px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:var(--r);font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-dashboard:hover:not(:disabled){background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.45)}
.btn-dashboard:disabled{opacity:.35;cursor:not-allowed}
/* Dashboard modal */
.dash-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;animation:fadeIn .15s}
.dash-overlay.open{display:block}
.dash-modal{display:none;position:fixed;top:60px;right:16px;width:min(960px,calc(100vw - 32px));max-height:calc(100vh - 80px);background:var(--surface);border:1px solid var(--border2);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.18);z-index:501;flex-direction:column;overflow:hidden;animation:slideDown .18s}
.dash-modal.open{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.dash-header{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface2);flex-shrink:0}
.dash-title{font-size:14px;font-weight:700;color:var(--text)}
.dash-meta{font-size:11px;color:var(--text-dim);font-family:var(--mono)}
.dash-close{margin-left:auto;background:none;border:1px solid var(--border);border-radius:4px;padding:3px 8px;color:var(--text-mid);font-size:12px;cursor:pointer;font-family:var(--sans)}
.dash-close:hover{border-color:var(--error-border);color:var(--error)}
.dash-body{overflow-y:auto;flex:1}
.dash-body::-webkit-scrollbar{width:5px}
.dash-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.dash-table{width:100%;border-collapse:collapse;font-size:12px}
.dash-table th{position:sticky;top:0;background:var(--surface2);border-bottom:2px solid var(--border2);padding:9px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-dim);white-space:nowrap;z-index:1}
.dash-table td{padding:8px 14px;border-bottom:1px solid var(--border);vertical-align:middle;line-height:1.4}
.dash-table tr:last-child td{border-bottom:none}
.dash-table tr:hover td{background:var(--surface2)}
.dash-table tr.dash-row-alt td{background:#fafbfc}
.dash-table tr.dash-row-alt:hover td{background:var(--surface2)}
.dash-group-num{font-family:var(--mono);font-weight:700;font-size:13px;color:var(--text)}
.dash-points{font-family:var(--mono);font-size:12px}
.dash-points .dash-pt-chip{display:inline-block;background:var(--accent-light);color:var(--accent);border:1px solid #c3d0ff;border-radius:4px;padding:1px 7px;font-weight:700;margin:1px 2px}
.dash-points .dash-pt-multi{color:var(--warn);font-size:10px;margin-left:4px;font-weight:600}
.dash-complexity{display:inline-block;font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px}
.dash-complexity.LC{background:#f0fdf4;color:var(--pass);border:1px solid var(--pass-border)}
.dash-complexity.MC{background:#fffbeb;color:var(--warn);border:1px solid var(--warn-border)}
.dash-complexity.HC{background:var(--error-bg);color:var(--error);border:1px solid var(--error-border)}
.dash-complexity.mixed{background:var(--surface2);color:var(--text-mid);border:1px solid var(--border2)}
.dash-lesson{font-family:var(--mono);font-size:11px;color:var(--text-mid)}
.dash-standard{font-family:var(--mono);font-size:11px;color:var(--text-mid);max-width:220px;word-break:break-word}
.dash-empty{padding:40px;text-align:center;color:var(--text-dim);font-size:13px}
.dash-count{display:inline-block;font-family:var(--mono);font-weight:700;font-size:13px;color:var(--text-mid);background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:1px 8px;min-width:28px;text-align:center}
.dash-type-chip{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap}
.dash-type-mc{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.dash-type-essay{background:#fdf4ff;color:#7e22ce;border:1px solid #e9d5ff}
.dash-type-fib{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
.dash-type-tf{background:#f0fdfa;color:#0f766e;border:1px solid #99f6e4}
.dash-type-matching{background:#fefce8;color:#a16207;border:1px solid #fef08a}
.dash-type-other{background:var(--surface2);color:var(--text-mid);border:1px solid var(--border2)}
</style>
</head>
<body>

<header>
  <div class="logo">⬡ Educator Assessment Checker <span class="logo-badge">v3.8</span></div>
  <label class="cdn-label">
    Course Folder:
    <span class="cdn-prefix">//cdn.flvs.net/assessment_images/</span><input id="img-base-path" class="cdn-input cdn-input-folder" type="text"
      placeholder="folder_name"
      title="Enter the course-specific folder name. The base path //cdn.flvs.net/assessment_images/ is always required."
      oninput="window._imgCourseFolder=this.value.trim();window._imgBasePath='//cdn.flvs.net/assessment_images/'+(this.value.trim()?this.value.trim()+'/':'')">
  </label>
  <button class="btn btn-dashboard" id="dashboard-btn" onclick="openDashboard()" disabled title="Run an audit first">⊞ Dashboard</button>
</header>

<!-- DASHBOARD MODAL -->
<div id="dashboard-overlay" class="dash-overlay" onclick="closeDashboard()"></div>
<div id="dashboard-modal" class="dash-modal">
  <div class="dash-header">
    <div class="dash-title">⊞ Exam Dashboard</div>
    <div class="dash-meta" id="dash-meta"></div>
    <button class="dash-close" onclick="closeDashboard()">✕</button>
  </div>
  <div class="dash-body">
    <table class="dash-table" id="dash-table">
      <thead>
        <tr>
          <th>Type</th>
          <th>Group</th>
          <th>Count</th>
          <th>Points</th>
          <th>Complexity</th>
          <th>Lesson</th>
          <th>Standard</th>
        </tr>
      </thead>
      <tbody id="dash-tbody"></tbody>
    </table>
  </div>
</div>

<div class="workspace">
  <div class="left-panel">
    <div class="panel-toolbar">
      <span class="panel-label">Input</span>
      <div class="tab-group">
        <button class="tab active" onclick="switchTab('paste',this)">Paste Text</button>
        <button class="tab" onclick="switchTab('upload',this)">Upload File</button>
      </div>
    </div>
    <div class="input-area">
      <div class="tab-content active" id="tab-paste">
        <div class="editor-wrap"><div id="cm-editor"></div></div>
      </div>
      <div class="tab-content" id="tab-upload">
        <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
          <div class="upload-icon">📄</div>
          <div class="upload-label"><strong>Click to browse</strong> or drag &amp; drop<small>Accepts .txt and .html files</small></div>
        </div>
        <div class="file-pill" id="file-pill">
          📄 <span id="file-name-label"></span>
          <button class="btn-link" onclick="clearFile()">✕ Remove</button>
        </div>
        <input type="file" id="file-input" accept=".txt,.html,.htm" style="display:none" onchange="handleFile(event)">
      </div>
    </div>
    <div class="action-bar">
      <button class="btn btn-primary" onclick="runAudit()">▶ Run Audit <span class="shortcut-hint">⌘↵</span></button>
      <button class="btn btn-secondary" onclick="loadSample()">Load Sample</button>
      <button class="btn btn-ghost" id="copy-btn" onclick="copyText(this)">⎘ Copy Text</button>

// ─────────────────────────────────────────────────────────────────
// CHECKER ENGINE
// ─────────────────────────────────────────────────────────────────
const AssessmentChecker = (() => {
  const Q_CODES = ['mc:radio:','essay:','fib:','matching:label:','tf:'];

  function parseQuestions(raw) {
    const lines = raw.split('\n');
    const questions = [];
    let cur = null;
    for (let i = 0; i < lines.length; i++) {
      const t = lines[i].trim(), ln = i + 1;
      const code = Q_CODES.find(c => t.startsWith(c));
      if (code) {
        if (cur) questions.push(cur);
        cur = { num:questions.length+1, code, startLine:ln, stem:t.slice(code.length),
                stemLines:[ln], answers:[], points:null, group:null, pointsLine:null, groupLine:null };
        continue;
      }
      if (!cur) continue;
      if (/^points:\d+$/.test(t)) { cur.points = parseInt(t.split(':')[1]); cur.pointsLine = ln; }
      else if (/^group:\d+$/.test(t)) { cur.group = parseInt(t.split(':')[1]); cur.groupLine = ln; }
      else if (cur.points === null && cur.group === null) {
        if (!t) continue; // skip blank lines
        // Stem continuation: only if no answers yet, not an x- correct marker,
        // not starting with an HTML tag (answer choices can have inline markup),
        // and the stem hasn't already branched into multi-line.
        const looksLikeAnswer = t.startsWith('x-') || t.startsWith('<');
        if (cur.answers.length === 0 && !looksLikeAnswer
            && cur.stemLines.length > 0 && cur.stem && !cur.stem.includes('\n')) {
          cur.stem += '\n' + t;
          cur.stemLines.push(ln);
        } else {
          cur.answers.push({ text:t, lineNum:ln });
        }
      }
    }
    if (cur) questions.push(cur);
    return { questions, lines };
  }

  const pass = rule => ({ status:'pass', rule });
  const fail = (rule, msg, ln, err, extra) =>
    ({ status:'fail', rule, message:msg, lineNum:ln||null, errorStr:err||null, extra:extra||null });

  const handlers = {
    'code-spacing'(rule, qs, raw, lines) {
      const re = /\b(mc\s*:\s*radio\s*:|essay\s*:\s*(?!\w)|fib\s*:\s*(?!\w)|tf\s*:\s*(?!\w)|matching\s*:\s*label\s*:\s*)/gi;
      return lines.flatMap((line, i) => {
        const matches = [...line.matchAll(re)].map(m => m[0]);
        return matches
          .filter(x => /\s/.test(x))
          .map(x => fail(rule, rule.message.replace('{found}', x.trim()), i+1, x.trim()));
      });
    },

    'question-spacing'(rule, qs, raw, lines) {
      if (qs.length < 2) return [];
      const results = [];
      for (let i = 0; i < qs.length - 1; i++) {
        const curr = qs[i], next = qs[i + 1];
        // End of current question: use groupLine if set, else pointsLine, else last stem line
        const endLine = curr.groupLine || curr.pointsLine || curr.startLine;
        const startNext = next.startLine;
        // Count blank lines in the gap between endLine and startNext (exclusive on both ends)
        let blanks = 0;
        for (let ln = endLine + 1; ln < startNext; ln++) {
          if (lines[ln - 1] !== undefined && lines[ln - 1].trim() === '') blanks++;
        }
        if (blanks === 1) continue; // exactly one blank line — correct
        const found = blanks === 0 ? 'No blank line' : blanks + ' blank lines';
        results.push(fail(rule,
          rule.message.replace('{found}', found).replace('{a}', curr.num).replace('{b}', next.num),
          endLine + 1));
      }
      return results;
    },

    'group-sequence'(rule, qs) {
      let max = 0;
      const violations = [];
      for (const q of qs) {
        if (q.group === null) continue;
        if (q.group < max) violations.push({ q, max });
        max = Math.max(max, q.group);
      }
      if (!violations.length) return [];
      const seq = qs.filter(q=>q.group!==null).map(q=>({num:q.num,group:q.group,line:q.groupLine}));
      // Report each violation; first one carries the full sequence detail for the fix panel
      return violations.map((v, idx) => fail(rule,
        rule.message.replace('{found}', v.q.group).replace('{previous}', v.max),
        v.q.groupLine, String(v.q.group),
        idx === 0 ? {type:'group-sequence', sequence:seq} : null));
    },

    'question-has-field'(rule, qs) {
      return qs.filter(q => rule.field==='points' ? q.points===null : q.group===null)
               .map(q => fail(rule, rule.message.replace('{num}',q.num), q.startLine));
    },

    'field-order'(rule, qs) {
      return qs.filter(q => q.pointsLine && q.groupLine && q.groupLine < q.pointsLine)
               .map(q => fail(rule, rule.message.replace('{num}',q.num), q.groupLine));
    },

    'group-type-consistency'(rule, qs) {
      const byG = {};
      for (const q of qs) { if (q.group===null) continue; (byG[q.group]=byG[q.group]||[]).push(q.code); }
      return Object.entries(byG).filter(([,c])=>new Set(c).size>1)
        .map(([g,c]) => fail(rule, rule.message.replace('{group}',g).replace('{types}',[...new Set(c)].join(', '))));
    },

    'group-points-consistency'(rule, qs) {
      const byG = {};
      for (const q of qs) {
        if (q.group===null||q.points===null) continue;
        (byG[q.group]=byG[q.group]||[]).push({num:q.num,points:q.points,line:q.pointsLine});
      }
      const results = [];
      for (const [g, items] of Object.entries(byG)) {
        const uniq = [...new Set(items.map(i=>i.points))];
        if (uniq.length < 2) continue;
        const tally = {};
        items.forEach(i => { tally[i.points]=(tally[i.points]||0)+1; });
        const expected = Object.entries(tally).sort((a,b)=>b[1]-a[1])[0][0];
        const off = items.filter(i=>String(i.points)!==expected);
        results.push(fail(rule, rule.message.replace('{group}',g).replace('{values}',uniq.join(', ')),
          off[0]?.line||null, uniq.join(' / '), {type:'group-points',group:g,expected,items}));
      }
      return results;
    },

    'mc-correct-count'(rule, qs) {
      return qs.filter(q=>q.code==='mc:radio:').flatMap(q => {
        const c = q.answers.filter(a=>a.text.startsWith('x-')).length;
        return c!==1 ? [fail(rule,rule.message.replace('{num}',q.num).replace('{count}',c),q.startLine)] : [];
      });
    },

    'tf-answer'(rule, qs) {
      return qs.filter(q=>q.code==='tf:').flatMap(q => {
        const a = q.answers.map(a=>a.text.toLowerCase().trim());
        return (a.includes('true')&&a.includes('false'))
          ? [fail(rule,rule.message.replace('{num}',q.num),q.startLine)] : [];
      });
    },

    'tf-answer-present'(rule, qs) {
      return qs.filter(q=>q.code==='tf:').flatMap(q => {
        const a = q.answers.map(a=>a.text.toLowerCase().trim());
        // Only fire if NOT already caught by tf-answer-valid (both present)
        if (a.includes('true') && a.includes('false')) return [];
        return (!a.includes('true') && !a.includes('false'))
          ? [fail(rule, rule.message.replace('{num}',q.num), q.startLine)] : [];
      });
    },

    'malformed-tags'(rule, qs, raw, lines) {
      return lines.flatMap((line, i) => {
        const o=(line.match(/</g)||[]).length, c=(line.match(/>/g)||[]).length;
        if (o===c || !/<[a-zA-Z!]/.test(line)) return [];
        const bad = line.match(/<[^>]*?(?=<|$)/);
        return [fail(rule,rule.message.replace('{line}',i+1).replace('{found}',(bad?bad[0]:line.trim()).substring(0,60)),i+1,bad?bad[0]:null)];
      });
    },

    'br-format'(rule, qs, raw, lines) {
      return lines.flatMap((line, i) => {
        const ms = line.match(/<\/?\s*br\b[^><]*(?:>|(?=<|$))/gi)||[];
        return ms.filter(m=>m!=='<br />').map(m=>fail(rule,rule.message.replace('{line}',i+1).replace('{found}',m),i+1,m));
      });
    },

    'inline-style-check'(rule, qs, raw, lines) {
      return lines.flatMap((line, i) => {
        // Strip the allowed style="vertical-align:middle;" from img tags before checking,
        // normalising whitespace so variations like "vertical-align: middle;" also match
        const clean = line.replace(/<img([^>]*)style\s*=\s*"([^"]*)"([^>]*)>/gi, (match, pre, styleVal, post) => {
          const norm = styleVal.replace(/\s/g,'').toLowerCase();
          return (norm === 'vertical-align:middle;') ? '<img'+pre+post+'>' : match;
        });
        const m = clean.match(/style\s*=\s*["'][^"']*["']/i);
        return m ? [fail(rule,rule.message.replace('{line}',i+1),i+1,m[0])] : [];
      });
    },

    'forbidden-html-tags'(rule, qs, raw, lines) {
      // Build exact-match regex for each tag to avoid partial matches (e.g. <blockquote> matching <b>)
      // and report every occurrence on the line, not just the first.
      return lines.flatMap((line, i) => {
        const results = [];
        for (const tag of rule.tags) {
          // Escape the tag string for use in regex
          const escaped = tag.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const re = new RegExp(escaped, 'gi');
          let m;
          while ((m = re.exec(line)) !== null) {
            results.push(fail(rule, rule.message.replace('{line}', i+1).replace('{found}', m[0]), i+1, m[0]));
          }
        }
        return results;
      });
    },

    'unclosed-paired-tags-check'(rule, qs, raw, lines) {
      // Check every line belonging to each question for unmatched paired tags.
      // We scan from the question's startLine to the line before the next question
      // (or end of file) so answer lines with HTML tags are never missed regardless
      // of how the parser collected them.
      const PAIRED = ['strong','em','sup','sub','u','s','del'];
      return qs.flatMap((q, qi) => {
        const start = q.startLine - 1; // 0-based
        const end   = qi + 1 < qs.length ? qs[qi+1].startLine - 1 : lines.length;
        const block = lines.slice(start, end).join('\n');
        const issues = [];
        for (const tag of PAIRED) {
          const opens  = (block.match(new RegExp('<'+tag+'(?:\\s[^>]*)?>','gi')) || []).length;
          const closes = (block.match(new RegExp('</'+tag+'>','gi')) || []).length;
          if (opens !== closes) {
            issues.push(opens > closes
              ? (opens - closes) + ' unclosed <'+tag+'>'
              : (closes - opens) + ' extra </'+tag+'>');
          }
        }
        if (!issues.length) return [];
        return [fail(rule,
          rule.message.replace('{num}', q.num).replace('{found}', issues.join('; ')),
          q.startLine)];
      });
    },

    'lt-gt-entities-check'(rule, qs, raw, lines) {
      // Flag &lt; and &gt; appearing in question body text (not inside HTML tag attributes).
      // Strip all HTML tags and their attribute content first so we only scan visible text.
      return lines.flatMap((line, i) => {
        // Remove complete HTML tags (including attribute values) before scanning
        const textOnly = line.replace(/<[^>]+>/g, '');
        const results = [];
        const re = /(&lt;|&gt;)/gi;
        let m;
        while ((m = re.exec(textOnly)) !== null) {
          results.push(fail(rule,
            rule.message.replace('{line}', i+1).replace('{found}', m[0]),
            i+1, m[0]));
        }
        return results;
      });
    },

    'commented-html'(rule, qs, raw) {
      const results = []; const re=/<!--([\s\S]*?)-->/g; let m;
      while ((m=re.exec(raw))!==null) {
        if (/<[a-zA-Z]/.test(m[1])) {
          const ln=(raw.substring(0,m.index).match(/\n/g)||[]).length+1;
          results.push(fail(rule,rule.message.replace('{line}',ln),ln));
        }
      }
      return results;
    },

    'img-alt-check'(rule, qs, raw, lines) {
      return lines.flatMap((line, i) => {
        const imgs=line.match(/<img\s[^>]*>/gi)||[];
        return imgs.filter(t=>{
          // Accept alt="..." or alt='...' with non-empty value — quote style is a separate rule
          return !/alt\s*=\s*"[^"]+"/i.test(t) && !/alt\s*=\s*'[^']+'/i.test(t);
        }).map(()=>fail(rule,rule.message.replace('{line}',i+1),i+1));
      });
    },

    'img-quote-check'(rule, qs, raw, lines) {
      return lines.flatMap((line, i) => {
        const m=line.match(/(src|alt)\s*=\s*'/i);
        return (/<img/i.test(line)&&m) ? [fail(rule,rule.message.replace('{line}',i+1),i+1,m[0])] : [];
      });
    },

    'img-extension-check'(rule, qs, raw, lines) {
      const results=[];
      lines.forEach((line,i)=>{
        const imgs=line.match(/<img\b[^>]*>/gi)||[];
        imgs.forEach(img=>{
          const re=/src\s*=\s*"([^"]+)"/gi; let m;
          while((m=re.exec(img))!==null){
            const src=m[1].toLowerCase();
            if(!rule.allowed.some(e=>src.endsWith(e))){
              const ext='.'+src.split('.').pop();
              results.push(fail(rule,rule.message.replace('{line}',i+1).replace('{found}',ext),i+1,ext));
            }
          }
        });
      });
      return results;
    },

    'img-alt-quotes-check'(rule, qs, raw, lines) {
      return lines.flatMap((line, i) => {
        const imgs=line.match(/<img[^>]+>/gi)||[];
        return imgs.flatMap(img=>{
          const a=img.match(/alt\s*=\s*"([^]*?)"(?=\s*\/?>|\s+[a-z]+(?:=|\s|>))/i);
          return (a&&a[1].includes('"')) ? [fail(rule,rule.message.replace('{line}',i+1),i+1,'"')] : [];
        });
      });
    },

    'img-alt-html-check'(rule, qs, raw, lines) {
      return lines.flatMap((line, i) => {
        const imgs=line.match(/<img[^>]+>/gi)||[];
        return imgs.flatMap(img=>{
          const a=img.match(/alt\s*=\s*"([^]*?)"(?=\s*\/?>|\s+[a-z]+(?:=|\s|>))/i);
          if(!a) return [];
          const h=a[1].match(/<[^>]+>/);
          return h ? [fail(rule,rule.message.replace('{line}',i+1),i+1,h[0])] : [];
        });
      });
    },

    'img-alt-symbol-check'(rule, qs, raw, lines) {
      // '-' is only flagged when it looks like a math minus (space-dash-digit or space-dash-space)
      // not when used as a hyphen in compound words.
      // &lt; and &gt; in alt text must be spelled out — unlike question body text where
      // <span>></span> is the fix, alt attributes cannot contain HTML tags.
      const SYMS={'>':'greater than','<':'less than','/':'divided by','*':'multiplied by',
                  '%':'percent','&':'ampersand','@':'at','=':'equals','°':'degree','+':'plus'};
      const ENTS={
        '&amp;':'ampersand',
        '&lt;':'less than (spell out — HTML tags not allowed in alt text)',
        '&gt;':'greater than (spell out — HTML tags not allowed in alt text)',
        '&deg;':'degree'
      };
      const MATH_MINUS=/(?<=\s)-(?=\d|\s)/;
      return lines.flatMap((line, i) => {
        const imgs=line.match(/<img[^>]+>/gi)||[];
        return imgs.flatMap(img=>{
          const a=img.match(/alt\s*=\s*"([^]*?)"(?=\s*\/?>|\s+[a-z]+(?:=|\s|>))/i);
          if(!a) return [];
          const txt=a[1];
          for(const[ent,word] of Object.entries(ENTS)) if(txt.includes(ent)) return [fail(rule,rule.message.replace('{line}',i+1).replace('{found}',ent)+' Write: "'+word.split(' (')[0]+'"',i+1,ent)];
          for(const sym of Object.keys(SYMS)) if(txt.includes(sym)) return [fail(rule,rule.message.replace('{line}',i+1).replace('{found}',sym),i+1,sym)];
          if(MATH_MINUS.test(txt)) return [fail(rule,rule.message.replace('{line}',i+1).replace('{found}','-'),i+1,'-')];
          return [];
        });
      });
    },

    'img-alt-unknown-symbol-check'(rule, qs, raw, lines) {
      const KNOWN=new Set(['>','<','/','*','%','&','@','-','=','°','+']);
      const KENT=/&(?:amp|lt|gt|deg|nbsp|quot|apos|#\d+|#x[0-9a-fA-F]+);/g;
      return lines.flatMap((line, i) => {
        const imgs=line.match(/<img[^>]+>/gi)||[];
        return imgs.flatMap(img=>{
          // Use robust extraction consistent with other alt handlers
          const a=img.match(/alt\s*=\s*"([^]*?)"(?=\s*\/?>|\s+[a-z]+(?:=|\s|>))/i);
          if(!a) return [];
          const txt=a[1].replace(KENT,' ');
          const u=txt.match(/[^\w\s.,!?;:'()\[\]{}\-\u2019\u2018\u201C\u201D\u2013\u2014]/g);
          if(u&&!KNOWN.has(u[0])) return [fail(rule,rule.message.replace('{line}',i+1).replace('{found}',u[0]),i+1,u[0])];
          return [];
        });
      });
    },

    'img-dimensions-check'(rule, qs, raw, lines) {
      return lines.flatMap((line, i) => {
        const imgs=line.match(/<img[^>]+>/gi)||[];
        return imgs.flatMap(img => [
          /\bwidth\s*=/i.test(img) ? fail(rule,rule.message.replace('{line}',i+1).replace('{found}','width'),i+1,'width') : null,
          /\bheight\s*=/i.test(img) ? fail(rule,rule.message.replace('{line}',i+1).replace('{found}','height'),i+1,'height') : null
        ].filter(Boolean));
      });
    },

    'img-extra-attrs-check'(rule, qs, raw, lines) {
      const ALLOWED=['src','alt','style'], ASTYLE='vertical-align:middle;';
      return lines.flatMap((line, i) => {
        const imgs=line.match(/<img[^>]*>/gi)||[];
        return imgs.flatMap(img=>{
          const re=/\b([a-zA-Z][a-zA-Z0-9-]*)\s*=/g;
          let m, found=[];
          while((m=re.exec(img))!==null){
            const name=m[1].toLowerCase();
            if(!ALLOWED.includes(name)){found.push(m[1]);continue;}
            if(name==='style'){
              const sv=img.match(/style\s*=\s*"([^"]*)"/i);
              if(sv&&sv[1].replace(/\s/g,'')!==ASTYLE.replace(/\s/g,'')) found.push('style="'+sv[1]+'"');
            }
          }
          return found.length ? [fail(rule,rule.message.replace('{line}',i+1).replace('{found}',found.join(', ')),i+1,found[0])] : [];
        });
      });
    },

    'img-path-check'(rule, qs, raw, lines) {
      const results=[];
      lines.forEach((line,i)=>{
        const imgs=line.match(/<img\b[^>]*>/gi)||[];
        imgs.forEach(img=>{
          const re=/src\s*=\s*"([^"]+)"/gi; let m;
          while((m=re.exec(img))!==null)
            if(/[A-Z]/.test(m[1])||/ /.test(m[1]))
              results.push(fail(rule,rule.message.replace('{line}',i+1).replace('{found}',m[1]),i+1,m[1]));
        });
      });
      return results;
    },

    'img-path-base-check'(rule, qs, raw, lines) {
      const FIXED='cdn.flvs.net/assessment_images/';
      const folder=(window._imgCourseFolder||'').trim().replace(/\/+$/,'');
      const norm=s=>s.replace(/^https?:\/\//,'').replace(/^\/\//,'');
      const results=[];
      lines.forEach((line,i)=>{
        const imgs=line.match(/<img\b[^>]*>/gi)||[];
        imgs.forEach(img=>{
          const re=/src\s*=\s*"([^"]+)"/gi; let m;
          while((m=re.exec(img))!==null){
            const normed=norm(m[1]);
            if(!normed.startsWith(FIXED)){
              results.push(fail(rule,
                rule.message.replace('{line}',i+1).replace('{found}',m[1]).replace('{expected}','//'+FIXED+(folder?folder+'/':'<folder>/')),
                i+1,m[1]));
              continue;
            }
            if(folder){
              const afterBase=normed.slice(FIXED.length);
              if(!afterBase.startsWith(folder+'/')){
                results.push(fail(rule,
                  rule.message.replace('{line}',i+1).replace('{found}',m[1]).replace('{expected}','//'+FIXED+folder+'/'),
                  i+1,m[1]));
              }
            }
          }
        });
      });
      return results;
    },

    'missing-lt-span-check'(rule, qs, raw, lines) {
      const CODES=['mc:radio:','essay:','tf:','fib:','matching:label:'];
      return lines.flatMap((line,i)=>{
        const lower=line.toLowerCase();
        for(const code of CODES){
          const idx=lower.indexOf(code); if(idx===-1) continue;
          const after=line.substring(idx+code.length);
          if(/^:?span\b/i.test(after)){
            const found=code+after.match(/^:?span/i)[0];
            return [fail(rule,rule.message.replace('{line}',i+1).replace('{found}',found),i+1,after.match(/^:?span/i)[0])];
          }
          break;
        }
        return [];
      });
    },

    'span-missing-check'(rule, qs) {
      // Fire for any question with no <span at all in its stem
      return qs.filter(q => !q.stem.includes('<span')).map(q =>
        fail(rule, rule.message.replace('{num}', q.num), q.startLine));
    },

    'span-unclosed-check'(rule, qs) {
      // Fire when a <span opens but no </span> closes it
      return qs.filter(q => q.stem.includes('<span') && !/\/span>/i.test(q.stem)).map(q =>
        fail(rule, rule.message.replace('{num}', q.num), q.startLine));
    },

    'span-data-standard-check'(rule, qs) {
      const results=[];
      for(const q of qs){
        // Skip if no span or unclosed span — those are caught by dedicated rules
        if(!q.stem.includes('<span') || !/\/span>/i.test(q.stem)) continue;
        const sm=q.stem.match(/<span([^>]*)>/i); if(!sm) continue;
        const std=sm[1].match(/data-standard-[a-z0-9_-]+\s*=\s*"([^"]*)"/i);
        if(!std){results.push(fail(rule,rule.message.replace('{num}',q.num),q.startLine,'data-standard-*'));continue;}
        if(!std[1].trim()) results.push(fail(rule,rule.message.replace('{num}',q.num)+' Value cannot be blank.',q.startLine,'""'));
      }
      return results;
    },

    'span-attribute-check'(rule, qs) {
      const results=[];
      for(const q of qs){
        // Skip if no span or unclosed span — those are caught by dedicated rules
        if(!q.stem.includes('<span') || !/\/span>/i.test(q.stem)) continue;
        const sm=q.stem.match(/<span([^>]*)>/i); if(!sm) continue;
        const attrs=sm[1];
        if(!attrs.includes(rule.attribute)){
          results.push(fail(rule,rule.message.replace('{num}',q.num).replace('{found}','missing'),q.startLine));
          continue;
        }
        const vm=attrs.match(new RegExp(rule.attribute+'\\s*=\\s*"([^"]*)"','i'));
        const val=vm?vm[1].trim():'';
        if(!val){
          results.push(fail(rule,rule.message.replace('{num}',q.num).replace('{found}','(empty)'),q.startLine,'(empty)'));
          continue;
        }
        if(rule.validValues && !rule.validValues.includes(val))
          results.push(fail(rule,rule.message.replace('{num}',q.num).replace('{found}',val),q.startLine,val));
      }
      return results;
    },

    'span-associatedlessons-format-check'(rule, qs) {
      const results=[];
      for(const q of qs){
        if(!q.stem.includes('<span') || !/\/span>/i.test(q.stem)) continue;
        const sm=q.stem.match(/<span([^>]*)>/i); if(!sm) continue;
        const lm=sm[1].match(/data-associatedlessons\s*=\s*"([^"]*)"/i);
        if(!lm||!lm[1].trim()) continue;
        const bad=lm[1].split('|').filter(e=>!/^\d{2}\.\d{2}[RH]$/i.test(e.trim()));
        if(bad.length) results.push(fail(rule,rule.message.replace('{num}',q.num).replace('{found}',bad.join(', ')),q.startLine,bad[0].trim()));
      }
      return results;
    },

    'span-br-check'(rule, qs) {
      const results=[];
      for(const q of qs){
        // Skip if no span or unclosed — those are caught by dedicated rules
        if(!q.stem.includes('<span') || !/\/span>/i.test(q.stem)) continue;
        const after=q.stem.match(/<\/span>(.*)/i);
        if(after){
          const tail=after[1].trim();
          // Only accept <br /><br /> with spaces — consistent with self-closing-br rule
          if(!tail.startsWith('<br /><br />')){
            const bad=tail.match(/^(?:<\/?\s*br\b[^><]*(?:>|(?=<|$)))+/i);
            results.push(fail(rule,rule.message.replace('{num}',q.num),q.startLine,bad?bad[0]:tail.substring(0,15)));
          }
        }
      }
      return results;
    },

    'span-content-match-check'(rule, qs) {
      const results=[];
      for(const q of qs){
        if(!q.stem.includes('<span') || !/\/span>/i.test(q.stem)) continue;
        const sm=q.stem.match(/<span([^>]*)>([\s\S]*?)<\/span>/i); if(!sm) continue;
        const attrs=sm[1],content=sm[2].trim();
        const cm2=attrs.match(/data-complexity\s*=\s*"([^"]*)"/i);
        const lm=attrs.match(/data-associatedlessons\s*=\s*"([^"]*)"/i);
        if(!cm2||!lm) continue;
        const complexity=cm2[1],firstLesson=lm[1].split('|')[0].trim().replace(/[RH]$/i,'');
        const inner=content.match(/^\(([^)]+)\)$/);
        if(!inner){results.push(fail(rule,rule.message.replace('{num}',q.num).replace('{found}',content)+' Expected: ('+firstLesson+' '+complexity+')',q.startLine,content));continue;}
        const parts=inner[1].trim().split(/\s+/);
        const cL=parts[0]||'',cC=parts[1]||'';
        const issues=[]; let errStr=null;
        if(cL!==firstLesson){issues.push('lesson "'+cL+'" -> "'+firstLesson+'"');errStr=cL;}
        if(cC!==complexity){issues.push('complexity "'+cC+'" -> "'+complexity+'"');errStr=errStr||cC;}
        if(issues.length) results.push(fail(rule,rule.message.replace('{num}',q.num).replace('{found}',content)+' Mismatch: '+issues.join('; ')+'.',q.startLine,errStr));
      }
      return results;
    },

    'matching-format'(rule, qs) {
      // Valid format: term-definition  (non-empty content on both sides of the dash)
      return qs.filter(q=>q.code==='matching:label:').flatMap(q=>
        q.answers.filter(a=>!/^.+-.+$/.test(a.text.trim()))
          .map(a=>fail(rule,rule.message.replace('{num}',q.num).replace('{line}',a.lineNum),a.lineNum)));
    },

    'matching-points-check'(rule, qs) {
      return qs.filter(q=>q.code==='matching:label:'&&q.points!==null).flatMap(q=>{
        const pairs=q.answers.length;
        return(pairs>0&&q.points%pairs!==0)?[fail(rule,rule.message.replace('{num}',q.num).replace('{pairs}',pairs).replace('{points}',q.points),q.pointsLine)]:[];
      });
    },

    'accessible-symbols-check'(rule, qs, raw, lines) {
      return lines.flatMap((line,i)=>{
        const clean=line.replace(/<img\b[^>]*>/gi,'').replace(/<[^>]+>/g,'');
        const results=[];
        const degRe=/\u00b0/g; let m;
        while((m=degRe.exec(clean))!==null)
          results.push(fail(rule,
            rule.message.replace('{line}',i+1).replace('{found}','°').replace('{fix}','replace with &deg; or spell out "degrees"'),
            i+1,'°'));
        const minusRe=/\s-\d/g;
        while((m=minusRe.exec(clean))!==null){
          const before=clean.slice(Math.max(0,m.index-5),m.index+1);
          if(!/&\w*$/.test(before))
            results.push(fail(rule,
              rule.message.replace('{line}',i+1).replace('{found}',m[0].trim()).replace('{fix}','replace math minus with &minus;'),
              i+1,m[0].trim()));
        }
        return results;
      });
    },

    'special-chars-check'(rule, qs, raw, lines) {
      const AUTO = [
        { char:'\u201c', name:'Left double curly quote \u201c',  fix:'&ldquo;' },
        { char:'\u201d', name:'Right double curly quote \u201d', fix:'&rdquo;' },
        { char:'\u2018', name:'Left single curly quote \u2018',  fix:'&lsquo;' },
        { char:'\u2019', name:'Right single curly quote \u2019', fix:'&rsquo;' },
        { char:'\u2014', name:'Em dash \u2014',                  fix:'&mdash;' },
        { char:'\u2013', name:'En dash \u2013',                  fix:'&ndash;' },
        { char:'\u2026', name:'Ellipsis character \u2026',       fix:'... (three dots)' },
        { char:'\u00d7', name:'Multiplication sign \u00d7',      fix:'&times;' },
        { char:'\u00f7', name:'Division sign \u00f7',            fix:'&divide;' },
        { char:'\u00a0', name:'Non-breaking space',              fix:'regular space or remove' },
      ];
      const REVIEW = [
        { char:'\u00b2', name:'Superscript 2 \u00b2',   fix:'<sup>2</sup>' },
        { char:'\u00b3', name:'Superscript 3 \u00b3',   fix:'<sup>3</sup>' },
        { char:'\u00b9', name:'Superscript 1 \u00b9',   fix:'<sup>1</sup>' },
        { char:'\u00bd', name:'Fraction \u00bd',         fix:'&frac12; or "1/2"' },
        { char:'\u00bc', name:'Fraction \u00bc',         fix:'&frac14; or "1/4"' },
        { char:'\u00be', name:'Fraction \u00be',         fix:'&frac34; or "3/4"' },
        { char:'\u2192', name:'Right arrow \u2192',      fix:'&rarr; or "to"' },
        { char:'\u2190', name:'Left arrow \u2190',       fix:'&larr; or "from"' },
        { char:'\u2191', name:'Up arrow \u2191',         fix:'&uarr; or spell out' },
        { char:'\u2193', name:'Down arrow \u2193',       fix:'&darr; or spell out' },
        { char:'\u03b1', name:'Greek alpha \u03b1',      fix:'&alpha; or "alpha"' },
        { char:'\u03b2', name:'Greek beta \u03b2',       fix:'&beta; or "beta"' },
        { char:'\u03b3', name:'Greek gamma \u03b3',      fix:'&gamma; or "gamma"' },
        { char:'\u03b4', name:'Greek delta \u03b4',      fix:'&delta; or "delta"' },
        { char:'\u03b8', name:'Greek theta \u03b8',      fix:'&theta; or "theta"' },
        { char:'\u03bb', name:'Greek lambda \u03bb',     fix:'&lambda; or "lambda"' },
        { char:'\u03bc', name:'Greek mu \u03bc',         fix:'&mu; or "mu"' },
        { char:'\u03c0', name:'Greek pi \u03c0',         fix:'&pi; or "pi"' },
        { char:'\u03c3', name:'Greek sigma \u03c3',      fix:'&sigma; or "sigma"' },
        { char:'\u03c9', name:'Greek omega \u03c9',      fix:'&omega; or "omega"' },
        { char:'\u00a9', name:'Copyright \u00a9',        fix:'&copy; or "(c)"' },
        { char:'\u00ae', name:'Registered trademark \u00ae', fix:'&reg; or "(R)"' },
        { char:'\u2122', name:'Trademark \u2122',        fix:'&trade; or "(TM)"' },
        { char:'\u20ac', name:'Euro \u20ac',             fix:'&euro;' },
        { char:'\u00a3', name:'Pound \u00a3',            fix:'&pound;' },
        { char:'\u00a5', name:'Yen \u00a5',              fix:'&yen;' },
      ];

      const isAuto  = rule.tier === 'auto';
      const CHARS   = isAuto ? AUTO : REVIEW;

      return qs.flatMap((q, qi) => {
        const start = q.startLine - 1; // 0-based index into lines[]
        const end   = qi + 1 < qs.length ? qs[qi+1].startLine - 1 : lines.length;
        const block = lines.slice(start, end)
          .filter(l => !/^(points:|group:)/.test(l.trim()))
          .join('\n');
        // Strip img tags (incl. alt text) then all other tags — only scan visible text
        const textOnly = block.replace(/<img\b[^>]*>/gi,'').replace(/<[^>]+>/g,'');

        const found = [];
        for (const entry of CHARS) {
          if (!textOnly.includes(entry.char)) continue;
          // Collect every line number within this question block where the char appears
          const lineNums = [];
          lines.slice(start, end).forEach((l, idx) => {
            const clean = l.replace(/<img\b[^>]*>/gi,'').replace(/<[^>]+>/g,'');
            if (clean.includes(entry.char)) lineNums.push(start + idx + 1);
          });
          found.push({ ...entry, lineNums });
        }
        if (!found.length) return [];

        const firstLine = found[0].lineNums[0] || q.startLine;
        return [fail(rule,
          rule.message.replace('{num}', q.num),
          firstLine, null,
          { type:'special-chars', tier:rule.tier, qNum:q.num, chars:found })];
      });
    },

    'font-tag-check'(rule, qs, raw, lines) {
      return lines.flatMap((line,i)=>{
        const m=line.match(/<font\b[^>]*>/gi);
        return m?[fail(rule,rule.message.replace('{line}',i+1),i+1,m[0])]:[];
      });
    },

    'replacement-char-check'(rule, qs, raw, lines) {
      const REPL = '\uFFFD';
      return lines.flatMap((line, i) => {
        if (!line.includes(REPL)) return [];
        // Count occurrences and build a context snippet showing surrounding text
        const count = (line.match(/\uFFFD/g) || []).length;
        const msg = rule.message.replace('{line}', i + 1) +
          (count > 1 ? ' (' + count + ' occurrences on this line)' : '');
        return [fail(rule, msg, i + 1, REPL)];
      });
    }
  };

  function run(rawText) {
    const{rules,categories}=RULES_DATA;
    const lines=rawText.split('\n');
    const{questions}=parseQuestions(rawText);
    const allResults=[];
    for(const rule of rules){
      const handler=handlers[rule.type];
      if(!handler){console.warn('No handler:',rule.type);continue;}
      try{
        const out=handler(rule,questions,rawText,lines);
        if(!out||out.length===0) allResults.push(pass(rule));
        else allResults.push(...out);
      }catch(e){console.error('Rule error:',rule.id,e);}
    }
    const grouped={};
    for(const cat of Object.keys(categories)) grouped[cat]={label:categories[cat],passes:[],failures:[]};
    for(const r of allResults){
      if(!grouped[r.rule.category]) continue;
      (r.status==='pass'?grouped[r.rule.category].passes:grouped[r.rule.category].failures).push(r);
    }
    for(const cat of Object.values(grouped)){
      const seen=new Set();
      cat.passes=cat.passes.filter(p=>seen.has(p.rule.id)?false:(seen.add(p.rule.id),true));
    }
    const totalErrors=allResults.filter(r=>r.status==='fail'&&r.rule.severity==='error').length;
    const totalWarnings=allResults.filter(r=>r.status==='fail'&&r.rule.severity==='warning').length;
    const totalPasses=new Set(allResults.filter(r=>r.status==='pass').map(r=>r.rule.id)).size;
    return{grouped,categories,totalErrors,totalWarnings,totalPasses,total:rules.length,questionCount:questions.length,questions};
  }
  return{run};
})();

const autoFixers={
  'self-closing-br':    text=>text.replace(/<\/?\s*br\b[^><]*(?:>|(?=<|$))/gi,'<br />'),
  'no-inline-styles':   text=>text.replace(/\s*style\s*=\s*"[^"]*"/gi,'').replace(/\s*style\s*=\s*'[^']*'/gi,''),
  'img-double-quotes':  text=>text.replace(/<img([^>]*)>/gi,(_,a)=>'<img'+a.replace(/src\s*=\s*'([^']*)'/gi,'src="$1"').replace(/alt\s*=\s*'([^']*)'/gi,'alt="$1"')+'>'),
  'img-alt-quotes':     text=>text.replace(/(<img[^>]+>)/gi,t=>t.replace(/alt\s*=\s*"([^]*?)"(?=\s*\/?>|\s+[a-z]+(?:=|\s|>))/i,(_,inner)=>'alt="'+inner.replace(/"/g,"'")+'"')),
  'no-deprecated-tags': text=>text
    .replace(/<b>([\s\S]*?)<\/b>/gi,'<strong>$1</strong>')
    .replace(/<i>([\s\S]*?)<\/i>/gi,'<em>$1</em>')
    .replace(/<u>([\s\S]*?)<\/u>/gi,'<span class="underline">$1</span>')
    .replace(/<s>([\s\S]*?)<\/s>/gi,'<del>$1</del>')
    .replace(/<bold>([\s\S]*?)<\/bold>/gi,'<strong>$1</strong>')
    .replace(/<italic>([\s\S]*?)<\/italic>/gi,'<em>$1</em>')
    .replace(/<\/b>/gi,'</strong>').replace(/<\/i>/gi,'</em>')
    .replace(/<\/u>/gi,'</span>').replace(/<\/s>/gi,'</del>'),
  'points-before-group':text=>text.replace(/(group:\d+)\n(points:\d+)/g,'$2\n$1'),
  'span-followed-by-br':text=>text.replace(/(<\/span>)(?:\s*<\/?\s*br\b[^><]*(?:>|(?=<|$)))*/gi,'$1 <br /><br />'),
  'img-has-alt':        text=>text.replace(/<img([^>]*?)(\/?>)/gi,(match,attrs,close)=>{
    if(/alt\s*=\s*"[^"]+"/.test(attrs)) return match;
    if(/alt\s*=\s*""/.test(attrs)) return '<img'+attrs.replace(/alt\s*=\s*""/,'alt="[Describe image here]"')+close;
    if(/alt/.test(attrs)) return match;
    return '<img'+attrs+' alt="[Describe image here]"'+close;
  }),
  'missing-lt-span':    text=>text.replace(/(mc:radio:|essay:|tf:|fib:|matching:label:):?span\b/gi,(_,code)=>code+'<span'),
  'lt-gt-entities':     text=>text.replace(/&gt;/gi,'<span>></span>').replace(/&lt;/gi,'<span><</span>'),
  'special-chars-auto': text=>text
    .replace(/\u201c/g,'&ldquo;').replace(/\u201d/g,'&rdquo;')
    .replace(/\u2018/g,'&lsquo;').replace(/\u2019/g,'&rsquo;')
    .replace(/\u2014/g,'&mdash;')
    .replace(/\u2013/g,'&ndash;')
    .replace(/\u2026/g,'...')
    .replace(/\u00d7/g,'&times;')
    .replace(/\u00f7/g,'&divide;')
    .replace(/\u00a0/g,' '),
  'img-no-dimensions':  text=>text.replace(/<img([^>]*)>/gi,(_,a)=>'<img'+a.replace(/\s*\bwidth\s*=\s*(?:"[^"]*"|'[^']*'|\S+)/gi,'').replace(/\s*\bheight\s*=\s*(?:"[^"]*"|'[^']*'|\S+)/gi,'')+'>'),
  'font-tag-replace':   text=>text.replace(/<font\s+face\s*=\s*"([^"]*)"[^>]*>([\s\S]*?)<\/font>/gi,(_,face,inner)=>{
    const f=face.trim();
    const family=/courier\s*new/i.test(f)?"'Courier New', Courier, monospace":"'"+f+"'";
    return '<span style="font-family: '+family+';">'+inner+'</span>';
  })
};

const CHEVRON='<svg class="caret-svg" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>';
const resultRegistry={};

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function highlight(text,errorStr){
  let s=esc(text);
  if(errorStr){
    const e=esc(errorStr).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    s=s.replace(new RegExp('('+e+')','gi'),'<mark class="error-highlight">$1</mark>');
  }
  return s;
}

function renderReport(report,lines){
  document.getElementById('summary-chips').style.display='flex';
  document.getElementById('chip-error').textContent=report.totalErrors+' Error'+(report.totalErrors!==1?'s':'');
  document.getElementById('chip-warn').textContent=report.totalWarnings+' Warning'+(report.totalWarnings!==1?'s':'');
  document.getElementById('chip-pass').textContent='✓ '+report.totalPasses+' Passed';
  document.getElementById('q-strip').classList.add('visible');

  // Build group counts from questions
  const groupCounts = {};
  report.questions.forEach(q => {
    if (q.group !== null) groupCounts[q.group] = (groupCounts[q.group]||0) + 1;
  });
  const groupNums = Object.keys(groupCounts).map(Number).sort((a,b)=>a-b);

  // Build type counts (only show types present)
  const typeMap = [
    ['mc',       'mc:radio:'],
    ['essay',    'essay:'],
    ['fib',      'fib:'],
    ['tf',       'tf:'],
    ['matching', 'matching:label:']
  ];
  const typeCounts = typeMap
    .map(([label, code]) => ({ label, count: report.questions.filter(q=>q.code===code).length }))
    .filter(t => t.count > 0);

  const stat = (label, val) => `<div class="q-stat">${label}: <strong>${val}</strong></div>`;
  const pipe = `<div class="q-pipe"></div>`;

  let parts = [];

  // Questions + Groups total only (no per-group breakdown)
  parts.push(stat('Questions', report.questionCount));
  if (groupNums.length) parts.push(stat('Groups', groupNums.length));

  // Per-type counts
  if (typeCounts.length) {
    parts.push(pipe);
    typeCounts.forEach(t => parts.push(stat(t.label, t.count)));
  }

  document.getElementById('q-strip').innerHTML = parts.join('');

  // Build and cache dashboard data
  window._dashData = buildDashboardData(report.questions);
  window._dashMeta = { questions: report.questionCount, groups: groupNums.length };
  document.getElementById('dashboard-btn').disabled = false;
  document.getElementById('status-bar').classList.add('visible');
  document.getElementById('status-text').innerHTML=
    '<strong>'+report.total+'</strong> rules &nbsp;·&nbsp; '+
    '<strong style="color:var(--error)">'+report.totalErrors+'</strong> errors &nbsp;·&nbsp; '+
    '<strong style="color:var(--warn)">'+report.totalWarnings+'</strong> warnings &nbsp;·&nbsp; '+
    '<strong style="color:var(--pass)">'+report.totalPasses+'</strong> passed';
  if(report.totalErrors===0&&report.totalWarnings===0){
    document.getElementById('results-body').innerHTML='<div class="all-pass-banner"><div class="check">✅</div><h2>All checks passed!</h2><p>'+report.questionCount+' questions parsed. No formatting issues found.</p></div>';
    return;
  }
  const errLines=[],warnLines=[];

  // ── Build a line→question map so we can assign errors to groups ──
  const questions = report.questions;
  // For each question, determine its line range [startLine, endLine)
  const qRanges = questions.map((q, qi) => {
    const start = q.startLine;
    const end = qi + 1 < questions.length ? questions[qi+1].startLine - 1 : lines.length;
    return { q, start, end };
  });
  function groupForLine(ln) {
    if (!ln) return null;
    for (const { q, start, end } of qRanges) {
      if (ln >= start && ln <= end) return q.group;
    }
    return null;
  }
  function questionNumForLine(ln) {
    if (!ln) return null;
    for (const { q, start, end } of qRanges) {
      if (ln >= start && ln <= end) return q.num;
    }
    return null;
  }

  // Collect all failures across all categories
  const allFailures = [];
  for (const catData of Object.values(report.grouped)) {
    for (const r of catData.failures) allFailures.push(r);
  }

  // ── Assign each failure to a group bucket ──
  // Strategy: prefer lineNum→group lookup; fall back to parsing message for "group:" or "Question N"
  const byGroup = {}; // groupKey (number or 'general') → [{r, groupKey}]
  for (const r of allFailures) {
    let groupKey = null;

    // 1. Try resolving via lineNum
    if (r.lineNum) groupKey = groupForLine(r.lineNum);

    // 2. If still null, try extra data (group-points-consistency, group-sequence carry group info)
    if (groupKey === null && r.extra) {
      if (r.extra.group != null) groupKey = parseInt(r.extra.group);
      else if (r.extra.sequence) {
        // group-sequence: find the first out-of-order group
        const seq = r.extra.sequence;
        let prev = 0;
        for (const item of seq) {
          if (item.group < prev) { groupKey = item.group; break; }
          prev = item.group;
        }
      }
    }

    // 3. Try parsing "Question N" from the message to get group via qRanges
    if (groupKey === null && r.message) {
      const mQ = r.message.match(/[Qq]uestion\s+(\d+)/);
      if (mQ) {
        const qNum = parseInt(mQ[1]);
        const found = questions.find(q => q.num === qNum);
        if (found) groupKey = found.group;
      }
    }

    const bucket = groupKey !== null ? groupKey : 'general';
    if (!byGroup[bucket]) byGroup[bucket] = [];
    byGroup[bucket].push(r);
  }

  // ── Sort group keys: numbered groups ascending, then 'general' ──
  const groupKeys = Object.keys(byGroup).sort((a, b) => {
    if (a === 'general') return 1;
    if (b === 'general') return -1;
    return parseInt(a) - parseInt(b);
  });

  let html = '';
  for (const gk of groupKeys) {
    const fails = byGroup[gk];
    const errCount = fails.filter(f => f.rule.severity === 'error').length;
    const warnCount = fails.filter(f => f.rule.severity === 'warning').length;
    const hCls = errCount ? 'has-errors' : 'has-warnings';
    const badges =
      (errCount ? '<span class="cat-count cat-count-error">'+errCount+'</span>' : '') +
      (warnCount ? '<span class="cat-count cat-count-warn">'+warnCount+'</span>' : '');

    let label;
    if (gk === 'general') {
      label = '⚠ File-level / General Checks';
    } else {
      // Find question numbers in this group for the subtitle
      const qNums = [...new Set(fails.map(r => {
        const n = r.lineNum ? questionNumForLine(r.lineNum) : null;
        if (n) return n;
        // fall back: find questions with this group
        const q = questions.find(q => q.group === parseInt(gk));
        return q ? q.num : null;
      }).filter(Boolean))].sort((a,b)=>a-b);
      label = 'Group ' + gk;
      if (qNums.length) label += ' <span style="font-weight:400;font-size:10px;opacity:.7">(Q' + qNums.join(', Q') + ')</span>';
    }

    let items = '';
    // Sort within group: errors before warnings
    const sorted = [...fails].sort((a, b) => {
      const sev = s => s.rule.severity === 'error' ? 0 : 1;
      return sev(a) - sev(b);
    });
    for (const r of sorted) {
      items += renderItem(r, lines);
      if (r.lineNum) (r.rule.severity === 'error' ? errLines : warnLines).push(r.lineNum);
    }
    const catId = 'grp-' + gk;
    html += '<div class="category-section" id="'+catId+'">'+
      '<button class="category-header '+hCls+'" onclick="toggleCat(\''+catId+'\')">'+
      '<span class="cat-chevron">'+CHEVRON+'</span>'+label+' '+badges+'</button>'+
      '<div class="category-items">'+items+'</div></div>';
  }
  document.getElementById('results-body').innerHTML = html;
  highlightLines(errLines, warnLines);
}

function renderItem(r,lines){
  const isPassing=r.status==='pass';
  const cls=isPassing?'pass':r.rule.severity==='error'?'err':'warn';
  const icon=isPassing?'✓':r.rule.severity==='error'?'✕':'⚠';
  const uid='ri-'+r.rule.id+(r.lineNum||'')+Math.random().toString(36).slice(2,6);
  resultRegistry[uid]=r;
  const lineBadge=r.lineNum?'<span class="line-badge" onclick="jumpToLine('+r.lineNum+');event.stopPropagation()">L'+r.lineNum+'</span>':'';
  const hasFixer=!isPassing&&!!r.rule.fix;
  const hasAuto=hasFixer&&typeof autoFixers[r.rule.id]==='function';
  const wandBtn=hasFixer?'<button class="wand-btn" onclick="applyFix(\''+uid+'\',event)">'+(hasAuto?'✦ Apply Fix':'✦ Show Fix')+'</button>':'';
  const displayMsg=isPassing?'':highlight(r.message||'',r.errorStr);
  const isWarn=!isPassing&&r.rule.severity==='warning';
  const rationaleHtml=(isWarn&&r.rule.rationale)
    ?'<div class="result-rationale">ℹ '+esc(r.rule.rationale)+'</div>':'';
  let fixPanel='';
  if(hasFixer){
    const escSnip=esc(r.rule.fix.snippet||'');
    const userLine=r.lineNum&&lines?lines[r.lineNum-1]:'';
    const userSnippet=userLine?'<div style="background:var(--error-bg);border-bottom:1px solid var(--border)"><div style="font-size:10px;color:var(--error);padding:4px 12px;font-weight:700;text-transform:uppercase">Your Text (Line '+r.lineNum+')</div><pre class="fix-snippet" style="background:transparent;color:var(--error);margin:0">'+highlight(userLine.trim(),r.errorStr)+'</pre></div>':'';
    let extraPanel='';
    if(r.extra&&r.extra.type==='group-points'){
      const{group,expected,items}=r.extra;
      const rows=items.map(item=>{
        const off=String(item.points)!==String(expected);
        const jump=item.line?'<span class="line-badge" onclick="jumpToLine('+item.line+');event.stopPropagation()">L'+item.line+'</span>':'';
        return '<tr style="'+(off?'background:var(--error-bg)':'background:var(--pass-bg)')+';border-bottom:1px solid var(--border)"><td style="padding:5px 10px;font-size:11px;font-family:var(--mono)">Q'+item.num+'</td><td style="padding:5px 10px;font-size:12px;font-family:var(--mono);'+(off?'color:var(--error);font-weight:700':'color:var(--pass);font-weight:700')+'">points:'+item.points+'<span style="font-size:10px;background:'+(off?'var(--error)':'var(--pass)')+';color:#fff;border-radius:3px;padding:1px 5px;margin-left:6px">'+(off?'✕ wrong':'✓')+'</span></td><td style="padding:5px 10px;text-align:right">'+jump+'</td></tr>';
      }).join('');
      extraPanel='<div style="border-top:1px solid var(--border);padding:8px 12px 4px;font-size:11px;font-weight:700;color:var(--text-mid);text-transform:uppercase;letter-spacing:.5px">Group '+group+' — Point Values</div><table style="width:100%;border-collapse:collapse">'+rows+'</table><div style="padding:6px 12px 8px;font-size:11px;color:var(--text-mid)">Most common value: <strong>points:'+expected+'</strong> — update highlighted rows to match.</div>';
    } else if(r.extra&&r.extra.type==='group-sequence'){
      let prev=null;
      const rows=r.extra.sequence.map(item=>{
        const isBreak=prev!==null&&item.group<prev; prev=item.group;
        const jump=item.line?'<span class="line-badge" onclick="jumpToLine('+item.line+');event.stopPropagation()">L'+item.line+'</span>':'';
        return '<tr style="'+(isBreak?'background:var(--error-bg)':'')+';border-bottom:1px solid var(--border)"><td style="padding:5px 10px;font-size:11px;font-family:var(--mono)">Q'+item.num+'</td><td style="padding:5px 10px;font-size:12px;font-family:var(--mono);font-weight:600">group:'+item.group+(isBreak?'<span style="font-size:10px;background:var(--error);color:#fff;border-radius:3px;padding:1px 5px;margin-left:6px">↑ out of order</span>':'')+'</td><td style="padding:5px 10px;text-align:right">'+jump+'</td></tr>';
      }).join('');
      extraPanel='<div style="border-top:1px solid var(--border);padding:8px 12px 4px;font-size:11px;font-weight:700;color:var(--text-mid);text-transform:uppercase;letter-spacing:.5px">Group Sequence — All Questions</div><table style="width:100%;border-collapse:collapse">'+rows+'</table><div style="padding:6px 12px 8px;font-size:11px;color:var(--text-mid)">Highlighted rows are out of order. Questions in the same group must appear together.</div>';
    } else if(r.extra&&r.extra.type==='special-chars'){
      const isAuto=r.extra.tier==='auto';
      const hdrColor=isAuto?'var(--error)':'var(--warn)';
      const hdrBg=isAuto?'var(--error-bg)':'var(--warn-bg)';
      const rows=r.extra.chars.map(c=>{
        const lineList=c.lineNums.map(n=>'<span class="line-badge" onclick="jumpToLine('+n+');event.stopPropagation()">L'+n+'</span>').join(' ');
        return '<tr style="border-bottom:1px solid var(--border)">'+
          '<td style="padding:5px 10px;font-size:16px;text-align:center;width:32px">'+c.char+'</td>'+
          '<td style="padding:5px 10px;font-size:11px;font-family:var(--mono);color:var(--text-mid)">U+'+c.char.codePointAt(0).toString(16).toUpperCase().padStart(4,'0')+'</td>'+
          '<td style="padding:5px 10px;font-size:12px">'+esc(c.name)+'</td>'+
          '<td style="padding:5px 10px;font-size:11px;font-family:var(--mono);color:var(--pass);font-weight:600">'+esc(c.fix)+'</td>'+
          '<td style="padding:5px 10px;text-align:right">'+lineList+'</td>'+
          '</tr>';
      }).join('');
      extraPanel='<div style="border-top:1px solid var(--border);padding:8px 12px 4px;font-size:11px;font-weight:700;color:'+hdrColor+';background:'+hdrBg+';text-transform:uppercase;letter-spacing:.5px">'+(isAuto?'✕ Must Fix':'⚠ Review Required')+' — Special Characters Found</div>'+
        '<table style="width:100%;border-collapse:collapse">'+
        '<tr style="background:var(--surface2);border-bottom:1px solid var(--border2)">'+
        '<th style="padding:5px 10px;font-size:10px;font-weight:700;text-align:left;color:var(--text-dim)">Char</th>'+
        '<th style="padding:5px 10px;font-size:10px;font-weight:700;text-align:left;color:var(--text-dim)">Code</th>'+
        '<th style="padding:5px 10px;font-size:10px;font-weight:700;text-align:left;color:var(--text-dim)">Name</th>'+
        '<th style="padding:5px 10px;font-size:10px;font-weight:700;text-align:left;color:var(--text-dim)">Replace with</th>'+
        '<th style="padding:5px 10px;font-size:10px;font-weight:700;text-align:right;color:var(--text-dim)">Line(s)</th>'+
        '</tr>'+rows+'</table>';
      if(!isAuto) extraPanel+='<div style="padding:6px 12px 8px;font-size:11px;color:var(--text-mid)">Review each character and confirm the replacement is appropriate for the context before editing.</div>';
    }
    const isGroupExtra=!!extraPanel;
    fixPanel='<div class="fix-panel"><div class="fix-description">'+esc(r.rule.fix.description)+'</div>'+
      (isGroupExtra?extraPanel:userSnippet+'<div><div style="font-size:10px;color:var(--pass);padding:4px 12px;font-weight:700;text-transform:uppercase">Example Fix</div><pre class="fix-snippet">'+escSnip+'</pre></div>')+
      '</div>';
  }
  return '<div class="result-item '+cls+'" id="'+uid+'">'+
    '<div class="result-row" onclick="document.getElementById(\''+uid+'\').classList.toggle(\'expanded\')">'+
    '<div class="result-chevron">'+(hasFixer?CHEVRON:'')+'</div>'+
    '<span class="sev-icon">'+icon+'</span>'+
    '<div class="result-text"><div class="result-rule-name">'+esc(r.rule.description)+'</div>'+
    (displayMsg?'<div class="result-msg">'+displayMsg+'</div>':'')+
    rationaleHtml+
    '</div>'+lineBadge+wandBtn+'</div>'+fixPanel+'</div>';
}

function applyFix(uid,event){
  if(event) event.stopPropagation();
  const result=resultRegistry[uid]; if(!result) return;
  const{rule}=result;
  const itemEl=document.getElementById(uid); if(!itemEl) return;
  if(itemEl.classList.contains('fixed')){itemEl.classList.toggle('expanded');return;}
  const fixer=autoFixers[rule.id];
  if(typeof fixer==='function'){
    const before=ta.value,after=fixer(before,result);
    if(after!==before) ta.value=after;
    Object.entries(resultRegistry).forEach(([itemUid,itemResult])=>{
      if(itemResult.rule.id!==rule.id) return;
      const el=document.getElementById(itemUid);
      if(!el||el.classList.contains('fixed')) return;
      el.classList.remove('err','warn');el.classList.add('fixed');
      const ic=el.querySelector('.sev-icon');if(ic) ic.textContent='✦';
      const w=el.querySelector('.wand-btn');if(w){w.textContent='✓ Fixed';w.classList.add('applied');w.disabled=true;}
      if(itemResult.lineNum) markLineFixed(itemResult.lineNum);
    });
    itemEl.classList.add('expanded');
    const panel=itemEl.querySelector('.fix-panel');
    if(panel&&!panel.querySelector('.fix-applied-banner')){
      const b=document.createElement('div');b.className='fix-applied-banner';
      b.textContent='✦ Fix applied — review and re-audit when done';panel.prepend(b);
    }
  } else {
    itemEl.classList.toggle('expanded');
  }
}

// DASHBOARD
// ─────────────────────────────────────────────────────────────────
window._dashData = null;
window._dashMeta = null;

function buildDashboardData(questions) {
  const byGroup = {};
  const TYPE_LABELS = {
    'mc:radio:':       'MC',
    'essay:':          'Essay',
    'fib:':            'FIB',
    'tf:':             'T/F',
    'matching:label:': 'Matching'
  };
  for (const q of questions) {
    if (q.group === null) continue;
    if (!byGroup[q.group]) byGroup[q.group] = { count: 0, types: new Set(), points: new Set(), complexities: new Set(), lessons: new Set(), standards: new Set() };
    const g = byGroup[q.group];
    g.count++;
    if (q.code) g.types.add(TYPE_LABELS[q.code] || q.code);
    if (q.points !== null) g.points.add(q.points);
    const spanMatch = q.stem.match(/<span([^>]*)>/i);
    if (spanMatch) {
      const attrs = spanMatch[1];
      const cm2 = attrs.match(/data-complexity\s*=\s*"([^"]*)"/i);
      if (cm2 && cm2[1].trim()) g.complexities.add(cm2[1].trim().toUpperCase());
      const lm = attrs.match(/data-associatedlessons\s*=\s*"([^"]*)"/i);
      if (lm && lm[1].trim()) {
        lm[1].split('|').forEach(l => { const t=l.trim(); if(t) g.lessons.add(t); });
      }
      const stdRe = /data-standard-[a-z0-9_-]+\s*=\s*"([^"]*)"/gi;
      let sm;
      while ((sm = stdRe.exec(attrs)) !== null) {
        if (sm[1].trim()) g.standards.add(sm[1].trim());
      }
    }
  }
  return Object.entries(byGroup).map(([gNum, data]) => ({
    group: parseInt(gNum),
    count: data.count,
    types: [...data.types],
    points: [...data.points].sort((a,b)=>a-b),
    complexities: [...data.complexities],
    lessons: [...data.lessons],
    standards: [...data.standards]
  })).sort((a,b) => a.group - b.group);
}

function openDashboard() {
  const data = window._dashData;
  if (!data) return;
  const meta = window._dashMeta || {};
  document.getElementById('dash-meta').textContent =
    (meta.questions||0) + ' questions · ' + (meta.groups||0) + ' groups';
  const tbody = document.getElementById('dash-tbody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="dash-empty">No group data found. Make sure questions have group: lines.</td></tr>';
  } else {
    tbody.innerHTML = data.map((row, idx) => {
      // Count
      const countHtml = '<span class="dash-count">' + row.count + '</span>';
      // Type
      const TYPE_COLORS = { 'MC':'dash-type-mc', 'Essay':'dash-type-essay', 'FIB':'dash-type-fib', 'T/F':'dash-type-tf', 'Matching':'dash-type-matching' };
      const typeHtml = row.types.length
        ? row.types.map(t => '<span class="dash-type-chip ' + (TYPE_COLORS[t]||'dash-type-other') + '">' + esc(t) + '</span>').join(' ')
        : '<span style="color:var(--text-dim);font-style:italic;font-size:11px">—</span>';
      // Points
      let ptHtml;
      if (!row.points.length) {
        ptHtml = '<span style="color:var(--text-dim);font-style:italic;font-size:11px">—</span>';
      } else if (row.points.length === 1) {
        ptHtml = '<span class="dash-pt-chip">' + row.points[0] + '</span>';
      } else {
        ptHtml = row.points.map(p => '<span class="dash-pt-chip">' + p + '</span>').join(' ') +
          '<span class="dash-pt-multi">⚠ mixed</span>';
      }
      // Complexity
      let cxHtml;
      if (!row.complexities.length) {
        cxHtml = '<span style="color:var(--text-dim);font-style:italic;font-size:11px">—</span>';
      } else if (row.complexities.length === 1) {
        cxHtml = '<span class="dash-complexity ' + row.complexities[0] + '">' + row.complexities[0] + '</span>';
      } else {
        cxHtml = row.complexities.map(c => '<span class="dash-complexity ' + c + '">' + c + '</span>').join(' ');
      }
      const lessonHtml = row.lessons.length
        ? '<span class="dash-lesson">' + row.lessons.map(l => esc(l)).join('<br>') + '</span>'
        : '<span style="color:var(--text-dim);font-style:italic;font-size:11px">—</span>';
      const stdHtml = row.standards.length
        ? '<span class="dash-standard">' + row.standards.map(s => esc(s)).join('<br>') + '</span>'
        : '<span style="color:var(--text-dim);font-style:italic;font-size:11px">—</span>';
      return '<tr' + (idx % 2 === 1 ? ' class="dash-row-alt"' : '') + '>' +
        '<td>' + typeHtml + '</td>' +
        '<td><span class="dash-group-num">' + row.group + '</span></td>' +
        '<td>' + countHtml + '</td>' +
        '<td><div class="dash-points">' + ptHtml + '</div></td>' +
        '<td>' + cxHtml + '</td>' +
        '<td>' + lessonHtml + '</td>' +
        '<td>' + stdHtml + '</td>' +
        '</tr>';
    }).join('');
  }
  document.getElementById('dashboard-overlay').classList.add('open');
  document.getElementById('dashboard-modal').classList.add('open');
}

function closeDashboard() {
  document.getElementById('dashboard-overlay').classList.remove('open');
  document.getElementById('dashboard-modal').classList.remove('open');
}
</script>
</body>
</html>
