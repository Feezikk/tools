<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Educator Assessment Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css">
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f5f7;--surface:#fff;--surface2:#f0f2f5;
  --border:#dde1e9;--border2:#c8cdd8;
  --text:#1a1d26;--text-mid:#4a5068;--text-dim:#8a90a4;
  --accent:#1b4dff;--accent-light:#e8eeff;
  --error:#d93025;--error-bg:#fff0ef;--error-border:#fac5c1;
  --warn:#b45309;--warn-bg:#fffbeb;--warn-border:#fcd34d;
  --pass:#15803d;--pass-bg:#f0fdf4;--pass-border:#86efac;
  --wand:#7c3aed;--wand-bg:#f5f3ff;--wand-border:#c4b5fd;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  --r:6px;
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px}
header{height:52px;background:var(--text);color:#fff;display:flex;align-items:center;padding:0 24px;gap:14px;position:sticky;top:0;z-index:200}
.logo{font-family:var(--mono);font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.logo-badge{background:var(--accent);font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:1px}
.cdn-label{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.6)}
.cdn-prefix{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.4);background:rgba(255,255,255,.07);padding:3px 6px;border-radius:4px 0 0 4px;border:1px solid rgba(255,255,255,.18);border-right:none;white-space:nowrap;line-height:1}
.cdn-input{padding:3px 7px;border-radius:4px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;font-family:var(--mono);font-size:11px;outline:none}
.cdn-input-folder{width:220px;border-radius:0 4px 4px 0;border-left:none}
.cdn-input-folder.auto-detected{border-color:#4ade80;box-shadow:0 0 0 1px #4ade80}
.cdn-auto-badge{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;background:#16a34a;color:#fff;border-radius:3px;padding:1px 5px;margin-left:4px;display:none;align-items:center;line-height:1;white-space:nowrap}
.cdn-auto-badge.visible{display:flex}
.workspace{display:flex;height:calc(100vh - 52px);overflow:hidden}
.left-panel{display:flex;flex-direction:column;background:var(--surface);overflow:hidden;min-width:240px;width:520px;flex-shrink:0;min-height:0}
.right-panel{display:flex;flex-direction:column;overflow:hidden;flex:1;min-width:240px;min-height:0}
.divider{width:5px;background:var(--border2);cursor:col-resize;flex-shrink:0;position:relative;transition:background .15s;z-index:10}
.divider:hover,.divider.dragging{background:var(--accent)}
.divider::before{content:'⋮';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--text-dim);font-size:14px;pointer-events:none}
.panel-toolbar{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--surface2)}
.panel-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim)}
.tab-group{display:flex;background:var(--border);border-radius:5px;padding:2px;gap:2px}
.tab{padding:5px 12px;border-radius:3px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-mid);font-family:var(--sans);transition:all .12s}
.tab:hover{color:var(--text)}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.input-area{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.tab-content{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.tab-content.active{display:flex}
.editor-wrap{flex:1;min-height:0;position:relative}
.CodeMirror{position:absolute;top:0;left:0;right:0;bottom:0;height:100%!important;font-family:var(--mono);font-size:12px;line-height:1.7;background:var(--surface);color:var(--text);border:none}
.CodeMirror-scroll{height:100%;overflow-y:scroll!important;overflow-x:auto!important}
.CodeMirror textarea{position:fixed!important}
.CodeMirror-lines{padding:16px 0}
.CodeMirror-line{padding:0 16px!important}
.CodeMirror-gutters{background:var(--surface2);border-right:1px solid var(--border);min-width:44px}
.CodeMirror-linenumber{padding:0 8px 0 4px;min-width:28px;color:var(--text-dim);font-size:12px;line-height:1.7}
.CodeMirror-cursor{border-left:2px solid var(--accent)}
.CodeMirror-selected{background:var(--accent-light)!important}
.cm-error-line{background:#fde8e8!important}
.cm-warn-line{background:#fff3cd!important}
.cm-fixed-line{background:#fef9c3!important}
.cm-error-gutter{background:#fde8e8;color:var(--error)!important;font-weight:600}
.cm-warn-gutter{background:#fff3cd;color:var(--warn)!important;font-weight:600}
.cm-fixed-gutter{background:#fef9c3;color:#854d0e!important;font-weight:600}
.upload-zone{flex:1;margin:20px;border:2px dashed var(--border2);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;transition:all .15s;padding:40px;text-align:center}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:var(--accent-light)}
.upload-icon{font-size:36px}
.upload-label{color:var(--text-mid);font-size:13px}
.upload-label strong{color:var(--accent)}
.upload-label small{display:block;color:var(--text-dim);margin-top:4px}
.file-pill{margin:16px;padding:10px 14px;background:var(--pass-bg);border:1px solid var(--pass-border);border-radius:var(--r);display:none;align-items:center;gap:10px;font-size:13px;font-family:var(--mono)}
.action-bar{padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--surface)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .12s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.1)}
.btn-primary:active{transform:scale(.98)}
.btn-secondary{background:var(--surface2);color:var(--text-mid);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--border2);color:var(--text)}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text-mid);font-size:12px}
.btn-ghost:hover{border-color:var(--pass-border);color:var(--pass)}
.btn-ghost.copied{background:var(--pass-bg);color:var(--pass);border-color:var(--pass-border)}
.btn-link{background:none;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;font-family:var(--sans);margin-left:auto}
.btn-link:hover{color:var(--error)}
.btn-qmode{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text-mid);font-family:var(--sans);transition:all .12s;white-space:nowrap;margin-left:auto}
.btn-qmode:hover{border-color:var(--accent);color:var(--accent)}
.btn-qmode.active{background:var(--accent);border-color:var(--accent);color:#fff}
.cm-group-divider{width:100%;padding:0 0 0 4px;font-size:10px;font-weight:700;font-family:var(--mono);color:var(--text-dim);background:var(--surface2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);line-height:20px;letter-spacing:.5px;user-select:none;box-sizing:border-box}
.CodeMirror-linenumber.cm-q-label{color:var(--accent)!important;font-weight:700!important}
.shortcut-hint{font-size:11px;color:var(--text-dim);font-family:var(--mono);opacity:.7}
.results-header{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:10px}
.summary-chips{display:flex;gap:6px;margin-left:auto}
.chip{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px}
.chip-error{background:var(--error-bg);color:var(--error);border:1px solid var(--error-border)}
.chip-warn{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-border)}
.chip-pass{background:var(--pass-bg);color:var(--pass);border:1px solid var(--pass-border)}
.q-strip{padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);font-size:11px;color:var(--text-dim);display:none;gap:8px;align-items:center;flex-wrap:wrap}
.q-strip.visible{display:flex}
.q-stat{display:flex;align-items:center;gap:4px;font-family:var(--mono)}
.q-stat strong{color:var(--text)}
.q-pipe{width:1px;height:12px;background:var(--border2);margin:0 4px;flex-shrink:0}
.results-body{flex:1;overflow-y:auto;padding:14px}
.results-body::-webkit-scrollbar{width:5px}
.results-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.empty-state{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;text-align:center;padding:40px;color:var(--text-dim)}
.empty-icon{font-size:40px;opacity:.5}
.empty-state p{max-width:280px;line-height:1.6;font-size:13px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.all-pass-banner{text-align:center;padding:60px 24px}
.all-pass-banner .check{font-size:52px}
.all-pass-banner h2{font-size:20px;font-weight:700;color:var(--pass);margin:12px 0 6px}
.all-pass-banner p{color:var(--text-dim);font-size:13px}
/* ── Group / category sections ── */
.category-section{margin-bottom:12px}
.category-header{width:100%;display:flex;align-items:center;gap:10px;padding:11px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:700;color:var(--text-mid);text-align:left;transition:background .12s}
.category-header:hover{background:var(--border)}
.category-header.has-errors{background:var(--error-bg);border-color:var(--error-border);color:var(--error)}
.category-header.has-warnings{background:var(--warn-bg);border-color:var(--warn-border);color:var(--warn)}
.category-header.all-pass{background:var(--pass-bg);border-color:var(--pass-border);color:var(--pass)}
/* Badge pills inside category header — text labels like "2 Errors" */
.cat-count{font-size:11px;padding:2px 10px;border-radius:99px;font-weight:700;white-space:nowrap}
.cat-count-error{background:var(--error-bg);color:var(--error);border:1px solid var(--error-border)}
.cat-count-warn{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-border)}
.cat-count-pass{background:var(--pass-bg);color:var(--pass);border:1px solid var(--pass-border)}
.cat-chevron{margin-left:auto;opacity:.5;transition:transform .15s;display:flex;align-items:center;flex-shrink:0}
.category-section.open .cat-chevron{transform:rotate(180deg)}
.category-items{display:none;flex-direction:column;gap:4px;margin-top:8px;padding-left:16px;border-left:2px solid var(--border);margin-left:12px}
.category-section.open .category-items{display:flex}
/* ── Filter bar ── */
.filter-bar{display:none;align-items:center;gap:6px;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--surface2);flex-shrink:0}
.filter-bar.visible{display:flex}
.filter-label{font-size:11px;font-weight:600;color:var(--text-dim);margin-right:2px}
.filter-btn{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text-mid);font-family:var(--sans);transition:all .12s}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active-all{background:var(--text);border-color:var(--text);color:#fff}
.filter-btn.active-err{background:var(--error);border-color:var(--error);color:#fff}
.filter-btn.active-warn{background:var(--warn);border-color:var(--warn);color:#fff}
/* ── Result cards — table-like stacked rows ── */
.result-item{border:1px solid var(--border);border-radius:0;background:var(--surface);overflow:hidden;transition:box-shadow .12s;margin-top:-1px}
.category-items>.result-item:first-child{border-radius:var(--r) var(--r) 0 0;margin-top:0}
.category-items>.result-item:last-child{border-radius:0 0 var(--r) var(--r)}
.category-items>.result-item:only-child{border-radius:var(--r)}
.result-item.err{border-color:var(--error-border);background:#fffafa}
.result-item.warn{border-color:var(--warn-border);background:#fffdf5}
.result-item.pass{opacity:.65}
.result-item.fixed{background:var(--pass-bg);border-color:var(--pass-border)}
.result-item.fixed .result-rule-name{color:var(--pass)}
.result-item.fixed .sev-icon{color:var(--pass)}
/* Severity stripe — left border via box-shadow so it doesn't shift layout */
.result-item.err{box-shadow:inset 2px 0 0 var(--error)}
.result-item.warn{box-shadow:inset 2px 0 0 var(--warn)}
.result-item.pass{box-shadow:inset 2px 0 0 var(--pass)}
.result-item.fixed{box-shadow:inset 2px 0 0 var(--pass)}
/* Row — the always-visible summary line — table-like grid */
.result-row{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:0;padding:0;cursor:pointer;user-select:none;border-bottom:1px solid transparent}
.result-row:hover{background:rgba(0,0,0,.025)}
/* Icon + line-badge column */
.result-col-icon{display:flex;align-items:center;gap:6px;padding:9px 10px 9px 14px;flex-shrink:0;white-space:nowrap;border-right:1px solid var(--border);min-width:80px}
/* Rule name + message column */
.result-text{flex:1;min-width:0;padding:9px 12px}
/* Actions column */
.result-col-action{display:flex;align-items:center;gap:6px;padding:9px 12px 9px 10px;flex-shrink:0;border-left:1px solid var(--border);min-width:100px;justify-content:flex-end}
.result-chevron{opacity:.4;transition:transform .15s;display:flex;align-items:center;flex-shrink:0}
.result-item.expanded .result-chevron{transform:rotate(180deg)}
.caret-svg{width:14px;height:14px;display:block;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.sev-icon{font-size:14px;flex-shrink:0}
.result-text{flex:1;min-width:0}
.result-rule-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.4}
.result-msg{font-size:11px;color:var(--text-mid);margin-top:2px;line-height:1.4;font-family:var(--mono)}
/* filtering */
.result-item.hidden-by-filter{display:none}
.category-section.all-hidden{display:none}
mark.error-highlight{background:#fecaca;color:#991b1b;padding:0 3px;border-radius:3px;font-weight:600}
.line-badge{font-size:10px;font-family:var(--mono);font-weight:600;padding:2px 6px;border-radius:3px;background:var(--surface2);color:var(--text-mid);border:1px solid var(--border);flex-shrink:0;cursor:pointer;white-space:nowrap}
.line-badge:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
/* Apply Fix / View Guide buttons — now inline in the row */
.wand-btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:4px 10px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);flex-shrink:0;transition:all .12s;white-space:nowrap}
.wand-btn[data-auto="true"]{background:#16a34a;border:1px solid #16a34a;color:#fff}
.wand-btn[data-auto="true"]:hover{filter:brightness(1.1)}
.wand-btn[data-auto="false"]{background:var(--surface);border:1px solid var(--border2);color:var(--text-mid)}
.wand-btn[data-auto="false"]:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.wand-btn.applied{background:#fef9c3;border:1px solid #ca8a04;color:#854d0e;cursor:default;filter:none}
/* Show details toggle link */
.show-details-btn{background:none;border:none;font-family:var(--sans);font-size:11px;font-weight:600;color:var(--text-dim);cursor:pointer;padding:0;display:flex;align-items:center;gap:3px;flex-shrink:0;white-space:nowrap;transition:color .12s}
.show-details-btn:hover{color:var(--accent)}
.result-item.details-open .show-details-btn{color:var(--accent)}
/* Fix detail panel — hidden until "Show Details" clicked */
.fix-panel{display:none;padding:0 28px 14px 38px;background:transparent}
.result-item.details-open .fix-panel{display:block}
.fix-applied-banner{padding:7px 12px;background:var(--pass-bg);border:1px solid var(--pass-border);border-radius:var(--r);font-size:11px;color:var(--pass);font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:10px}
.fix-description{padding:4px 0 10px 0;font-size:12px;color:var(--text-mid);line-height:1.5}
/* Dark code diff block */
.diff-block{background:#1e1e2e;border-radius:var(--r);overflow:hidden;margin-bottom:10px;font-family:var(--mono);font-size:12px;line-height:1.7}
.diff-block-hdr{display:flex;align-items:center;gap:8px;padding:7px 12px;background:#2a2a3e;color:#a0a0b8;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.diff-block-hdr .diff-label{flex:1}
.diff-block-body{padding:10px 14px}
.diff-line{display:flex;gap:10px;padding:1px 0;white-space:pre-wrap;word-break:break-all}
.diff-line-del{background:rgba(239,68,68,.15);color:#fca5a5;border-radius:3px;padding:1px 4px;margin:-1px -4px}
.diff-line-del .diff-sigil{color:#f87171;font-weight:700;flex-shrink:0;user-select:none}
.diff-line-del .diff-text{color:#fca5a5}
.diff-line-del del{text-decoration:line-through;opacity:.8}
.diff-line-ins{background:rgba(34,197,94,.13);border-radius:3px;padding:1px 4px;margin:-1px -4px}
.diff-line-ins .diff-sigil{color:#4ade80;font-weight:700;flex-shrink:0;user-select:none}
.diff-line-ins .diff-text{color:#86efac}
.diff-line-ins ins{text-decoration:none;font-weight:bold;color:#4ade80}
.diff-line-ins ins.dim{color:#86efac;font-weight:normal}
/* Apply Fix + Copy buttons inside diff block header */
.diff-action-btn{display:flex;align-items:center;gap:4px;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:var(--sans);transition:all .12s;white-space:nowrap}
.diff-apply-btn{background:#16a34a;color:#fff}
.diff-apply-btn:hover{filter:brightness(1.1)}
.diff-apply-btn.applied{background:#ca8a04;color:#fff;cursor:default}
.diff-copy-btn{background:transparent;border:1px solid rgba(255,255,255,.2)!important;color:#a0a0b8;font-size:11px}
.diff-copy-btn:hover{border-color:rgba(255,255,255,.5)!important;color:#fff}
/* Context / Best Practice callout */
.context-panel{margin-top:8px;margin-bottom:6px;padding:10px 14px;background:#f0f7ff;border:1px solid #bfdbfe;border-radius:var(--r);font-size:12px;color:#1e3a5f;line-height:1.6}
.context-panel-hdr{font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px;font-size:12px}
/* Legacy snippet support (for non-diff extra panels) */
.fix-snippet{padding:10px 12px;font-family:var(--mono);font-size:11.5px;line-height:1.6;white-space:pre-wrap;word-break:break-word;border-radius:0 0 var(--r) var(--r);border:1px solid var(--border);border-top:none;margin:0 0 10px 0}
.snippet-hdr{font-size:10px;padding:6px 12px;font-weight:700;text-transform:uppercase;border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;border-bottom:none}
.status-bar{padding:7px 16px;border-top:1px solid var(--border);background:var(--surface);font-size:11px;color:var(--text-dim);display:none;align-items:center;gap:4px}
.status-bar.visible{display:flex}
/* Dashboard button */
.btn-dashboard{margin-left:12px;padding:5px 12px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:var(--r);font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-dashboard:hover:not(:disabled){background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.45)}
.btn-dashboard:disabled{opacity:.35;cursor:not-allowed}
/* Dashboard modal */
.dash-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;animation:fadeIn .15s}
.dash-overlay.open{display:block}
.dash-modal{display:none;position:fixed;top:60px;right:16px;width:min(960px,calc(100vw - 32px));max-height:calc(100vh - 80px);background:var(--surface);border:1px solid var(--border2);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.18);z-index:501;flex-direction:column;overflow:hidden;animation:slideDown .18s}
.dash-modal.open{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.dash-header{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface2);flex-shrink:0}
.dash-title{font-size:14px;font-weight:700;color:var(--text)}
.dash-meta{font-size:11px;color:var(--text-dim);font-family:var(--mono)}
.dash-close{margin-left:auto;background:none;border:1px solid var(--border);border-radius:4px;padding:3px 8px;color:var(--text-mid);font-size:12px;cursor:pointer;font-family:var(--sans)}
.dash-close:hover{border-color:var(--error-border);color:var(--error)}
.dash-body{overflow-y:auto;flex:1}
.dash-body::-webkit-scrollbar{width:5px}
.dash-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.dash-table{width:100%;border-collapse:collapse;font-size:12px}
.dash-table th{position:sticky;top:0;background:var(--surface2);border-bottom:2px solid var(--border2);padding:9px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-dim);white-space:nowrap;z-index:1}
.dash-table td{padding:8px 14px;border-bottom:1px solid var(--border);vertical-align:middle;line-height:1.4}
.dash-table tr:last-child td{border-bottom:none}
.dash-table tr:hover td{background:var(--surface2)}
.dash-table tr.dash-row-alt td{background:#fafbfc}
.dash-table tr.dash-row-alt:hover td{background:var(--surface2)}
.dash-group-num{font-family:var(--mono);font-weight:700;font-size:13px;color:var(--text)}
.dash-points{font-family:var(--mono);font-size:12px}
.dash-points .dash-pt-chip{display:inline-block;background:var(--accent-light);color:var(--accent);border:1px solid #c3d0ff;border-radius:4px;padding:1px 7px;font-weight:700;margin:1px 2px}
.dash-points .dash-pt-multi{color:var(--warn);font-size:10px;margin-left:4px;font-weight:600}
.dash-complexity{display:inline-block;font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px}
.dash-complexity.LC{background:#f0fdf4;color:var(--pass);border:1px solid var(--pass-border)}
.dash-complexity.MC{background:#fffbeb;color:var(--warn);border:1px solid var(--warn-border)}
.dash-complexity.HC{background:var(--error-bg);color:var(--error);border:1px solid var(--error-border)}
.dash-complexity.mixed{background:var(--surface2);color:var(--text-mid);border:1px solid var(--border2)}
.dash-lesson{font-family:var(--mono);font-size:11px;color:var(--text-mid)}
.dash-standard{font-family:var(--mono);font-size:11px;color:var(--text-mid);max-width:220px;word-break:break-word}
.dash-empty{padding:40px;text-align:center;color:var(--text-dim);font-size:13px}
.dash-count{display:inline-block;font-family:var(--mono);font-weight:700;font-size:13px;color:var(--text-mid);background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:1px 8px;min-width:28px;text-align:center}
.dash-type-chip{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap}
.dash-type-mc{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.dash-type-essay{background:#fdf4ff;color:#7e22ce;border:1px solid #e9d5ff}
.dash-type-fib{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
.dash-type-tf{background:#f0fdfa;color:#0f766e;border:1px solid #99f6e4}
.dash-type-matching{background:#fefce8;color:#a16207;border:1px solid #fef08a}
.dash-type-other{background:var(--surface2);color:var(--text-mid);border:1px solid var(--border2)}
</style>
</head>
<body>

<header>
  <div class="logo">⬡ Educator Assessment Checker <span class="logo-badge">v4.83</span></div>
  <label class="cdn-label">
    Course Image Folder:
    <span class="cdn-prefix">//cdn.flvs.net/assessment_images/</span><input id="img-base-path" class="cdn-input cdn-input-folder" type="text"
      placeholder="folder_name"
      title="Enter the course-specific folder name. The base path //cdn.flvs.net/assessment_images/ is always required."><span id="cdn-auto-badge" class="cdn-auto-badge" title="Folder auto-detected from image paths in the content">auto</span>
  </label>
  <button class="btn btn-dashboard" id="dashboard-btn" disabled title="Run an audit first">⊞ Dashboard</button>
</header>

<!-- DASHBOARD MODAL -->
<div id="dashboard-overlay" class="dash-overlay"></div>
<div id="dashboard-modal" class="dash-modal">
  <div class="dash-header">
    <div class="dash-title">⊞ Exam Dashboard</div>
    <div class="dash-meta" id="dash-meta"></div>
    <button class="dash-close" id="dash-close-btn">✕</button>
  </div>
  <div class="dash-body">
    <table class="dash-table" id="dash-table">
      <thead>
        <tr>
          <th>Type</th>
          <th>Group</th>
          <th>Count</th>
          <th>Points</th>
          <th>Complexity</th>
          <th>Lesson</th>
          <th>Standard</th>
          <th title="Group contains at least one image">Images</th>
        </tr>
      </thead>
      <tbody id="dash-tbody"></tbody>
    </table>
  </div>
</div>

<div class="workspace">
  <div class="left-panel">
    <div class="panel-toolbar">
      <span class="panel-label">Input</span>
      <div class="tab-group">
        <button class="tab active" data-tab="paste">Paste Text</button>
        <button class="tab" data-tab="upload">Upload File</button>
      </div>
      <button class="btn-qmode" id="qmode-btn" title="Toggle Question Number view" style="display:none">Q# View</button>
    </div>
    <div class="input-area">
      <div class="tab-content active" id="tab-paste">
        <div class="editor-wrap"><div id="cm-editor"></div></div>
      </div>
      <div class="tab-content" id="tab-upload">
        <div class="upload-zone" id="upload-zone">
          <div class="upload-icon">📄</div>
          <div class="upload-label"><strong>Click to browse</strong> or drag &amp; drop<small>Accepts .txt and .html files</small></div>
        </div>
        <div class="file-pill" id="file-pill">
          📄 <span id="file-name-label"></span>
          <button class="btn-link" id="clear-file-btn">✕ Remove</button>
        </div>
        <input type="file" id="file-input" accept=".txt,.html,.htm" style="display:none">
      </div>
    </div>
    <div class="action-bar">
      <button class="btn btn-primary" id="run-audit-btn">▶ Run Audit <span class="shortcut-hint">⌘↵</span></button>
      <button class="btn btn-secondary" id="load-sample-btn">Load Sample</button>
      <button class="btn btn-ghost" id="copy-btn">⎘ Copy Text</button>
      <button class="btn-link" id="clear-all-btn">Clear</button>
    </div>
  </div>

  <div class="divider" id="divider"></div>

  <div class="right-panel">
    <div class="results-header">
      <span class="panel-label">Results</span>
      <div class="summary-chips" id="summary-chips" style="display:none">
        <span class="chip chip-error" id="chip-error"></span>
        <span class="chip chip-warn"  id="chip-warn"></span>
        <span class="chip chip-pass"  id="chip-pass"></span>
        <div class="q-pipe" style="margin: 0 4px;"></div>
        <button class="btn-link" id="collapse-all-btn" title="Collapse all items and categories">Collapse All</button>
      </div>
    </div>
    <div class="q-strip" id="q-strip"></div>
    <div class="filter-bar" id="filter-bar">
      <span class="filter-label">Show:</span>
      <button class="filter-btn active-all" id="filter-all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" id="filter-err" onclick="setFilter('err')">Errors only</button>
      <button class="filter-btn" id="filter-warn" onclick="setFilter('warn')">Warnings only</button>
    </div>
    <div class="results-body" id="results-body">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <p>Paste your assessment content and click <strong>Run Audit</strong> to check for formatting issues.</p>
      </div>
    </div>
    <div class="status-bar" id="status-bar"><span id="status-text"></span></div>
  </div>
</div>

<script>
'use strict';

// ─────────────────────────────────────────────────────────────────
// APP STATE — centralised mutable state (replaces scattered window._ globals)
// ─────────────────────────────────────────────────────────────────
const AppState = {
  lineMap:          {},
  activeFilter:     'all',   // current filter mode: 'all' | 'err' | 'warn'
  dashData:         null, // built by buildDashboardData after each audit
  dashMeta:         null, // { questions, groups }
  imgCourseFolder:  '',   // set by the header input
  imgBasePath:      '',   // derived from imgCourseFolder
  hasRunOnce:       false,
  openCategories:   new Set(),
  qMode:            false,   // question-number gutter mode
  qLineMap:         {},      // lineNum (1-based) → { qNum, group } built after audit
};

// ─────────────────────────────────────────────────────────────────
// DOM CACHE — one lookup per element, used everywhere below
// ─────────────────────────────────────────────────────────────────
const DOM = (() => {
  const $ = id => document.getElementById(id);
  return {
    // Header
    imgBasePath:    $('img-base-path'),
    cdnAutoBadge:   $('cdn-auto-badge'),
    dashboardBtn:   $('dashboard-btn'),
    // Left panel
    cmEditor:       $('cm-editor'),
    uploadZone:     $('upload-zone'),
    filePill:       $('file-pill'),
    fileNameLabel:  $('file-name-label'),
    fileInput:      $('file-input'),
    // Action bar
    runAuditBtn:    $('run-audit-btn'),
    loadSampleBtn:  $('load-sample-btn'),
    copyBtn:        $('copy-btn'),
    clearAllBtn:    $('clear-all-btn'),
    // Right panel
    resultsBody:    $('results-body'),
    summaryChips:   $('summary-chips'),
    collapseAllBtn: $('collapse-all-btn'),
    chipError:      $('chip-error'),
    chipWarn:       $('chip-warn'),
    chipPass:       $('chip-pass'),
    qStrip:         $('q-strip'),
    statusBar:      $('status-bar'),
    statusText:     $('status-text'),
    // Divider
    divider:        $('divider'),
    // Dashboard modal
    dashOverlay:    $('dashboard-overlay'),
    dashModal:      $('dashboard-modal'),
    dashMeta:       $('dash-meta'),
    dashTbody:      $('dash-tbody'),
    // Tab buttons
    clearFileBtn:   $('clear-file-btn'),
    dashCloseBtn:   $('dash-close-btn'),
    filterBar:      $('filter-bar'),
    filterAll:      $('filter-all'),
    filterErr:      $('filter-err'),
    filterWarn:     $('filter-warn'),
    qmodeBtn:       $('qmode-btn'),
  };
})();

// ─────────────────────────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────────────────────────
const EMPTY_STATE_HTML = '<div class="empty-state"><div class="empty-icon">📋</div><p>Paste your assessment content and click <strong>Run Audit</strong> to check for formatting issues.</p></div>';
const CDN_BASE = '//cdn.flvs.net/assessment_images/';

// ─────────────────────────────────────────────────────────────────
// RULES DATA
// ─────────────────────────────────────────────────────────────────
const RULES_DATA = {
  categories: {
    'question-structure': 'Question Structure',
    'html-tags':          'HTML Tag Integrity',
    'images':             'Image Tag Integrity',
    'span-metadata':      'Span Metadata',
    'groups-points':      'Question Groups & Points',
    'tables':             'Table Structure',
    'accessibility':      'Special Character Check'
  },
  rules: [
    { id:'no-space-in-code', category:'question-structure', severity:'error',
      description:'No spaces allowed around colons in question type codes',
      type:'code-spacing',
      message:'Question code has extra spaces: "{found}". Use mc:radio: not mc : radio :',
      fix:{description:'Remove all spaces around colons in the question type code.',
           snippet:'mc:radio:  essay:  fib:  tf:  matching:label:'} },

    { id:'question-spacing', category:'question-structure', severity:'error',
      description:'Questions must be separated by exactly one blank line',
      type:'question-spacing',
      message:'{found} between Q{a} and Q{b} — must be exactly one blank line.',
      fix:{description:'Ensure exactly one blank line appears between each pair of questions. Remove extra blank lines or add a missing one.',
           snippet:'points:2\ngroup:1\n                 <- exactly one blank line between\nmc:radio:<span ...'} },

    { id:'groups-sequential', category:'groups-points', severity:'error',
      description:'Groups must be sequential — all group 1 together, then group 2, etc.',
      type:'group-sequence',
      message:'Group sequence error: group:{found} appears after group:{previous}.',
      fix:{description:'Reorder so all group 1 questions come first, then group 2, etc.',
           snippet:'...group:1\n\n...group:1\n\n...group:2  <- group 2 starts here'} },

    { id:'groups-contiguous', category:'groups-points', severity:'error',
      description:'Group numbers must start at 1 and increase by exactly 1 with no gaps',
      type:'group-numbering',
      message:'Group numbering error: {found}.',
      fix:{description:'Renumber groups so they start at 1 and increment by 1 with no gaps (1, 2, 3…). Every group number in the sequence must be used.',
           snippet:'group:1  <- first group\ngroup:2  <- next\ngroup:3  <- no skipping'} },

    { id:'points-present', category:'groups-points', severity:'error',
      description:'Every question must have a points: line',
      type:'question-has-field', field:'points',
      message:'Question {num} is missing a points: line.',
      fix:{description:'Add points: before group: at the end of the question.',
           snippet:'x-Correct\nWrong\npoints:3\ngroup:1'} },

    { id:'group-present', category:'groups-points', severity:'error',
      description:'Every question must have a group: line',
      type:'question-has-field', field:'group',
      message:'Question {num} is missing a group: line.',
      fix:{description:'Add group: after points: at the end of the question.',
           snippet:'x-Correct\nWrong\npoints:3\ngroup:1'} },

    { id:'points-before-group', category:'groups-points', severity:'error',
      description:'points: must appear before group:',
      type:'field-order',
      message:'Question {num} has group: before points:. Correct order: points: then group:.',
      fix:{description:'Swap so points: always comes before group:.',
           snippet:'points:3\ngroup:1'} },

    { id:'same-group-same-type', category:'groups-points', severity:'error',
      description:'All questions in a group must be the same type',
      type:'group-type-consistency',
      message:'Group {group} mixes question types: {types}.',
      fix:{description:'Ensure every question in a group uses the same type code.',
           snippet:'mc:radio:Question A\npoints:3\ngroup:1\n\nmc:radio:Question B\npoints:3\ngroup:1'} },

    { id:'same-group-same-points', category:'groups-points', severity:'error',
      description:'All questions in a group must have the same point value',
      type:'group-points-consistency',
      message:'Group {group} has inconsistent point values: {values}.',
      fix:{description:'All questions in the same group must share the same points value.',
           snippet:'points:3\ngroup:1\n\npoints:3  <- must match\ngroup:1'} },

    { id:'mc-radio-one-correct', category:'question-structure', severity:'error',
      description:'mc:radio questions must have exactly one correct answer (x-)',
      type:'mc-correct-count',
      message:'Question {num} has {count} correct answers marked. Must be exactly 1.',
      fix:{description:'Mark exactly one answer with x- prefix.',
           snippet:'x-Correct answer\nWrong answer\nWrong answer'} },

    { id:'tf-answer-valid', category:'question-structure', severity:'error',
      description:'tf: questions must list only one of true or false, not both',
      type:'tf-answer',
      message:'Question {num} lists both true and false as answers.',
      fix:{description:'A tf: question should list only the correct answer.',
           snippet:'tf:The sky is blue.\ntrue'} },

    { id:'tf-answer-present', category:'question-structure', severity:'error',
      description:'tf: questions must have exactly one answer — either true or false',
      type:'tf-answer-present',
      message:'Question {num} has no valid answer. Must be exactly one of: true, false.',
      fix:{description:'Add either true or false as the answer line.',
           snippet:'tf:The sky is blue.\ntrue'} },

    { id:'malformed-html-tag', category:'html-tags', severity:'error',
      description:'HTML tags must have matching opening and closing angle brackets',
      type:'malformed-tags',
      message:'Line {line} has a malformed HTML tag: "{found}".',
      fix:{description:'Ensure every < has a matching >.',
           snippet:'<br />  not  <br\n<img src="..." />  not  <img src="..."'} },

    { id:'self-closing-br', category:'html-tags', severity:'error',
      description:'Line breaks must be written as <br />',
      type:'br-format',
      message:'Line {line} has "{found}" — must be <br />.',
      fix:{description:'Replace all br variants with exactly <br />.',
           snippet:'<br />  (correct)\n<br>  <BR>  </br>  (wrong)'} },

    { id:'no-inline-styles', category:'html-tags', severity:'error',
      description:'Inline style attributes are not allowed except on img (vertical-align:middle), ol (list-style-type), table elements (text-align), and any element with style="text-align: ..." or dir="..."',
      type:'inline-style-check',
      message:'Line {line} has a disallowed inline style attribute.',
      fix:{description:'Remove the style attribute. Allowed exceptions: style="vertical-align:middle;" on img tags, style="list-style-type:..." on ol tags, style="text-align: [any]" on any element, and dir="[any]" on any element.',
           snippet:'<img src="..." alt="..." style="vertical-align:middle;" />\n<ol style="list-style-type: upper-roman;">\n<p style="text-align: center;">text</p>\n<p dir="rtl">text</p>'} },

    { id:'no-deprecated-tags', category:'html-tags', severity:'error',
      description:'Deprecated tags <b>, <i>, <u>, <s> must be replaced with semantic equivalents',
      type:'forbidden-html-tags',
      tags:['<b>','</b>','<i>','</i>','<u>','</u>','<s>','</s>','<bold>','</bold>','<italic>','</italic>'],
      message:'Line {line} uses deprecated tag "{found}".',
      fix:{description:'Replace deprecated tags: <b>→<strong>, <i>→<em>, <u>→<span class="underline">, <s>→<del>. Remove <bold> and <italic> entirely.',
           snippet:'<strong>bold</strong>  <em>italic</em>  <del>struck</del>'} },

    { id:'mark-tag', category:'html-tags', severity:'error',
      description:'<mark> tags and remnants must be removed — not supported by the assessment player',
      type:'mark-tag-check',
      message:'Line {line} contains {found}.',
      fix:{description:'Remove all <mark> opening tags, </mark> closing tags, and any partial remnants. Complete tags can be auto-removed with Apply Fix — partial remnants must be reviewed and removed manually.',
           snippet:'<!-- Remove entirely -->\n<mark class="highlight">text</mark>  →  text\n\n<!-- Partial remnants also need removing -->\nmark class="highlight">  →  (delete)\n/mark>  →  (delete)'} },

    { id:'no-commented-code', category:'html-tags', severity:'error',
      description:'HTML comments containing code must be removed',
      type:'commented-html',
      message:'Line {line} contains HTML tags inside a comment.',
      fix:{description:'Remove the commented-out HTML block entirely.',
           snippet:'<!-- comments with <tags> inside are not allowed -->'} },

    { id:'unclosed-paired-tags', category:'html-tags', severity:'error',
      description:'Paired HTML tags must have matching open and close tags',
      type:'unclosed-paired-tags-check',
      message:'Question {num} has {found} — every opening tag needs a matching closing tag.',
      fix:{description:'Add the missing closing tag, or remove the orphaned opening tag.',
           snippet:'<strong>text</strong>  <em>text</em>  <sup>2</sup>  <sub>2</sub>'} },

    { id:'lt-gt-entities', category:'html-tags', severity:'error',
      description:'Math/code symbols (<, >) and entities (&lt;, &gt;) must be wrapped in <span>',
      type:'lt-gt-entities-check',
      message:'Line {line} contains unspanned "{found}" — wrap in <span> to prevent LMS parsing errors.',
      fix:{description:'Wrap naked < and > symbols (or their html entities) in <span> tags so the LMS does not misinterpret them as broken HTML.',
           snippet:'\nx < y\np &gt; 5\n\n\nx <span><</span> y\np <span>></span> 5'} },

    { id:'img-has-alt', category:'images', severity:'error',
      description:'Every image must have a non-empty alt attribute',
      type:'img-alt-check',
      message:'Line {line} has an <img> missing a non-empty alt attribute.',
      fix:{description:'Add a descriptive alt attribute to the img tag.',
           snippet:'<img src="image.jpg" alt="Description of the image." />'} },

    { id:'img-double-quotes', category:'images', severity:'error',
      description:'Image src and alt attributes must use double quotes',
      type:'img-quote-check',
      message:'Line {line} uses single quotes on an img attribute.',
      fix:{description:'Change single quotes to double quotes on src and alt.',
           snippet:'<img src="image.jpg" alt="Description." />'} },

    { id:'img-format', category:'images', severity:'warning',
      description:'Images should use .jpg, .gif, .png, or .svg format',
      type:'img-extension-check', allowed:['.jpg','.jpeg','.gif','.png','.svg'],
      message:'Line {line} image has unsupported extension "{found}".',
      rationale:'Unsupported formats may not render correctly in the assessment player. Stick to jpg, gif, png, or svg.',
      fix:{description:'Convert the image to jpg, gif, png, or svg.',
           snippet:'image.jpg  image.png  image.gif  image.svg'} },

    { id:'img-alt-quotes', category:'images', severity:'error',
      description:'Double quotes inside alt text must be replaced with single quotes',
      type:'img-alt-quotes-check',
      message:'Line {line} alt text contains double quotes — use single quotes inside alt.',
      fix:{description:'Replace " with \' inside the alt text.',
           snippet:"alt=\"A 'quoted' word\"  not  alt=\"A \\\"quoted\\\" word\""} },

    { id:'img-alt-html', category:'images', severity:'error',
      description:'Alt text must not contain HTML tags',
      type:'img-alt-html-check',
      message:'Line {line} alt text contains HTML: "{found}".',
      fix:{description:'Remove all HTML tags from the alt text.',
           snippet:'alt="Plain text description only."'} },

    { id:'img-alt-symbol-words', category:'images', severity:'warning',
      description:'Symbols in alt text must be spelled out',
      type:'img-alt-symbol-check',
      message:'Line {line} alt text contains symbol "{found}" — spell it out.',
      rationale:'Screen readers speak alt text aloud. Symbols like >, <, %, + are not pronounced correctly — they must be written as words (e.g. "greater than", "percent", "plus").',
      fix:{description:'Replace symbols with words: > = greater than, < = less than, % = percent, etc.',
           snippet:'alt="a graph showing values greater than 50 percent"'} },

    { id:'img-alt-unknown-symbol', category:'images', severity:'warning',
      description:'Unusual symbols in alt text should be reviewed',
      type:'img-alt-unknown-symbol-check',
      message:'Line {line} alt text contains unusual symbol "{found}" — review.',
      rationale:'Alt text is read aloud by screen readers. Unusual characters may be skipped, mispronounced, or cause confusion. Spell out or remove any non-standard symbols.',
      fix:{description:'Ensure all symbols in alt text are spelled out or removed.',
           snippet:'Alt text should read naturally when spoken aloud.'} },

    { id:'img-no-dimensions', category:'images', severity:'error',
      description:'Images must not have height or width attributes',
      type:'img-dimensions-check',
      message:'Line {line} <img> has a "{found}" attribute — remove it.',
      fix:{description:'Remove width and height attributes from img tags.',
           snippet:'<img src="image.jpg" alt="desc" />  (no width or height)'} },

    { id:'img-extra-attributes', category:'images', severity:'warning',
      description:'Images should only have src, alt, and optionally style="vertical-align:middle;"',
      type:'img-extra-attrs-check',
      message:'Line {line} <img> has unexpected attribute(s): {found}.',
      rationale:'Extra attributes on img tags (like title, class, id, or data-*) are not supported by the assessment player and will be stripped or may cause rendering issues.',
      fix:{description:'Remove attributes other than src, alt, and the allowed style.',
           snippet:'<img src="..." alt="..." />'} },

    { id:'img-path-format', category:'images', severity:'error',
      description:'Image paths must be lowercase and without spaces',
      type:'img-path-check',
      message:'Line {line} image path "{found}" has spaces or capitals.',
      fix:{description:'Rename file and update path to lowercase and without spaces.',
           snippet:'//cdn.flvs.net/assessment_images/course/my_image.jpg'} },

    { id:'img-path-base', category:'images', severity:'error',

// ─────────────────────────────────────────────────────────────────
// CHECKER ENGINE
// ─────────────────────────────────────────────────────────────────
const AssessmentChecker = (() => {
  const Q_CODES = ['mc:radio:','essay:','fib:','matching:label:','tf:'];

  function parseQuestions(raw) {
    const lines = raw.split('\n');
    const questions = [];
    let cur = null;
    for (let i = 0; i < lines.length; i++) {
      const t = lines[i].trim(), ln = i + 1;
      const code = Q_CODES.find(c => t.startsWith(c));
      if (code) {
        if (cur) questions.push(cur);
        cur = { num:questions.length+1, code, startLine:ln, stem:t.slice(code.length),
                stemLines:[ln], answers:[], points:null, group:null, pointsLine:null, groupLine:null };
        continue;
      }
      if (!cur) continue;
      if (/^points:\d+$/.test(t)) { cur.points = parseInt(t.split(':')[1]); cur.pointsLine = ln; }
      else if (/^group:\d+$/.test(t)) { cur.group = parseInt(t.split(':')[1]); cur.groupLine = ln; }
      else if (cur.points === null && cur.group === null) {
        if (!t) continue; // skip blank lines
        // Stem continuation: only if no answers yet, not an x- correct marker,
        // not starting with an HTML tag (answer choices can have inline markup),
        // and the stem hasn't already branched into multi-line.
        const looksLikeAnswer = t.startsWith('x-') || t.startsWith('<');
        if (cur.answers.length === 0 && !looksLikeAnswer
            && cur.stemLines.length > 0 && cur.stem && !cur.stem.includes('\n')) {
          cur.stem += '\n' + t;
          cur.stemLines.push(ln);
        } else {
          cur.answers.push({ text:t, lineNum:ln });
        }
      }
    }
    if (cur) questions.push(cur);
    return { questions, lines };
  }

  const pass = rule => ({ status:'pass', rule });
  const fail = (rule, msg, ln, err, extra) =>
    ({ status:'fail', rule, message:msg, lineNum:ln||null, errorStr:err||null, extra:extra||null });

  // Helper to pretty-print table HTML for review
  function formatTableHTML(html) {
    // Slice to just the <table>…</table> span so surrounding question text is excluded
    const tStart = html.search(/<table\b/i);
    const tEnd   = html.lastIndexOf('<\/table>');
    if (tStart >= 0 && tEnd >= 0) html = html.substring(tStart, tEnd + '<\/table>'.length);
    else if (tStart >= 0)         html = html.substring(tStart);

    let formatted = '';
    let pad = 0;
    // Break the HTML string apart at every tag
    let split = html.replace(/(<[^>]+>)/g, '\n$1\n').split('\n').map(s => s.trim()).filter(Boolean);
    const blockTags = ['table', 'thead', 'tbody', 'tfoot', 'tr', 'caption'];
    
    for (let node of split) {
      let isClosing = /^<\//.test(node);
      let isOpening = /^<[^\/]/.test(node);
      let tagMatch = node.match(/<\/?([a-zA-Z0-9]+)/);
      let tagName = tagMatch ? tagMatch[1].toLowerCase() : '';
      
      if (isClosing && blockTags.includes(tagName)) pad = Math.max(0, pad - 1);
      formatted += '\t'.repeat(pad) + node + '\n';
      if (isOpening && blockTags.includes(tagName) && !node.endsWith('/>')) pad++;
    }
    // Compress <td> and <th> content back onto a single line for readability
    return formatted.replace(/(<(?:td|th)\b[^>]*>)\n\s*([\s\S]*?)\n\s*(<\/(?:td|th)\s*>)/gi, '$1$2$3').trim();
  }

  // Find the dash separating left from right in a matching answer, skipping dashes inside HTML tags.
  function findMatchingDash(text) {
    let inTag = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      if (ch === '<') { inTag = true; continue; }
      if (ch === '>') { inTag = false; continue; }
      if (!inTag && ch === '-') return i;
    }
    return -1;
  }

  const handlers = {
    'code-spacing'(rule, qs, raw, lines) {
      const re = /\b(mc\s*:\s*radio\s*:|essay\s*:\s*(?!\w)|fib\s*:\s*(?!\w)|tf\s*:\s*(?!\w)|matching\s*:\s*label\s*:\s*)/gi;
      return lines.flatMap((line, i) => {
        const matches = [...line.matchAll(re)].map(m => m[0]);
        return matches
          .filter(x => /\s/.test(x))
          .map(x => fail(rule, rule.message.replace('{found}', x.trim()), i+1, x.trim()));
      });
    },

    'question-spacing'(rule, qs, raw, lines) {
      if (qs.length < 2) return [];
      const results = [];
      for (let i = 0; i < qs.length - 1; i++) {
        const curr = qs[i], next = qs[i + 1];
        // End of current question: use groupLine if set, else pointsLine, else last stem line
        const endLine = curr.groupLine || curr.pointsLine || curr.startLine;
        const startNext = next.startLine;
        // Collect the gap lines between questions (exclusive on both ends)
        const gapLines = [];
        for (let ln = endLine + 1; ln < startNext; ln++) {
          if (lines[ln - 1] !== undefined) gapLines.push({ ln, text: lines[ln - 1] });
        }
        const blanks = gapLines.filter(g => g.text.trim() === '').length;
        if (blanks === 1 && gapLines.length === 1) continue; // exactly one blank line — correct
        const found = blanks === 0 ? 'No blank line' : blanks + ' blank lines';
        const lastCurrLine = lines[endLine - 1] || '';
        const firstNextLine = lines[startNext - 1] || '';

        if (blanks === 0) {
          // Missing blank line — use special type for custom green-insert rendering
          results.push(fail(rule,
            rule.message.replace('{found}', found).replace('{a}', curr.num).replace('{b}', next.num),
            endLine,
            null,
            { type: 'spacing-insert-blank', lastCurrLine, firstNextLine }
          ));
        } else {
          // Too many blank lines — dedicated type for explicit before/after rendering
          results.push(fail(rule,
            rule.message.replace('{found}', found).replace('{a}', curr.num).replace('{b}', next.num),
            endLine,
            null,
            { type: 'spacing-remove-blanks', lastCurrLine, firstNextLine, blanks, gapLines: gapLines.map(g => g.text) }
          ));
        }
      }
      return results;
    },

    'group-sequence'(rule, qs) {
      let max = 0;
      const violations = [];
      for (const q of qs) {
        if (q.group === null) continue;
        if (q.group < max) violations.push({ q, max });
        max = Math.max(max, q.group);
      }
      if (!violations.length) return [];
      const seq = qs.filter(q=>q.group!==null).map(q=>({num:q.num,group:q.group,line:q.groupLine}));
      // Report each violation; first one carries the full sequence detail for the fix panel
      return violations.map((v, idx) => fail(rule,
        rule.message.replace('{found}', v.q.group).replace('{previous}', v.max),
        v.q.groupLine, String(v.q.group),
        idx === 0 ? {type:'group-sequence', sequence:seq} : null));
    },

    'group-numbering'(rule, qs) {
      // Collect the unique set of group numbers actually used, in first-seen order
      const seen = new Map(); // group number → first question that used it
      for (const q of qs) {
        if (q.group === null) continue;
        if (!seen.has(q.group)) seen.set(q.group, q);
      }
      if (!seen.size) return [];

      const usedGroups = [...seen.keys()].sort((a, b) => a - b);
      const violations = []; // { kind, found, expected, q }

      // Check starts at 1
      if (usedGroups[0] !== 1) {
        violations.push({
          kind: 'first-not-one',
          found: usedGroups[0],
          expected: 1,
          q: seen.get(usedGroups[0])
        });
      }

      // Check for gaps between consecutive group numbers
      for (let i = 1; i < usedGroups.length; i++) {
        const prev = usedGroups[i - 1];
        const curr = usedGroups[i];
        if (curr !== prev + 1) {
          violations.push({
            kind: 'gap',
            found: curr,
            expected: prev + 1,
            q: seen.get(curr)
          });
        }
      }

      if (!violations.length) return [];

      // Build the full sequence for the detail panel (same shape as group-sequence)
      const seq = qs
        .filter(q => q.group !== null)
        .map(q => ({ num: q.num, group: q.group, line: q.groupLine }));

      const firstV = violations[0];
      const msgStr = firstV.kind === 'first-not-one'
        ? 'groups must start at 1, but the first group number used is ' + firstV.found
        : 'gap between group:' + (firstV.expected - 1) + ' and group:' + firstV.found + ' — group:' + firstV.expected + ' is missing';

      return [fail(rule,
        rule.message.replace('{found}', msgStr),
        firstV.q ? firstV.q.groupLine : null,
        String(firstV.found),
        { type: 'group-numbering', violations, seq }
      )];
    },

    'question-has-field'(rule, qs) {
      return qs.filter(q => rule.field==='points' ? q.points===null : q.group===null)
               .map(q => fail(rule, rule.message.replace('{num}',q.num), q.startLine));
    },

    'field-order'(rule, qs, raw, lines) {
      return qs.filter(q => q.pointsLine && q.groupLine && q.groupLine < q.pointsLine)
               .map(q => {
                 const groupText  = lines[q.groupLine  - 1] || '';
                 const pointsText = lines[q.pointsLine - 1] || '';
                 // actual: group: then points: (wrong order); expected: points: then group:
                 const actual   = groupText + '\n' + pointsText;
                 const expected = pointsText + '\n' + groupText;
                 return fail(rule, rule.message.replace('{num}',q.num), q.groupLine, null,
                   { type: 'contextual-diff', actual, expected });
               });
    },

    'group-type-consistency'(rule, qs) {
      const byG = {};
      for (const q of qs) { if (q.group===null) continue; (byG[q.group]=byG[q.group]||[]).push(q.code); }
      return Object.entries(byG).filter(([,c])=>new Set(c).size>1)
        .map(([g,c]) => fail(rule, rule.message.replace('{group}',g).replace('{types}',[...new Set(c)].join(', '))));
    },

    'group-points-consistency'(rule, qs) {
      const byG = {};
      for (const q of qs) {
        if (q.group===null||q.points===null) continue;
        (byG[q.group]=byG[q.group]||[]).push({num:q.num,points:q.points,line:q.pointsLine});
      }
      const results = [];
      for (const [g, items] of Object.entries(byG)) {
        const uniq = [...new Set(items.map(i=>i.points))];
        if (uniq.length < 2) continue;
        const tally = {};
        items.forEach(i => { tally[i.points]=(tally[i.points]||0)+1; });
        const expected = Object.entries(tally).sort((a,b)=>b[1]-a[1])[0][0];
        const off = items.filter(i=>String(i.points)!==expected);
        results.push(fail(rule, rule.message.replace('{group}',g).replace('{values}',uniq.join(', ')),
          off[0]?.line||null, uniq.join(' / '), {type:'group-points',group:g,expected,items}));
      }
      return results;
    },

    'mc-correct-count'(rule, qs) {
      return qs.filter(q=>q.code==='mc:radio:').flatMap(q => {
        const c = q.answers.filter(a=>a.text.startsWith('x-')).length;
        return c!==1 ? [fail(rule,rule.message.replace('{num}',q.num).replace('{count}',c),q.startLine)] : [];
      });
    },

    'tf-answer'(rule, qs) {
      return qs.filter(q=>q.code==='tf:').flatMap(q => {
        const a = q.answers.map(a=>a.text.toLowerCase().trim());
        return (a.includes('true')&&a.includes('false'))
          ? [fail(rule,rule.message.replace('{num}',q.num),q.startLine)] : [];
      });
    },

    'tf-answer-present'(rule, qs) {
      return qs.filter(q=>q.code==='tf:').flatMap(q => {
        const a = q.answers.map(a=>a.text.toLowerCase().trim());
        // Skip if already caught by tf-answer (both true AND false present)
        if (a.includes('true') && a.includes('false')) return [];
        // Fire if neither a valid 'true' nor a valid 'false' answer is present
        // This also catches misspellings like 'tru', 'flase', 'True', etc.
        if (!a.includes('true') && !a.includes('false')) {
          const found = q.answers.length ? ' (found: "' + q.answers.map(a=>a.text.trim()).join('", "') + '")' : '';
          return [fail(rule, rule.message.replace('{num}',q.num) + found, q.startLine)];
        }
        return [];
      });
    },

    'malformed-tags'(rule, qs, raw, lines) {
      const CODES=['mc:radio:','essay:','tf:','fib:','matching:label:'];
      // List of HTML tags we reasonably expect to see, even if deprecated
      // Note: Table tags are removed from here so they are exclusively handled by the dedicated table-check rule
      const knownHtmlTags = ['span','img','br','strong','em','u','s','del','sup','sub','ol','ul','li','p','div','mark','font','b','i','a','h1','h2','h3','h4','h5','h6','hr','blockquote','code','pre'];

      return lines.flatMap((line, i) => {
        const lower = line.toLowerCase();
        const hasMissingLt = CODES.some(c => {
            const idx = lower.indexOf(c);
            return idx !== -1 && /^:?span\b/i.test(line.substring(idx + c.length));
        });
        if (hasMissingLt) return [];

        let checkLine = line
            .replace(/<\/?mark\b[^>]*>?/gi, '') 
            .replace(/\/?mark\b[^>]*>/gi, '');  

        const o=(checkLine.match(/</g)||[]).length, c=(checkLine.match(/>/g)||[]).length;
        if (o===c) return [];
        
        // If there's an unclosed <, check if it actually looks like a known HTML tag.
        // If it doesn't (e.g. "< variable"), we ignore it here and let lt-gt-entities catch it.
        let hasMalformedKnownTag = false;
        let badMatch = null;

        const chunks = checkLine.split('<');
        for (let j = 1; j < chunks.length; j++) {
           const chunk = chunks[j];
           if (!chunk.includes('>')) {
              const matchTag = chunk.match(/^\/?\s*([a-zA-Z0-9]+)\b/);
              if (matchTag && knownHtmlTags.includes(matchTag[1].toLowerCase())) {
                  hasMalformedKnownTag = true;
                  badMatch = '<' + chunk;
                  break;
              }
           }
        }

        if (hasMalformedKnownTag) {
            return [fail(rule,rule.message.replace('{line}',i+1).replace('{found}',badMatch.substring(0,60)),i+1,badMatch)];
        }
        return [];
      });
    },

    'br-format'(rule, qs, raw, lines) {
      return lines.flatMap((line, i) => {
        const ms = line.match(/<\/?\s*br\b[^><]*(?:>|(?=<|$))/gi)||[];
        return ms.filter(m=>m!=='<br />').map(m=>fail(rule,rule.message.replace('{line}',i+1).replace('{found}',m),i+1,m, { type: 'contextual-diff', actual: m, expected: '<br />' }));
      });
    },

    'inline-style-check'(rule, qs, raw, lines) {
      return lines.flatMap((line, i) => {
        // Remove allowed style="vertical-align:middle;" from img tags
        let clean = line.replace(/<img([^>]*)style\s*=\s*"([^"]*)"([^>]*)>/gi, (match, pre, styleVal, post) => {
          const norm = styleVal.replace(/\s/g,'').toLowerCase();
          return (norm === 'vertical-align:middle;') ? '<img'+pre+post+'>' : match;
        });
        // Remove allowed list-style-type styles from ol tags
        clean = clean.replace(/<ol([^>]*)style\s*=\s*"([^"]*)"([^>]*)>/gi, (match, pre, styleVal, post) => {
          const norm = styleVal.replace(/\s/g,'').toLowerCase();
          return norm.startsWith('list-style-type:') ? '<ol'+pre+post+'>' : match;
        });
        // Remove allowed text-align styles from table elements (added by table-align-center fixer)
        clean = clean.replace(/<(table|tr|td|th|caption)([^>]*)style\s*=\s*"([^"]*)"([^>]*)>/gi, (match, tag, pre, styleVal, post) => {
          const norm = styleVal.replace(/\s/g,'').toLowerCase();
          return norm.startsWith('text-align:') ? '<'+tag+pre+post+'>' : match;
        });
        // Remove allowed style="text-align: [any]" from any element
        clean = clean.replace(/<([a-zA-Z][a-zA-Z0-9]*)([^>]*)style\s*=\s*"([^"]*)"([^>]*)>/gi, (match, tag, pre, styleVal, post) => {
          const norm = styleVal.replace(/\s/g,'').toLowerCase();
          return norm.startsWith('text-align:') ? '<'+tag+pre+post+'>' : match;
        });
        // Remove allowed dir="[any]" attribute from any element
        clean = clean.replace(/\s*\bdir\s*=\s*"[^"]*"/gi, '');
        const m = clean.match(/style\s*=\s*["'][^"']*["']/i);
        return m ? [fail(rule,rule.message.replace('{line}',i+1),i+1,m[0])] : [];
      });
    },

    'forbidden-html-tags'(rule, qs, raw, lines) {
      const fixMap = {
        'b': { open: '<strong>', close: '</strong>' },
        'i': { open: '<em>', close: '</em>' },
        'u': { open: '<span class="underline">', close: '</span>' },
        's': { open: '<del>', close: '</del>' },
        'bold': { open: '<strong>', close: '</strong>' },
        'italic': { open: '<em>', close: '</em>' }
      };

      return lines.flatMap((line, i) => {
        const results = [];
        let tempLine = line;

        // 1. Look for paired tags on the same line (e.g., <b>text</b>)
        const pairRe = /<(b|i|u|s|bold|italic)\b[^>]*>(.*?)<\/\1>/gi;
        let m;
        while ((m = pairRe.exec(tempLine)) !== null) {
          const tag = m[1].toLowerCase();
          const fix = fixMap[tag];
          const actual = m[0];
          const expected = `${fix.open}${m[2]}${fix.close}`;
          
          results.push(fail(rule,
             rule.message.replace('{line}', i+1).replace('{found}', `<${tag}>...</${tag}> pair`),
             i+1, actual,
             { type: 'contextual-diff', actual, expected, truthAttr: actual }
          ));
          
          // Mask out the pair with spaces so we don't flag the single tags inside it below
          tempLine = tempLine.substring(0, m.index) + ' '.repeat(actual.length) + tempLine.substring(m.index + actual.length);
        }

        // 2. Look for any orphaned/unpaired tags left over
        const singleRe = /<\/?(b|i|u|s|bold|italic)\b[^>]*>/gi;
        while ((m = singleRe.exec(tempLine)) !== null) {
          const actual = m[0];
          const isClosing = actual.startsWith('</');
          const tag = (actual.match(/<\/?([a-z]+)/i) || [])[1].toLowerCase();
          const expected = isClosing ? fixMap[tag].close : fixMap[tag].open;

          results.push(fail(rule,
             rule.message.replace('{line}', i+1).replace('{found}', `orphaned ${actual} tag`),
             i+1, actual,
             { type: 'contextual-diff', actual, expected, truthAttr: actual }
          ));
        }

        return results;
      });
    },

    'mark-tag-check'(rule, qs, raw, lines) {
      const PARTIAL_PATTERNS = [
        { re: /<mark(?:\s[^>]*)?$/, label: 'unclosed <mark tag (missing >)' },
        { re: /\bmark\s+class\s*=\s*(?:"[^"]*"|'[^']*'|[^\s>]*)?\s*>/, label: 'mark remnant (missing opening <)' },
        { re: /\/mark>/, label: '/mark> remnant (missing opening <)' },
        { re: /(?<![<\/\w])mark>/, label: 'mark> remnant (missing opening <)' },
        { re: /<\/mark(?!>)/, label: '</mark remnant (missing closing >)' },
      ];

      return lines.flatMap((line, i) => {
        const results = [];
        let tempLine = line;

        // Helper to push full-line diffs safely so the smart engine highlights exact indices.
        // removeToken is the exact substring to delete; actual/expected show the full-line diff
        // for the UI, while removeToken lets the fixer work even after sibling fixes have run.
        const pushFullLineDiff = (matchIdx, matchLen, msgFound) => {
          const actualFull = line;
          const removeToken = line.substring(matchIdx, matchIdx + matchLen);
          const expectedFull = line.substring(0, matchIdx) + line.substring(matchIdx + matchLen);
          results.push(fail(rule,
            rule.message.replace('{line}', i+1).replace('{found}', msgFound),
            i+1, null, { type: 'contextual-diff', actual: actualFull.trim(), expected: expectedFull.trim(), removeToken }
          ));
        };

        // 1. Complete pairs on the same line
        const pairRe = /<mark\b[^>]*>.*?<\/mark>/gi;
        let m;
        while ((m = pairRe.exec(tempLine)) !== null) {
          const actualFull = line;
          const removeToken = m[0];
          const innerText = m[0].replace(/<\/?mark\b[^>]*>/gi, '');
          const expectedFull = line.substring(0, m.index) + innerText + line.substring(m.index + m[0].length);
          // replaceWith carries what to substitute (inner text), removeToken is the full match
          results.push(fail(rule,
            rule.message.replace('{line}', i+1).replace('{found}', 'complete <mark>...</mark> pair'),
            i+1, null, { type: 'contextual-diff', actual: actualFull.trim(), expected: expectedFull.trim(), removeToken, replaceWith: innerText }
          ));
          tempLine = tempLine.substring(0, m.index) + ' '.repeat(m[0].length) + tempLine.substring(m.index + m[0].length);
        }

        // 2. Orphaned single tags (opening or closing)
        const singleRe = /<mark\b[^>]*>|<\/mark>/gi;
        while ((m = singleRe.exec(tempLine)) !== null) {
          pushFullLineDiff(m.index, m[0].length, `orphaned ${m[0]} tag`);
          tempLine = tempLine.substring(0, m.index) + ' '.repeat(m[0].length) + tempLine.substring(m.index + m[0].length);
        }

        // 3. Partial remnants
        for (const { re, label } of PARTIAL_PATTERNS) {
          let pm;
          while ((pm = tempLine.match(re)) !== null) {
            pushFullLineDiff(pm.index, pm[0].length, `partial mark remnant "${pm[0].trim().substring(0, 40)}" (${label})`);
            tempLine = tempLine.substring(0, pm.index) + ' '.repeat(pm[0].length) + tempLine.substring(pm.index + pm[0].length);
          }
        }

        return results;
      });
    },

    'unclosed-paired-tags-check'(rule, qs, raw, lines) {
      // Check every line belonging to each question for unmatched paired tags.
      // We scan from the question's startLine to the line before the next question
      // (or end of file) so answer lines with HTML tags are never missed regardless
      // of how the parser collected them.
      const PAIRED = ['strong','em','sup','sub','u','s','del'];
      return qs.flatMap((q, qi) => {
        const start = q.startLine - 1; // 0-based
        const end   = qi + 1 < qs.length ? qs[qi+1].startLine - 1 : lines.length;
        const block = lines.slice(start, end).join('\n');
        const issues = [];
        for (const tag of PAIRED) {
          const opens  = (block.match(new RegExp('<'+tag+'(?:\\s[^>]*)?>','gi')) || []).length;
          const closes = (block.match(new RegExp('</'+tag+'>','gi')) || []).length;
          if (opens !== closes) {
            issues.push(opens > closes
              ? (opens - closes) + ' unclosed <'+tag+'>'
              : (closes - opens) + ' extra </'+tag+'>');
          }
        }
        if (!issues.length) return [];
        return [fail(rule,
          rule.message.replace('{num}', q.num).replace('{found}', issues.join('; ')),
          q.startLine)];
      });
    },

   'lt-gt-entities-check'(rule, qs, raw, lines) {
      const allowedTagsRe = /<\/?\s*(span|img|br|strong|em|u|s|del|sup|sub|table|thead|tbody|tr|th|td|caption|ol|ul|li|p|div|mark|font|b|i|a|h[1-6]|hr|blockquote|code|pre)\b[^>]*>/gi;
      const validSpannedRe = /<span[^>]*>\s*(<|>|&lt;|&gt;)\s*<\/span>/gi;
      // Fragments that look like broken/incomplete HTML tags — a bare < or > that is
      // actually part of a malformed tag should be suppressed here; malformed-tags
      // or table-tag-pairs will catch it instead.
      // Pattern: <tagname with no closing >, or attributes> with no opening <
      const KNOWN_TAGS = 'span|img|br|strong|em|u|s|del|sup|sub|table|thead|tbody|tr|th|td|caption|ol|ul|li|p|div|mark|font|b|i|a|h[1-6]|hr|blockquote|code|pre';
      // Orphaned opening: <tagname ... (no > before next < or end of line)
      const orphanOpenRe = new RegExp('<\\/?('+KNOWN_TAGS+')\\b[^<>]*$', 'gi');
      // Orphaned closing: ... attr="val"> where the < is missing — identified by a >
      // preceded only by tag-like content (word chars, =, ", ', /, spaces, .) since last <
      const looksLikeTagTailRe = /^[^<]*(?:[\w"'\-.\/=\s])*>/;

      return lines.flatMap((line, i) => {
        // 1. Mask valid, already-wrapped symbols
        let checkLine = line.replace(validSpannedRe, match => ' '.repeat(match.length));

        // 2. Mask complete known HTML tags
        checkLine = checkLine.replace(allowedTagsRe, match => ' '.repeat(match.length));

        // 3. Mask orphaned opening fragments (e.g. "<strong" with no closing >)
        //    These leave a bare < that would otherwise be flagged as a math symbol.
        checkLine = checkLine.replace(orphanOpenRe, match => ' '.repeat(match.length));

        // 4. Scan whatever is left for naked <, >, &lt;, or &gt;
        const results = [];
        const re = /(<|>|&lt;|&gt;)/gi;
        let m;
        while ((m = re.exec(checkLine)) !== null) {
          const idx = m.index;
          const sym = m[0];

          // ── Suppress if this looks like part of a broken tag ──
          // A bare > is likely a tag tail if everything between the previous unmasked
          // character and this > looks like tag attribute content.
          if (sym === '>') {
            // Look back in the *original* line for an unclosed < — if the text between
            // looks like a real tag tail (has = or quotes, indicating attributes, or is
            // a known self-closing form like "/>"), suppress it.
            const rawLine = line;
            const lastLt = rawLine.lastIndexOf('<', idx);
            if (lastLt !== -1) {
              const between = rawLine.substring(lastLt, idx + 1);
              // A real tag tail has attributes (key="val") or is "/>" or "<tagname>"
              const hasAttr  = /=\s*["']/.test(between);
              const isSelfClose = /\/>$/.test(between);
              const isSimpleTag = /^<\/?[a-zA-Z][a-zA-Z0-9]*\s*>$/.test(between);
              if (hasAttr || isSelfClose || isSimpleTag) continue;
            } else {
              // No < before this > at all — check if the content leading up to >
              // looks like a tag tail: contains key="val" attribute syntax
              const rawBefore = rawLine.substring(0, idx + 1);
              // A tag tail has at least one attribute assignment or ends with />
              if (/=\s*["'][^"']*["']/.test(rawBefore) || rawBefore.trimEnd().endsWith('/>')) continue;
            }
            // Also suppress if the content just before > looks like a malformed tag
            // whose opening < is missing — e.g. "/tr>" or "tagname>" or "/tagname attr>"
            // This catches orphaned tag tails like /tr> that are missing their <
            const KNOWN_TAGS_GT = 'span|img|br|strong|em|u|s|del|sup|sub|table|thead|tbody|tr|th|td|caption|ol|ul|li|p|div|mark|font|b|i|a|h[1-6]|hr|blockquote|code|pre';
            // Anchored at ^ so the whole trimmed text must BE a tag tail, not just contain one.
            // Require tag name be followed by a non-word char (space, /) or end-of-string
            // so that "greater" (containing "tr") doesn't falsely match.
            const orphanTailRe = new RegExp('^\\/?(?:' + KNOWN_TAGS_GT + ')(?:[^a-zA-Z0-9][^<>]*)?$', 'i');
            const textBeforeGt = rawLine.substring(Math.max(0, lastLt !== -1 ? lastLt + 1 : 0), idx);
            if (orphanTailRe.test(textBeforeGt.trim())) continue;
          }

          if (sym === '<') {
            // Look forward in checkLine for a > — if content between looks tag-like, suppress
            const after = checkLine.substring(idx + 1);
            const nextGt = after.indexOf('>');
            if (nextGt !== -1) {
              const between = after.substring(0, nextGt);
              // Tag-like between: starts with optional / then letters (tag name or attribute)
              if (/^\/?(\w)/.test(between.trim())) continue;
            }
          }

          const actualFull = line;
          // Encode the raw symbol as an HTML entity inside the span for full LMS compatibility
          let encodedSym;
          if (sym === '<' || sym === '&lt;') {
            encodedSym = '&lt;';
          } else {
            encodedSym = '&gt;';
          }
          const replacement = '<span>' + encodedSym + '</span>';
          const expectedFull = line.substring(0, m.index) + replacement + line.substring(m.index + sym.length);

          results.push(fail(rule,
            rule.message.replace('{line}', i+1).replace('{found}', sym),
            i+1, null, { type: 'contextual-diff', actual: actualFull.trim(), expected: expectedFull.trim() }
          ));
        }
        return results;
      });
    },

    'commented-html'(rule, qs, raw) {
      const results = []; const re=/<!--([\s\S]*?)-->/g; let m;
      while ((m=re.exec(raw))!==null) {
        if (/<[a-zA-Z]/.test(m[1])) {
          const ln=(raw.substring(0,m.index).match(/\n/g)||[]).length+1;
          results.push(fail(rule,rule.message.replace('{line}',ln),ln));
        }
      }
      return results;
    },

    'img-alt-check'(rule, qs, raw, lines) {
      return lines.flatMap((line, i) => {
        const imgs=line.match(/<img\s[^>]*>/gi)||[];
        return imgs.filter(t=>{
          // Accept alt="..." or alt='...' with non-empty value — quote style is a separate rule
          return !/alt\s*=\s*"[^"]+"/i.test(t) && !/alt\s*=\s*'[^']+'/i.test(t);
        }).map(()=>fail(rule,rule.message.replace('{line}',i+1),i+1));
      });
    },

    'img-quote-check'(rule, qs, raw, lines) {
      return lines.flatMap((line, i) => {
        if (!/<img/i.test(line)) return [];
        const imgs = line.match(/<img[^>]+>/gi) || [];
        return imgs.flatMap(img => {
          const m = img.match(/(src|alt)\s*=\s*'([^']+)'/i);
          if (m) {
            const actual = m[0];
            const expected = `${m[1]}="${m[2]}"`;
            return [fail(rule, rule.message.replace('{line}', i+1), i+1, actual, { type: 'contextual-diff', actual, expected, truthAttr: img })];
          }
          return [];
        });
      });
    },

    'img-extension-check'(rule, qs, raw, lines) {
      const results=[];
      lines.forEach((line,i)=>{
        const imgs=line.match(/<img\b[^>]*>/gi)||[];
        imgs.forEach(img=>{
          const re=/src\s*=\s*"([^"]+)"/gi; let m;
          while((m=re.exec(img))!==null){
            const src=m[1].toLowerCase();
            if(!rule.allowed.some(e=>src.endsWith(e))){
              const ext='.'+src.split('.').pop();
              results.push(fail(rule,rule.message.replace('{line}',i+1).replace('{found}',ext),i+1,ext));
            }
          }
        });
      });
      return results;
    },

    'img-alt-quotes-check'(rule, qs, raw, lines) {
      return lines.flatMap((line, i) => {
        const imgs=line.match(/<img[^>]+>/gi)||[];
        return imgs.flatMap(img=>{
          const a=img.match(/alt\s*=\s*"([^]*?)"(?=\s*\/?>|\s+[a-z]+(?:=|\s|>))/i);
          if (a && a[1].includes('"')) {
            const actual = a[0];
            const expected = `alt="${a[1].replace(/"/g, "'")}"`;
            return [fail(rule, rule.message.replace('{line}', i+1), i+1, actual, { type: 'contextual-diff', actual, expected, truthAttr: img })];
          }
          return [];
        });
      });
    },

    'img-alt-html-check'(rule, qs, raw, lines) {
      return lines.flatMap((line, i) => {
        const imgs=line.match(/<img[^>]+>/gi)||[];
        return imgs.flatMap(img=>{
          const a=img.match(/alt\s*=\s*"([^]*?)"(?=\s*\/?>|\s+[a-z]+(?:=|\s|>))/i);
          if(!a) return [];
          const h=a[1].match(/<[^>]+>/);
          return h ? [fail(rule,rule.message.replace('{line}',i+1),i+1,h[0])] : [];
        });
      });
    },

   'img-alt-symbol-check'(rule, qs, raw, lines) {
      const SYMS={'>':'greater than','<':'less than','/':'divided by','*':'multiplied by',
                  '%':'percent','&':'ampersand','@':'at','=':'equals','°':'degree','+':'plus'};
      const ENTS={
        '&amp;':'ampersand',
        '&lt;':'less than',
        '&gt;':'greater than',
        '&deg;':'degree'
      };
      const MATH_MINUS=/(?<=\s)-(?=\d|\s)/;
      return lines.flatMap((line, i) => {
        const imgs=line.match(/<img[^>]+>/gi)||[];
        return imgs.flatMap(img=>{
          const a=img.match(/alt\s*=\s*"([^]*?)"(?=\s*\/?>|\s+[a-z]+(?:=|\s|>))/i);
          if(!a) return [];
          const txt=a[1];
          const fullAlt = a[0]; // The whole alt="..." string for context

          for(const[ent,word] of Object.entries(ENTS)) {
            if(txt.includes(ent)) {
              return [fail(rule, `Line ${i+1} alt text contains "${ent}". Expected: "${word}"`, i+1, ent, 
                { type: 'contextual-diff', actual: ent, expected: word, truthAttr: fullAlt })];
            }
          }
          for(const sym of Object.keys(SYMS)) {
            if(txt.includes(sym)) {
              return [fail(rule, `Line ${i+1} alt text contains symbol "${sym}". Expected: "${SYMS[sym]}"`, i+1, sym, 
                { type: 'contextual-diff', actual: sym, expected: SYMS[sym], truthAttr: fullAlt })];
            }
          }
          if(MATH_MINUS.test(txt)) {
            return [fail(rule, `Line ${i+1} alt text contains "-" used as a math minus. Expected: "minus"`, i+1, '-', 
              { type: 'contextual-diff', actual: '-', expected: 'minus', truthAttr: fullAlt })];
          }
          return [];
        });
      });
    },

    'img-alt-unknown-symbol-check'(rule, qs, raw, lines) {
      const KNOWN=new Set(['>','<','/','*','%','&','@','-','=','°','+']);
